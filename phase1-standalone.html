      assistRow.appendChild(h('button',{style:{width:'26px',height:'26px',borderRadius:'6px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)',color:'var(--text3)',fontSize:'16px',fontWeight:'700',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:'1'},
        onClick:()=>{const i=ASSIST_VALS.indexOf(state.setAssistWeight);if(i>0){state.setAssistWeight=ASSIST_VALS[i-1];render()}}},'\u2212'));
      assistRow.appendChild(h('div',{style:{minWidth:'50px',textAlign:'center',fontSize:'15px',fontWeight:'800',color:state.setAssistWeight>0?day.color:'var(--text3)'}},
        state.setAssistWeight>0?`${state.setAssistWeight}`:'\u2014'));
      assistRow.appendChild(h('button',{style:{width:'26px',height:'26px',borderRadius:'6px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)',color:'var(--text3)',fontSize:'16px',fontWeight:'700',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:'1'},
        onClick:()=>{const i=ASSIST_VALS.indexOf(state.setAssistWeight);if(i<ASSIST_VALS.length-1){state.setAssistWeight=ASSIST_VALS[i+1];render()}}},'+'));
      root.appendChild(assistRow);
    }

    // PR indicator
    if(isNewPr){
      root.appendChild(h('div',{id:'pr-indicator',style:{textAlign:'center',padding:'2px 0'}},
        h('span',{style:{fontSize:'11px',fontWeight:'900',color:'#ff3d3d',letterSpacing:'2px',animation:'prBurst 0.5s ease'}},'\u{1F525} NEW PR \u{1F525}')));
    }else{root.appendChild(h('div',{id:'pr-indicator',style:{minHeight:'2px'}}))}

    // Logged sets
    if(logged.length>0){
      const chips=h('div',{style:{padding:'0 20px 2px',display:'flex',justifyContent:'center',gap:'4px',flexWrap:'wrap'}});
      logged.forEach(s=>{const tc=TAG_COLORS[s.tag]||'';
        chips.appendChild(h('div',{style:{fontSize:'8px',color:tc||'var(--text3)',background:'rgba(255,255,255,0.03)',borderRadius:'4px',padding:'2px 5px'}},
          `${s.tag&&s.tag!=='normal'?TAG_LABELS[s.tag]+' ':''}${s.weight===0?'BW':s.weight}\u00D7${s.reps}`))});
      root.appendChild(chips);
    }

    // Bottom controls
    const bottom=h('div',{style:{padding:'0 20px'}});

    // Tag selector
    const tagRow=h('div',{style:{display:'flex',justifyContent:'center',gap:'5px',marginBottom:'4px'}});
    SET_TAGS.forEach(tag=>{
      const active=state.setTag===tag;const col=TAG_COLORS[tag]||day.color;
      tagRow.appendChild(h('button',{style:{padding:'3px 9px',borderRadius:'5px',fontSize:'9px',fontWeight:active?'800':'600',letterSpacing:'0.5px',
        background:active?(tag==='normal'?'rgba(255,255,255,0.08)':`${col}15`):'transparent',
        border:`1px solid ${active?(tag==='normal'?'rgba(255,255,255,0.1)':`${col}30`):'rgba(255,255,255,0.04)'}`,
        color:active?(tag==='normal'?'var(--text)':col):'var(--text3)'},
        onClick:()=>{state.setTag=tag;render()}},tag.toUpperCase()));
    });
    bottom.appendChild(tagRow);

    // RPE slider
    const rpeSection=h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'4px',padding:'0 4px'}});
    const rpeCol=getRpeColor(state.setRpe);
    const rpeLabel=h('div',{id:'rpe-val',style:{fontSize:'20px',fontWeight:'900',color:rpeCol,minWidth:'32px',textAlign:'center',lineHeight:'1'}},String(state.setRpe));
    rpeSection.appendChild(rpeLabel);
    const slider=h('input',{type:'range',min:'1',max:'10',value:String(state.setRpe),className:'rpe-slider'});
    slider.addEventListener('input',e=>{
      const v=parseInt(e.target.value);state.setRpe=v;
      const el=document.getElementById('rpe-val');
      if(el){el.textContent=String(v);el.style.color=getRpeColor(v)}
    });
    rpeSection.appendChild(slider);
    rpeSection.appendChild(h('div',{style:{fontSize:'7px',fontWeight:'700',letterSpacing:'1px',color:'var(--text3)',minWidth:'20px'}},'RPE'));
    bottom.appendChild(rpeSection);

    // Rest presets
    if(!state.restActive){
      const restRow=h('div',{style:{display:'flex',justifyContent:'center',alignItems:'center',gap:'3px',marginBottom:'4px'}});
      restRow.appendChild(h('span',{style:{fontSize:'8px',color:'var(--text3)',marginRight:'2px'}},'\u23F1'));
      REST_PRESETS.forEach(sec=>{const active=state.restSeconds===sec;
        restRow.appendChild(h('button',{style:{padding:'2px 6px',borderRadius:'4px',fontSize:'8px',fontWeight:active?'800':'500',background:active?'rgba(255,255,255,0.06)':'transparent',color:active?'var(--text)':'var(--text3)',border:'none'},
          onClick:()=>{state.restSeconds=sec;save();render()}},fmtTime(sec)))});
      bottom.appendChild(restRow);
    }

    // Undo
    if(logged.length>0){
      bottom.appendChild(h('div',{style:{textAlign:'center',marginBottom:'2px'}},
        h('button',{style:{background:'none',border:'none',fontSize:'8px',fontWeight:'600',color:'var(--text3)',padding:'2px 8px'},
          onClick:()=>{
            const sets=state.sessionSets[ex.id];
            if(!sets||sets.length===0){showToast('No sets to undo');return}
            const removed=sets.pop();
            if(removed.tag!=='warmup'&&state.currentSet>1)state.currentSet--;
            state.setWeight=removed.weight;state.setReps=removed.reps;state.setTag=removed.tag||'normal';
            showToast('Set removed \u21A9');render();
          }},'\u21A9 undo last set')));
    }

    root.appendChild(bottom);

    // LOG button
    const btnText=isLastSet?(isLastEx?'LOG SET & FINISH':'LOG & NEXT \u203A'):`LOG SET ${state.currentSet}`;
    root.appendChild(h('div',{style:{padding:`6px 20px calc(20px + var(--safe-b))`}},
      h('button',{style:{width:'100%',padding:'14px',borderRadius:'14px',background:day.color,color:'#fff',fontSize:'15px',fontWeight:'900',letterSpacing:'2px',boxShadow:`0 4px 20px ${day.colorGlow}`},onClick:()=>logSet()},btnText)));
    return;
  }

  // ═══════════════ SUMMARY (ENHANCED - PHASE 1) ═══════════════
  if(state.view==='summary'&&state.summaryData){
    const{session,prCount,prList,totalSets,totalVol,workoutDuration}=state.summaryData;
    const center=h('div',{style:{textAlign:'center',paddingTop:'32px'}});
    center.appendChild(h('div',{style:{fontSize:'48px',marginBottom:'12px',animation:'prBurst 0.6s ease'}},prCount>0?'\u{1F525}':'\u{1F4AA}'));
    center.appendChild(h('div',{style:{fontSize:'22px',fontWeight:'900',color:'var(--text)',marginBottom:'6px'}},'WORKOUT COMPLETE'));
    center.appendChild(h('div',{style:{fontSize:'13px',color:'var(--text2)',marginBottom:'28px'}},`${session.dayName} \u2022 ${fmtDate(session.date)}`));

    // PHASE 1: Enhanced stats row with duration
    const statsRow=h('div',{style:{display:'flex',justifyContent:'center',gap:'12px',marginBottom:'28px',flexWrap:'wrap'}});
    const statItems=[
      {val:session.exercises.length,label:'EXERCISES',color:'var(--text)'},
      {val:totalSets,label:'SETS',color:'var(--text)'},
      {val:totalVol?totalVol.toLocaleString():'0',label:'VOLUME',color:'var(--text)'},
      // PHASE 1: Workout duration stat
      {val:fmtDuration(workoutDuration),label:'DURATION',color:'var(--text2)'},
    ];
    if(prCount>0)statItems.push({val:prCount,label:'NEW PRs',color:'var(--gold)'});
    statItems.forEach(s=>{
      statsRow.appendChild(h('div',{style:{textAlign:'center',minWidth:'55px'}},
        h('div',{style:{fontSize:typeof s.val==='number'?'24px':'16px',fontWeight:'900',color:s.color}},String(s.val)),
        h('div',{style:{fontSize:'8px',fontWeight:'700',letterSpacing:'2px',color:'var(--text3)'}},s.label)));
    });
    center.appendChild(statsRow);

    // PHASE 1: e1RM achievements from this session
    const e1rmHighlights=[];
    session.exercises.forEach(ex=>{
      const workSets=(ex.sets||[]).filter(s=>s.tag!=='warmup');
      if(workSets.length===0)return;
      const best=workSets.reduce((b,s)=>s.weight*s.reps>b.weight*b.reps?s:b,workSets[0]);
      const e1rm=estimate1RM(best.weight,best.reps);
      if(e1rm>0)e1rmHighlights.push({name:ex.name,weight:best.weight,reps:best.reps,e1rm});
    });
    if(e1rmHighlights.length>0){
      const e1rmSec=h('div',{style:{marginBottom:'24px',textAlign:'left'}});
      e1rmSec.appendChild(h('div',{style:{fontSize:'10px',fontWeight:'800',letterSpacing:'3px',color:'var(--text3)',marginBottom:'10px'}},'ESTIMATED 1RM'));
      e1rmHighlights.sort((a,b)=>b.e1rm-a.e1rm).forEach(item=>{
        e1rmSec.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'10px',padding:'10px 14px',marginBottom:'6px'}},
          h('div',{},
            h('div',{style:{fontSize:'13px',fontWeight:'600',color:'var(--text)'}},item.name),
            h('div',{style:{fontSize:'10px',color:'var(--text3)',marginTop:'2px'}},`Best set: ${item.weight} x ${item.reps}`)),
          h('div',{style:{textAlign:'right'}},
            h('div',{style:{fontSize:'16px',fontWeight:'900',color:'var(--gold)'}},`${item.e1rm}`),
            h('div',{style:{fontSize:'9px',color:'var(--text3)'}},`est. 1RM`))));
      });
      center.appendChild(e1rmSec);
    }

    // PR list
    if(prList.length>0){
      const prSec=h('div',{style:{marginBottom:'24px',textAlign:'left'}});
      prSec.appendChild(h('div',{style:{fontSize:'10px',fontWeight:'800',letterSpacing:'3px',color:'var(--text3)',marginBottom:'10px'}},'NEW PERSONAL RECORDS'));
      prList.forEach(p=>{
        const e1rm=estimate1RM(p.weight,p.reps);
        prSec.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'10px',padding:'10px 14px',marginBottom:'6px'}},
          h('span',{style:{fontSize:'13px',fontWeight:'600',color:'var(--text)'}},p.name),
          h('div',{style:{textAlign:'right'}},
            h('div',{style:{fontSize:'14px',fontWeight:'800',color:'var(--gold)'}},`${p.weight} x ${p.reps}`),
            h('div',{style:{fontSize:'10px',fontWeight:'700',color:'var(--accent)'}},`e1RM: ${e1rm}`))));
      });
      center.appendChild(prSec);
    }

    // Session detail
    const detail=h('div',{style:{textAlign:'left'}});
    detail.appendChild(h('div',{style:{fontSize:'10px',fontWeight:'800',letterSpacing:'3px',color:'var(--text3)',marginBottom:'10px'}},'SESSION DETAIL'));
    session.exercises.forEach(ex=>{
      const exSetsRpe=(ex.sets||[]).filter(s=>s.rpe);
      const exAvgRpe=exSetsRpe.length>0?exSetsRpe.reduce((s,set)=>s+set.rpe,0)/exSetsRpe.length:0;
      const card=h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'10px',padding:'12px 14px',marginBottom:'6px'}});
      card.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}},
        h('div',{style:{fontSize:'13px',fontWeight:'700',color:'var(--text)'}},ex.name),
        exAvgRpe>0?h('span',{style:{fontSize:'10px',fontWeight:'800',color:getRpeColor(Math.round(exAvgRpe))}},`RPE ${exAvgRpe.toFixed(1)}`):null));
      const chips=h('div',{style:{display:'flex',gap:'5px',flexWrap:'wrap'}});
      (ex.sets||[]).forEach(s=>{const tc=TAG_COLORS[s.tag]||'';
        chips.appendChild(h('span',{style:{fontSize:'9px',color:tc||'var(--text2)',background:'var(--bg2)',borderRadius:'6px',padding:'3px 6px',border:tc?`1px solid ${tc}30`:'none'}},
          `${s.tag&&s.tag!=='normal'?TAG_LABELS[s.tag]+' ':''}${s.weight===0?'BW':s.weight}\u00D7${s.reps}`))});
      card.appendChild(chips);detail.appendChild(card)});
    center.appendChild(detail);

    // RPE analysis
    const allSetsWithRpe=session.exercises.flatMap(ex=>(ex.sets||[]).filter(s=>s.rpe));
    const avgRpe=allSetsWithRpe.length>0?allSetsWithRpe.reduce((s,set)=>s+set.rpe,0)/allSetsWithRpe.length:0;
    const sessionRpe=Math.round(avgRpe*10)/10;

    if(allSetsWithRpe.length>0){
      const rpeSec=h('div',{style:{marginTop:'24px',textAlign:'center'}});
      const rpeCol=getRpeColor(Math.round(avgRpe));
      rpeSec.appendChild(h('div',{style:{fontSize:'10px',fontWeight:'800',letterSpacing:'3px',color:'var(--text3)',marginBottom:'10px'}},'SESSION INTENSITY'));
      rpeSec.appendChild(h('div',{style:{marginBottom:'16px'}},
        h('div',{style:{fontSize:'40px',fontWeight:'900',color:rpeCol,lineHeight:'1'}},sessionRpe.toFixed(1)),
        h('div',{style:{fontSize:'11px',fontWeight:'700',color:rpeCol,marginTop:'4px'}},'AVG RPE')));
      center.appendChild(rpeSec);
    }

    // PHASE 3: Note in summary
    if(session.note){
      center.appendChild(h('div',{style:{marginTop:'16px',textAlign:'left'}},
        h('div',{style:{fontSize:'10px',fontWeight:'800',letterSpacing:'3px',color:'var(--text3)',marginBottom:'6px'}},'SESSION NOTES'),
        h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'10px',padding:'12px 14px',fontSize:'12px',color:'var(--text2)',lineHeight:'1.5',whiteSpace:'pre-wrap'}},session.note)));
    }

    center.appendChild(h('button',{style:{marginTop:'20px',width:'100%',padding:'16px',borderRadius:'14px',background:'var(--accent)',color:'#fff',fontSize:'16px',fontWeight:'900',letterSpacing:'2px'},onClick:()=>{
      if(state.history.length>0&&state.summaryData){state.history[0].rpe=sessionRpe?Math.round(sessionRpe):null;save()}
      state.summaryData=null;state.sessionSets={};state.workoutNote='';state.view='home';render()}},'DONE'));
    root.appendChild(center);return;
  }

  // ═══════════════ HISTORY ═══════════════
  if(state.view==='history'){
    root.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}},
      h('button',{style:{background:'none',color:'var(--text2)',fontSize:'14px',fontWeight:'600'},onClick:()=>{state.view='home';render()}},'\u2190 Back'),
      h('div',{style:{fontSize:'12px',fontWeight:'800',letterSpacing:'3px',color:'var(--text2)'}},'WORKOUT LOG'),h('div',{style:{width:'50px'}})));

    if(state.history.length===0){
      root.appendChild(h('div',{style:{textAlign:'center',paddingTop:'80px'}},h('div',{style:{fontSize:'48px',marginBottom:'12px'}},'\u{1F4CB}'),h('div',{style:{color:'#555',fontSize:'14px'}},'No workouts logged yet.')));
    }else{
      const list=h('div',{style:{display:'flex',flexDirection:'column',gap:'10px'}});
      state.history.forEach((s,i)=>{
        const isActivity=s.type==='activity';
        const sessVol=isActivity?0:(s.exercises||[]).reduce((sum,ex)=>sum+calcVolume(ex.sets||[]),0);
        const card=h('button',{style:{background:'var(--card)',border:'1px solid var(--border)',borderLeft:`3px solid ${s.dayColor||'#555'}`,borderRadius:'12px',padding:'12px 16px',textAlign:'left',animation:`fadeIn 0.3s ease ${Math.min(i,12)*30}ms forwards`,opacity:'0',color:'var(--text)',width:'100%'},onClick:()=>{state.expandedSession=state.expandedSession===i?null:i;render()}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
            h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
              h('span',{},s.dayIcon||''),
              h('span',{style:{fontSize:'13px',fontWeight:'800',letterSpacing:'1px',color:s.dayColor||'#aaa'}},s.dayName),
              s.rpe?h('span',{style:{fontSize:'9px',fontWeight:'700',borderRadius:'5px',padding:'2px 6px',background:getRpeColor(s.rpe)+'20',color:getRpeColor(s.rpe)}},`RPE ${s.rpe}`):null,
              // PHASE 1: Duration badge in history
              s.duration?h('span',{style:{fontSize:'9px',fontWeight:'600',borderRadius:'5px',padding:'2px 6px',background:'rgba(255,255,255,0.04)',color:'var(--text3)'}},fmtDuration(s.duration)):null),
            h('div',{style:{textAlign:'right'}},
              h('div',{style:{fontSize:'11px',color:'var(--text3)'}},fmtDate(s.date)),
              sessVol>0?h('div',{style:{fontSize:'9px',color:'var(--text3)',marginTop:'2px'}},`${sessVol.toLocaleString()} lbs`):null)));
        if(state.expandedSession===i&&!isActivity){
          const detail=h('div',{style:{borderTop:'1px solid var(--border)',paddingTop:'10px',marginTop:'10px'}});
          // PHASE 3: Show note if present
          if(s.note){detail.appendChild(h('div',{style:{fontSize:'11px',color:'var(--text2)',background:'rgba(255,255,255,0.02)',borderRadius:'8px',padding:'8px 10px',marginBottom:'10px',whiteSpace:'pre-wrap',lineHeight:'1.4',fontStyle:'italic'}},s.note))}
          (s.exercises||[]).forEach(ex=>{
            const exDiv=h('div',{style:{marginBottom:'8px'}});
            const best=(ex.sets||[]).filter(s2=>s2.tag!=='warmup').reduce((b,s2)=>s2.weight*s2.reps>b.weight*b.reps?s2:b,{weight:ex.bestWeight||0,reps:ex.bestReps||0});
            const e1rm=estimate1RM(best.weight,best.reps);
            exDiv.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}},
              h('div',{style:{fontSize:'12px',fontWeight:'700',color:'var(--text)'}},ex.name),
              h('div',{style:{display:'flex',gap:'6px'}},
                e1rm?h('span',{style:{fontSize:'9px',fontWeight:'700',color:'var(--gold)'}},`e1RM ${e1rm}`):null,
                h('button',{style:{fontSize:'8px',fontWeight:'600',color:'var(--text3)',background:'rgba(255,255,255,0.04)',borderRadius:'4px',padding:'2px 6px'},onClick:(e)=>{e.stopPropagation();state.chartExId=ex.id;state.view='chart';render()}},'\u{1F4C8}'))));
            const chips=h('div',{style:{display:'flex',gap:'5px',flexWrap:'wrap'}});
            (ex.sets||[{weight:ex.bestWeight||0,reps:ex.bestReps||0}]).forEach(s2=>{const tc=TAG_COLORS[s2.tag]||'';
              chips.appendChild(h('span',{style:{fontSize:'9px',color:tc||'var(--text2)',background:'var(--bg2)',borderRadius:'5px',padding:'2px 7px'}},`${s2.tag&&s2.tag!=='normal'?TAG_LABELS[s2.tag]+' ':''}${s2.weight===0?'BW':s2.weight}\u00D7${s2.reps}`))});
            exDiv.appendChild(chips);detail.appendChild(exDiv)});
          card.appendChild(detail)}
        list.appendChild(card)});
      root.appendChild(list);
    }return;
  }

  // ═══════════════ CALENDAR VIEW (PHASE 2) ═══════════════
  if(state.view==='calendar'){
    const cm=state.calendarMonth||{year:new Date().getFullYear(),month:new Date().getMonth()};
    const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];

    root.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}},
      h('button',{style:{background:'none',color:'var(--text2)',fontSize:'14px',fontWeight:'600'},onClick:()=>{state.view='home';render()}},'\u2190 Back'),
      h('div',{style:{fontSize:'12px',fontWeight:'800',letterSpacing:'3px',color:'var(--text2)'}},'CALENDAR'),h('div',{style:{width:'50px'}})));

    // Month nav
    const monthNav=h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}});
    monthNav.appendChild(h('button',{style:{background:'rgba(255,255,255,0.04)',border:'1px solid var(--border)',borderRadius:'8px',padding:'8px 14px',color:'var(--text2)',fontSize:'14px',fontWeight:'700'},
      onClick:()=>{let m=cm.month-1,y=cm.year;if(m<0){m=11;y--}state.calendarMonth={year:y,month:m};render()}},'\u2190'));
    monthNav.appendChild(h('div',{style:{fontSize:'16px',fontWeight:'800',color:'var(--text)'}},`${monthNames[cm.month]} ${cm.year}`));
    monthNav.appendChild(h('button',{style:{background:'rgba(255,255,255,0.04)',border:'1px solid var(--border)',borderRadius:'8px',padding:'8px 14px',color:'var(--text2)',fontSize:'14px',fontWeight:'700'},
      onClick:()=>{let m=cm.month+1,y=cm.year;if(m>11){m=0;y++}state.calendarMonth={year:y,month:m};render()}},'\u2192'));
    root.appendChild(monthNav);

    // Day headers
    const dayHeaders=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'2px',marginBottom:'4px'}});
    ['M','T','W','T','F','S','S'].forEach(d=>{
      dayHeaders.appendChild(h('div',{style:{textAlign:'center',fontSize:'9px',fontWeight:'700',color:'var(--text3)',padding:'4px'}},d));
    });
    root.appendChild(dayHeaders);

    // Calendar grid
    const firstDay=new Date(cm.year,cm.month,1);
    const daysInMonth=new Date(cm.year,cm.month+1,0).getDate();
    let startDow=(firstDay.getDay()+6)%7; // Mon=0
    const today=new Date();const todayStr=`${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;

    // Build workout lookup for this month
    const workoutDays={};
    state.history.forEach(s=>{
      const d=new Date(s.date);
      if(d.getFullYear()===cm.year&&d.getMonth()===cm.month){
        const key=d.getDate();
        if(!workoutDays[key])workoutDays[key]=[];
        workoutDays[key].push(s);
      }
    });

    const grid=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'2px',marginBottom:'20px'}});
    // Empty cells before first day
    for(let i=0;i<startDow;i++)grid.appendChild(h('div',{style:{padding:'8px'}}));

    for(let d=1;d<=daysInMonth;d++){
      const isToday=cm.year===today.getFullYear()&&cm.month===today.getMonth()&&d===today.getDate();
      const sessions=workoutDays[d];
      const hasWorkout=sessions&&sessions.length>0;
      const cell=h('button',{style:{padding:'6px 4px',borderRadius:'8px',textAlign:'center',minHeight:'40px',
        background:isToday?'rgba(255,61,61,0.08)':hasWorkout?'rgba(255,255,255,0.03)':'transparent',
        border:isToday?'1px solid rgba(255,61,61,0.3)':'1px solid transparent',color:'var(--text)'},
        onClick:()=>{if(hasWorkout){
          // Find and expand in history
          const idx=state.history.findIndex(s=>{const sd=new Date(s.date);return sd.getFullYear()===cm.year&&sd.getMonth()===cm.month&&sd.getDate()===d});
          if(idx>=0){state.expandedSession=idx;state.view='history';render()}
        }}},
        h('div',{style:{fontSize:'12px',fontWeight:isToday?'800':'500',color:isToday?'var(--accent)':'var(--text)'}},String(d)),
        hasWorkout?h('div',{style:{display:'flex',justifyContent:'center',gap:'2px',marginTop:'2px'}},
          sessions.map(s=>h('div',{style:{width:'5px',height:'5px',borderRadius:'50%',background:s.dayColor||'var(--text3)'}}))):null);
      grid.appendChild(cell);
    }
    root.appendChild(grid);

    // Month summary
    const monthSessions=state.history.filter(s=>{const d=new Date(s.date);return d.getFullYear()===cm.year&&d.getMonth()===cm.month});
    if(monthSessions.length>0){
      const totalVol=monthSessions.reduce((sum,s)=>(s.exercises||[]).reduce((v,ex)=>v+calcVolume(ex.sets||[]),sum),0);
      const totalSets=monthSessions.reduce((sum,s)=>(s.exercises||[]).reduce((v,ex)=>v+(ex.sets||[]).filter(s2=>s2.tag!=='warmup').length,sum),0);
      const prsThisMonth=Object.entries(state.prRecords).filter(([id,pr])=>{const d=new Date(pr.date);return d.getFullYear()===cm.year&&d.getMonth()===cm.month}).length;

      root.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'2px',color:'var(--text3)',marginBottom:'8px'}},'MONTH SUMMARY'));
      const mStats=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'8px',marginBottom:'16px'}});
      [{val:monthSessions.length,label:'SESSIONS'},{val:totalSets,label:'SETS'},{val:totalVol.toLocaleString(),label:'VOLUME'},{val:prsThisMonth,label:'PRs'}].forEach(s=>{
        mStats.appendChild(h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'10px',padding:'10px 6px',textAlign:'center'}},
          h('div',{style:{fontSize:typeof s.val==='number'?'18px':'12px',fontWeight:'900',color:'var(--text)'}},String(s.val)),
          h('div',{style:{fontSize:'7px',fontWeight:'700',letterSpacing:'1px',color:'var(--text3)',marginTop:'2px'}},s.label)));
      });
      root.appendChild(mStats);

      // Sessions list for this month
      monthSessions.forEach((s,i)=>{
        const sessVol=(s.exercises||[]).reduce((sum,ex)=>sum+calcVolume(ex.sets||[]),0);
        root.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'10px',background:'var(--card)',border:'1px solid var(--border)',borderLeft:`3px solid ${s.dayColor||'#555'}`,borderRadius:'10px',padding:'10px 14px',marginBottom:'6px',animation:`fadeIn 0.2s ease ${i*30}ms forwards`,opacity:'0'}},
          h('span',{style:{fontSize:'14px'}},s.dayIcon||''),
          h('div',{style:{flex:'1'}},
            h('div',{style:{fontSize:'12px',fontWeight:'700',color:s.dayColor||'#aaa'}},s.dayName),
            h('div',{style:{fontSize:'9px',color:'var(--text3)'}},fmtDate(s.date))),
          h('div',{style:{textAlign:'right',fontSize:'10px'}},
            sessVol>0?h('div',{style:{fontWeight:'700',color:'var(--text)'}},`${sessVol.toLocaleString()} lbs`):null,
            s.duration?h('div',{style:{color:'var(--text3)',marginTop:'1px'}},fmtDuration(s.duration)):null)));
      });
    }else{
      root.appendChild(h('div',{style:{textAlign:'center',padding:'20px',color:'var(--text3)',fontSize:'12px'}},'No workouts this month'));
    }
    return;
  }

  // ═══════════════ VOLUME BY MUSCLE (PHASE 2) ═══════════════
  if(state.view==='volume'){
    root.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}},
      h('button',{style:{background:'none',color:'var(--text2)',fontSize:'14px',fontWeight:'600'},onClick:()=>{state.view='home';render()}},'\u2190 Back'),
      h('div',{style:{fontSize:'12px',fontWeight:'800',letterSpacing:'3px',color:'var(--text2)'}},'MUSCLE VOLUME'),h('div',{style:{width:'50px'}})));

    // Time period tabs
    const periods=[{weeks:1,label:'THIS WEEK'},{weeks:2,label:'2 WEEKS'},{weeks:4,label:'4 WEEKS'}];
    const periodIdx=state.volumePeriod||0;
    const periodRow=h('div',{style:{display:'flex',gap:'6px',marginBottom:'20px'}});
    periods.forEach((p,i)=>{
      const active=i===periodIdx;
      periodRow.appendChild(h('button',{style:{flex:'1',padding:'8px',borderRadius:'8px',fontSize:'10px',fontWeight:active?'800':'600',letterSpacing:'1px',
        background:active?'var(--card)':'transparent',color:active?'var(--text)':'var(--text3)',
        border:`1px solid ${active?'var(--border)':'transparent'}`},
        onClick:()=>{state.volumePeriod=i;render()}},p.label));
    });
    root.appendChild(periodRow);

    const vol=getWeeklyVolume(periods[periodIdx].weeks);
    const entries=Object.entries(vol).sort((a,b)=>b[1].sets-a[1].sets);

    if(entries.length===0){
      root.appendChild(h('div',{style:{textAlign:'center',paddingTop:'40px'}},
        h('div',{style:{fontSize:'48px',marginBottom:'12px'}},'\u{1F4CA}'),
        h('div',{style:{color:'var(--text3)',fontSize:'14px'}},'No data for this period')));
      return;
    }

    const maxSets=Math.max(...entries.map(([,v])=>v.sets));
    const totalSets=entries.reduce((sum,[,v])=>sum+v.sets,0);
    const totalVol=entries.reduce((sum,[,v])=>sum+v.volume,0);

    // Totals
    root.appendChild(h('div',{style:{display:'flex',gap:'10px',marginBottom:'20px'}},
      h('div',{style:{flex:'1',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'12px',padding:'14px',textAlign:'center'}},
        h('div',{style:{fontSize:'24px',fontWeight:'900',color:'var(--text)'}},String(totalSets)),
        h('div',{style:{fontSize:'8px',fontWeight:'700',letterSpacing:'2px',color:'var(--text3)',marginTop:'2px'}},'TOTAL SETS')),
      h('div',{style:{flex:'1',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'12px',padding:'14px',textAlign:'center'}},
        h('div',{style:{fontSize:'20px',fontWeight:'900',color:'var(--text)'}},totalVol.toLocaleString()),
        h('div',{style:{fontSize:'8px',fontWeight:'700',letterSpacing:'2px',color:'var(--text3)',marginTop:'2px'}},'TOTAL VOLUME'))));

    // Per-muscle bars
    const muscleColors={Back:'#4d8df7',Chest:'#ff3d3d',Shoulders:'#ff8500',Biceps:'#c45fff',Triceps:'#ffb800',Quads:'#3dd68c',Hamstrings:'#00c9db',Calves:'#ff5599',Glutes:'#8866ff',Other:'#888'};

    entries.forEach(([muscle,data],i)=>{
      const col=muscleColors[muscle]||'#888';
      const pct=data.sets/maxSets*100;
      const card=h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'10px',padding:'12px 14px',marginBottom:'6px',animation:`fadeIn 0.25s ease ${i*40}ms forwards`,opacity:'0'}});
      card.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}},
        h('div',{style:{fontSize:'13px',fontWeight:'800',color:col}},muscle),
        h('div',{style:{display:'flex',gap:'12px',fontSize:'10px'}},
          h('span',{style:{color:'var(--text)'}},h('span',{style:{fontWeight:'800'}},String(data.sets)),h('span',{style:{color:'var(--text3)'}},' sets')),
          h('span',{style:{color:'var(--text3)'}},data.volume.toLocaleString(),' vol'))));
      // Bar
      card.appendChild(h('div',{style:{height:'6px',background:'rgba(255,255,255,0.04)',borderRadius:'3px',overflow:'hidden'}},
        h('div',{style:{height:'100%',width:`${pct}%`,background:col,borderRadius:'3px',transition:'width 0.5s'}})));
      // Exercise list
      if(data.exercises.size>0){
        card.appendChild(h('div',{style:{marginTop:'6px',fontSize:'9px',color:'var(--text3)'}},[...data.exercises].join(' \u2022 ')));
      }
      root.appendChild(card);
    });

    // Balance analysis
    const muscleGroups=['Back','Chest','Shoulders','Quads','Hamstrings'];
    const tracked=muscleGroups.filter(m=>vol[m]);
    if(tracked.length>=2){
      const imbalances=[];
      // Push/pull ratio
      const pushSets=(vol['Chest']?.sets||0)+(vol['Shoulders']?.sets||0)+(vol['Triceps']?.sets||0);
      const pullSets=(vol['Back']?.sets||0)+(vol['Biceps']?.sets||0);
      if(pushSets>0&&pullSets>0){
        const ratio=pullSets/pushSets;
        if(ratio<0.7)imbalances.push({msg:'More pulling volume recommended (pull:push ratio is low)',type:'warn'});
        else if(ratio>=0.9&&ratio<=1.3)imbalances.push({msg:`Pull:push ratio is balanced (${ratio.toFixed(1)}:1)`,type:'good'});
      }
      // Quad/ham ratio
      const quadSets=vol['Quads']?.sets||0;
      const hamSets=vol['Hamstrings']?.sets||0;
      if(quadSets>0&&hamSets===0)imbalances.push({msg:'No hamstring work detected - add RDLs or curls',type:'warn'});

      if(imbalances.length>0){
        root.appendChild(h('div',{style:{marginTop:'16px',fontSize:'9px',fontWeight:'700',letterSpacing:'2px',color:'var(--text3)',marginBottom:'8px'}},'BALANCE CHECK'));
        imbalances.forEach(ib=>{
          const isGood=ib.type==='good';
          root.appendChild(h('div',{style:{background:isGood?'rgba(61,214,140,0.06)':'rgba(255,133,0,0.06)',border:`1px solid ${isGood?'rgba(61,214,140,0.15)':'rgba(255,133,0,0.15)'}`,borderRadius:'8px',padding:'10px 12px',marginBottom:'6px',fontSize:'11px',color:isGood?'#3dd68c':'#ff8500',fontWeight:'600'}},ib.msg));
        });
      }
    }
    return;
  }

  // ═══════════════ BODY MEASUREMENTS (PHASE 3) ═══════════════
  if(state.view==='measurements'){
    root.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}},
      h('button',{style:{background:'none',color:'var(--text2)',fontSize:'14px',fontWeight:'600'},onClick:()=>{state.view='home';render()}},'\u2190 Back'),
      h('div',{style:{fontSize:'12px',fontWeight:'800',letterSpacing:'3px',color:'var(--text2)'}},'MEASUREMENTS'),h('div',{style:{width:'50px'}})));

    // Input form
    const form=h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'14px',padding:'16px',marginBottom:'20px'}});
    form.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'800',letterSpacing:'2px',color:'var(--text3)',marginBottom:'12px'}},'LOG MEASUREMENT'));

    const fields=[
      {key:'bodyWeight',label:'Body Weight',unit:state.profile.weightUnit||'lbs',placeholder:'185'},
      {key:'bodyFat',label:'Body Fat',unit:'%',placeholder:'15'},
      {key:'chest',label:'Chest',unit:'in',placeholder:'42'},
      {key:'waist',label:'Waist',unit:'in',placeholder:'34'},
      {key:'arms',label:'Arms',unit:'in',placeholder:'15'},
      {key:'hips',label:'Hips',unit:'in',placeholder:'38'},
    ];
    const inputs={};
    const inputGrid=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'12px'}});
    fields.forEach(f=>{
      const inp=h('input',{type:'number',placeholder:f.placeholder,style:{width:'100%',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'8px',padding:'8px 10px',color:'var(--text)',fontSize:'13px',fontFamily:'inherit',outline:'none'}});
      inputs[f.key]=inp;
      inputGrid.appendChild(h('div',{},
        h('div',{style:{fontSize:'9px',fontWeight:'700',color:'var(--text3)',marginBottom:'4px'}},`${f.label} (${f.unit})`),
        inp));
    });
    form.appendChild(inputGrid);
    form.appendChild(h('button',{style:{width:'100%',padding:'10px',borderRadius:'10px',background:'var(--accent)',color:'#fff',fontSize:'12px',fontWeight:'800',letterSpacing:'1px'},
      onClick:()=>{
        const entry={};let hasData=false;
        fields.forEach(f=>{const v=parseFloat(inputs[f.key].value);if(v>0){entry[f.key]=v;hasData=true}});
        if(!hasData){showToast('Enter at least one measurement');return}
        addMeasurement(entry);showToast('Measurement logged');render();
      }},'LOG MEASUREMENT'));
    root.appendChild(form);

    // History
    if(state.measurements.length>0){
      root.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'2px',color:'var(--text3)',marginBottom:'8px'}},'MEASUREMENT HISTORY'));

      // Trend summary if 2+ entries
      if(state.measurements.length>=2){
        const latest=state.measurements[0];
        const prev=state.measurements[1];
        const trends=h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'16px'}});
        fields.forEach(f=>{
          if(latest[f.key]&&prev[f.key]){
            const diff=latest[f.key]-prev[f.key];
            if(diff!==0){
              const isDown=diff<0;
              const good=(f.key==='bodyFat'||f.key==='waist')?isDown:(!isDown); // losing fat/waist = good
              trends.appendChild(h('div',{style:{background:good?'rgba(61,214,140,0.06)':'rgba(255,133,0,0.06)',border:`1px solid ${good?'rgba(61,214,140,0.15)':'rgba(255,133,0,0.15)'}`,borderRadius:'8px',padding:'6px 10px',fontSize:'10px'}},
                h('span',{style:{color:'var(--text3)',marginRight:'4px'}},f.label+':'),
                h('span',{style:{fontWeight:'700',color:good?'#3dd68c':'#ff8500'}},`${isDown?'':'+'}${diff.toFixed(1)} ${f.unit}`)));
            }
          }
        });
        root.appendChild(trends);
      }

      state.measurements.slice(0,20).forEach((m,i)=>{
        const card=h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'10px',padding:'12px 14px',marginBottom:'6px',animation:`fadeIn 0.2s ease ${i*30}ms forwards`,opacity:'0'}});
        card.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}},
          h('div',{style:{fontSize:'11px',fontWeight:'600',color:'var(--text)'}},fmtDate(m.date)),
          h('button',{style:{fontSize:'8px',color:'var(--text3)',background:'none',border:'none',padding:'2px 6px'},onClick:()=>{state.measurements.splice(i,1);save();render()}},'\u2715')));
        const chips=h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap'}});
        fields.forEach(f=>{
          if(m[f.key])chips.appendChild(h('span',{style:{fontSize:'10px',color:'var(--text2)',background:'rgba(255,255,255,0.04)',borderRadius:'6px',padding:'3px 8px'}},
            `${f.label}: ${m[f.key]}${f.unit}`));
        });
        card.appendChild(chips);root.appendChild(card);
      });
    }else{
      root.appendChild(h('div',{style:{textAlign:'center',paddingTop:'20px'}},
        h('div',{style:{fontSize:'36px',marginBottom:'8px'}},'\u{1F4CF}'),
        h('div',{style:{color:'var(--text3)',fontSize:'12px'}},'No measurements yet. Track your progress!')));
    }
    return;
  }

  // ═══════════════ SETTINGS (PHASE 1-3) ═══════════════
  if(state.view==='settings'){
    root.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}},
      h('button',{style:{background:'none',color:'var(--text2)',fontSize:'14px',fontWeight:'600'},onClick:()=>{state.view='home';render()}},'\u2190 Back'),
      h('div',{style:{fontSize:'12px',fontWeight:'800',letterSpacing:'3px',color:'var(--text2)'}},'SETTINGS'),h('div',{style:{width:'50px'}})));

    // PHASE 1: Data Export Section
    const exportSec=h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'14px',padding:'16px',marginBottom:'16px'}});
    exportSec.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'800',letterSpacing:'2px',color:'var(--text3)',marginBottom:'12px'}},'DATA EXPORT'));
    exportSec.appendChild(h('div',{style:{fontSize:'10px',color:'var(--text3)',marginBottom:'12px',lineHeight:'1.5'}},'Download your workout data. CSV for spreadsheets, JSON for backup/restore.'));

    const exportRow=h('div',{style:{display:'flex',gap:'10px'}});
    exportRow.appendChild(h('button',{style:{flex:'1',padding:'12px',borderRadius:'10px',background:'rgba(61,214,140,0.08)',border:'1px solid rgba(61,214,140,0.2)',color:'#3dd68c',fontSize:'12px',fontWeight:'800',letterSpacing:'1px',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px'},
      onClick:()=>exportCSV()},'\u{1F4CB} CSV'));
    exportRow.appendChild(h('button',{style:{flex:'1',padding:'12px',borderRadius:'10px',background:'rgba(77,141,247,0.08)',border:'1px solid rgba(77,141,247,0.2)',color:'#4d8df7',fontSize:'12px',fontWeight:'800',letterSpacing:'1px',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px'},
      onClick:()=>exportJSON()},'\u{1F4BE} JSON BACKUP'));
    exportSec.appendChild(exportRow);

    // Stats count
    exportSec.appendChild(h('div',{style:{marginTop:'10px',fontSize:'9px',color:'var(--text3)',display:'flex',gap:'16px'}},
      h('span',{},`${state.history.length} sessions`),
      h('span',{},`${Object.keys(state.prRecords).length} PRs`),
      h('span',{},`${Object.keys(state.lastWeights).length} exercises tracked`)));
    root.appendChild(exportSec);

    // Rest timer default
    const restSec=h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'14px',padding:'16px',marginBottom:'16px'}});
    restSec.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'800',letterSpacing:'2px',color:'var(--text3)',marginBottom:'12px'}},'REST TIMER DEFAULT'));
    const restRow=h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap'}});
    REST_PRESETS.forEach(sec=>{const active=state.restSeconds===sec;
      restRow.appendChild(h('button',{style:{padding:'8px 14px',borderRadius:'8px',fontSize:'12px',fontWeight:active?'800':'500',
        background:active?'rgba(255,61,61,0.12)':'var(--bg2)',
        border:`1px solid ${active?'rgba(255,61,61,0.3)':'var(--border)'}`,
        color:active?'var(--accent)':'var(--text3)'},
        onClick:()=>{state.restSeconds=sec;save();render()}},fmtTime(sec)))});
    restSec.appendChild(restRow);
    root.appendChild(restSec);

    // PHASE 3: Custom exercises management
    if(state.customExercises.length>0){
      const customSec=h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'14px',padding:'16px',marginBottom:'16px'}});
      customSec.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'800',letterSpacing:'2px',color:'var(--text3)',marginBottom:'12px'}},'CUSTOM EXERCISES'));
      state.customExercises.forEach((ex,i)=>{
        customSec.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:i<state.customExercises.length-1?'1px solid rgba(255,255,255,0.03)':'none'}},
          h('div',{},
            h('span',{style:{fontSize:'12px',fontWeight:'600',color:'var(--text)'}},ex.name),
            h('span',{style:{fontSize:'10px',color:'var(--text3)',marginLeft:'8px'}},ex.cat||'')),
          h('button',{style:{fontSize:'8px',color:'var(--text3)',background:'rgba(255,255,255,0.04)',border:'1px solid var(--border)',borderRadius:'4px',padding:'2px 8px'},
            onClick:()=>{
              state.customExercises.splice(i,1);
              const libIdx=EXERCISE_LIBRARY.findIndex(e=>e.id===ex.id);
              if(libIdx>=0)EXERCISE_LIBRARY.splice(libIdx,1);
              save();render();showToast(`Removed ${ex.name}`);
            }},'\u2715')));
      });
      root.appendChild(customSec);
    }

    // PHASE 3: Bar weight setting
    const barSec=h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'14px',padding:'16px',marginBottom:'16px'}});
    barSec.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'800',letterSpacing:'2px',color:'var(--text3)',marginBottom:'12px'}},'BAR WEIGHT'));
    const barRow=h('div',{style:{display:'flex',gap:'6px'}});
    [20,25,35,45,55,65].forEach(w=>{const active=state.barWeight===w;
      barRow.appendChild(h('button',{style:{padding:'8px 12px',borderRadius:'8px',fontSize:'12px',fontWeight:active?'800':'500',
        background:active?'rgba(255,61,61,0.12)':'var(--bg2)',
        border:`1px solid ${active?'rgba(255,61,61,0.3)':'var(--border)'}`,
        color:active?'var(--accent)':'var(--text3)'},
        onClick:()=>{state.barWeight=w;save();render()}},`${w} lbs`))});
    barSec.appendChild(barRow);
    root.appendChild(barSec);

    // Reset data
    root.appendChild(h('button',{style:{width:'100%',padding:'12px',borderRadius:'10px',background:'rgba(255,61,61,0.06)',border:'1px solid rgba(255,61,61,0.2)',color:'#ff3d3d',fontSize:'12px',fontWeight:'700',letterSpacing:'1px'},
      onClick:()=>{
        if(confirm('Reset ALL standalone data? This cannot be undone.')){
          ['p1_prs','p1_history','p1_days','p1_rest','p1_profile','p1_lastWeights','p1_measurements','p1_customEx','p1_supersets'].forEach(k=>localStorage.removeItem(`${SK}-${k}`));
          location.reload();
        }
      }},'\u{1F5D1} RESET ALL DATA'));
    return;
  }
}

// Live e1RM update (no re-render)
function updateE1rmDisplay(){
  // Updates handled in picker onChange — since we re-render for PR indicator anyway,
  // the e1RM display updates naturally via the render cycle
}

// ── Init ──
state.prRecords=store.get('p1_prs')||{};
state.history=store.get('p1_history')||[];
state.days=store.get('p1_days')||JSON.parse(JSON.stringify(DEFAULT_DAYS));
state.restSeconds=store.get('p1_rest')||90;
state.lastWeights=store.get('p1_lastWeights')||{};
state.measurements=store.get('p1_measurements')||[];
state.customExercises=store.get('p1_customEx')||[];
state.supersets=store.get('p1_supersets')||{};
// Restore custom exercises into library
state.customExercises.forEach(e=>{if(!EXERCISE_LIBRARY.find(x=>x.id===e.id)){EXERCISE_LIBRARY.push(e);if(e.cat)EX_MUSCLES[e.id]=e.cat}});
const savedProfile=store.get('p1_profile')||{};
state.profile={weight:savedProfile.weight||'185',weightUnit:savedProfile.weightUnit||'lbs',skillLevel:savedProfile.skillLevel||'intermediate'};

// ── Load mock data if empty ──
if(state.history.length===0){
  // Seed with some realistic history so PR page and features have data to show
  const now=Date.now();
  const mockHistory=[
    {date:new Date(now-14*864e5).toISOString(),dayId:'back_biceps',dayName:'BACK + BICEPS',dayColor:'#4d8df7',dayIcon:'\u{1F525}',duration:3420,rpe:7,
      exercises:[
        {id:'pullups',name:'Pull-Ups',sets:[{weight:0,reps:8,set:1,tag:'normal',rpe:7},{weight:0,reps:7,set:2,tag:'normal',rpe:8},{weight:0,reps:6,set:3,tag:'normal',rpe:8}],bestWeight:0,bestReps:8},
        {id:'bb_row',name:'Barbell Row',sets:[{weight:155,reps:8,set:1,tag:'normal',rpe:7},{weight:155,reps:7,set:2,tag:'normal',rpe:8},{weight:165,reps:6,set:3,tag:'normal',rpe:8}],bestWeight:165,bestReps:6},
        {id:'bb_curl',name:'Barbell Curl',sets:[{weight:65,reps:10,set:1,tag:'normal',rpe:7},{weight:70,reps:8,set:2,tag:'normal',rpe:8}],bestWeight:70,bestReps:8},
      ]},
    {date:new Date(now-13*864e5).toISOString(),dayId:'chest_triceps',dayName:'CHEST + TRICEPS',dayColor:'#ff3d3d',dayIcon:'\u{1F4A5}',duration:3780,rpe:8,
      exercises:[
        {id:'db_bench',name:'DB Bench Press',sets:[{weight:70,reps:8,set:1,tag:'normal',rpe:7},{weight:75,reps:6,set:2,tag:'normal',rpe:8},{weight:75,reps:5,set:3,tag:'normal',rpe:9}],bestWeight:75,bestReps:6},

  state.history=mockHistory;

  // Build PRs from mock history
  mockHistory.forEach(sess=>{
    sess.exercises.forEach(ex=>{
      const workSets=(ex.sets||[]).filter(s=>s.tag!=='warmup');
      if(workSets.length===0)return;
      const best=workSets.reduce((b,s)=>s.weight*s.reps>b.weight*b.reps?s:b,workSets[0]);
      const old=state.prRecords[ex.id];
      if(!old||best.weight*best.reps>old.weight*old.reps){
        state.prRecords[ex.id]={weight:best.weight,reps:best.reps,date:sess.date};
      }
    });
  });

  // Build lastWeights
  mockHistory.forEach(sess=>{
    sess.exercises.forEach(ex=>{
      const workSets=(ex.sets||[]).filter(s=>s.tag!=='warmup');
      if(workSets.length>0){
        const heaviest=workSets.reduce((a,s)=>s.weight>a.weight?s:a,workSets[0]);
        state.lastWeights[ex.id]={weight:heaviest.weight,reps:heaviest.reps,date:sess.date};
      }
    });
  });

  save();
}

render();
</script>
