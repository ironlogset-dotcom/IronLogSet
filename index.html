input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
button{font-family:inherit;-webkit-tap-highlight-color:transparent;border:none;cursor:pointer}
.picker-scroll{scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch}.picker-scroll>div{scroll-snap-align:center}

.toast span{font-size:14px;font-weight:700;color:var(--text)}
.chart-bar{transition:height .5s ease}

// ── Audio (Web Audio API) ──
let audioCtx=null;
function ensureAudio(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}return audioCtx}
document.addEventListener('touchstart',ensureAudio,{once:true});
document.addEventListener('click',ensureAudio,{once:true});
function playDing(){
  try{
    const ctx=ensureAudio();if(!ctx)return;
    const t=ctx.currentTime;
    [880,1100].forEach((freq,i)=>{
      const osc=ctx.createOscillator();const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sine';osc.frequency.value=freq;
      const s=t+i*0.3;
      gain.gain.setValueAtTime(0.25,s);gain.gain.exponentialRampToValueAtTime(0.001,s+0.5);
      osc.start(s);osc.stop(s+0.6);
    });
  }catch(e){}
}

// ── Rest Timer (timestamp-based — survives backgrounding) ──
function startRest(){
  stopRest();
  state.restEndTime=Date.now()+state.restSeconds*1000;
  state.restActive=true;
  function tick(){
    const remaining=Math.max(0,Math.ceil((state.restEndTime-Date.now())/1000));
    state.restRemaining=remaining;
    const el=document.getElementById('rest-display');
    if(el)el.textContent=fmtTime(remaining);
    const prog=document.getElementById('rest-progress');
    if(prog)prog.style.width=`${Math.min(100,((state.restSeconds-remaining)/state.restSeconds)*100)}%`;
    if(remaining<=0){
      state.restActive=false;state.restRemaining=0;state.restEndTime=null;state.restInterval=null;
      try{if(navigator.vibrate)navigator.vibrate([200,100,200])}catch{}
      playDing();
      showToast('\u23F0 Rest complete! Go time.');
      render();
    }else{state.restInterval=setTimeout(tick,250)}
  }
  tick();render();
}
function stopRest(){if(state.restInterval){clearTimeout(state.restInterval);state.restInterval=null}state.restActive=false;state.restRemaining=0;state.restEndTime=null}

// ── CSV Export ──
function exportCSV(){
  let csv='Date,Day,Exercise,Set,Weight,Reps,Tag,RPE,Volume,AssistWeight\n';
  state.history.forEach(sess=>{
    if(sess.type==='activity'){
      csv+=`"${new Date(sess.date).toISOString()}","${sess.dayName}","Activity",,,,,,${sess.duration||''}min\n`;
      return;
    }
    sess.exercises.forEach(ex=>{
      (ex.sets||[]).forEach(s=>{
        csv+=`"${new Date(sess.date).toISOString()}","${sess.dayName}","${ex.name}",${s.set},${s.weight},${s.reps},${s.tag||'normal'},${s.rpe||''},${s.weight*s.reps},${s.assistWeight||''}\n`;
      });
    });
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`ironlog-export-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('CSV downloaded \u2705');
}

// ── Progress Chart (canvas-based) ──
function drawChart(container,exId,color){
  const sessions=state.history.filter(s=>s.exercises.some(e=>e.id===exId)).reverse();
  if(sessions.length<2){container.appendChild(h('div',{style:{textAlign:'center',padding:'20px',color:'var(--text3)',fontSize:'12px'}},'Need 2+ sessions to show chart'));return}
  const points=sessions.map(s=>{
    const ex=s.exercises.find(e=>e.id===exId);
    const best=ex.sets?ex.sets.reduce((b,cur)=>cur.weight*cur.reps>b.weight*b.reps?cur:b,ex.sets[0]):{weight:ex.bestWeight||0,reps:ex.bestReps||0};
    return{date:new Date(s.date),weight:best.weight,reps:best.reps,vol:best.weight*best.reps};
  }).slice(-12);

  const maxW=Math.max(...points.map(p=>p.weight));
  const minW=Math.min(...points.map(p=>p.weight));
  const range=maxW-minW||1;
  const W=Math.min(container.offsetWidth||300,400);
  const H=140;

  const canvas=document.createElement('canvas');canvas.width=W*2;canvas.height=H*2;
  canvas.style.cssText=`width:${W}px;height:${H}px`;
  const ctx=canvas.getContext('2d');ctx.scale(2,2);

  const padL=36,padR=10,padT=10,padB=28;
  const cw=W-padL-padR,ch=H-padT-padB;

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
  for(let i=0;i<4;i++){const y=padT+ch*(i/3);ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke()}

  // Y labels
  ctx.fillStyle='#555570';ctx.font='9px system-ui';ctx.textAlign='right';
  for(let i=0;i<4;i++){const val=maxW-range*(i/3);ctx.fillText(val%1===0?val:val.toFixed(1),padL-6,padT+ch*(i/3)+3)}

  // Line + area
  const pts=points.map((p,i)=>({x:padL+cw*(i/(points.length-1)),y:padT+ch*(1-(p.weight-minW)/range)}));
  
  // Area fill
  ctx.beginPath();ctx.moveTo(pts[0].x,H-padB);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H-padB);ctx.closePath();
  const grad=ctx.createLinearGradient(0,padT,0,H-padB);
  grad.addColorStop(0,color+'30');grad.addColorStop(1,color+'05');
  ctx.fillStyle=grad;ctx.fill();

  // Line
  ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();

  // Dots
  pts.forEach((p,i)=>{
    ctx.beginPath();ctx.arc(p.x,p.y,i===pts.length-1?4:2.5,0,Math.PI*2);
    ctx.fillStyle=i===pts.length-1?color:'#fff';ctx.fill();
    if(i===pts.length-1){ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke()}
  });

  // X labels
  ctx.fillStyle='#555570';ctx.font='8px system-ui';ctx.textAlign='center';
  const step=Math.max(1,Math.floor(points.length/5));
  points.forEach((p,i)=>{if(i%step===0||i===points.length-1)ctx.fillText(`${p.date.getMonth()+1}/${p.date.getDate()}`,pts[i].x,H-padB+14)});

  container.appendChild(canvas);

  // Latest stats
  const latest=points[points.length-1];
  const prev=points.length>=2?points[points.length-2]:null;
  const diff=prev?latest.weight-prev.weight:0;
  container.appendChild(h('div',{style:{display:'flex',justifyContent:'center',gap:'16px',marginTop:'8px',fontSize:'11px'}},
    h('span',{style:{color:'var(--text2)'}},`Latest: `,h('span',{style:{fontWeight:'800',color}},`${latest.weight} x ${latest.reps}`)),
    diff!==0?h('span',{style:{color:diff>0?'#3dd68c':'#ff3d3d',fontWeight:'700'}},`${diff>0?'\u2191':'\u2193'}${Math.abs(diff).toFixed(1)} lbs`):null
  ));
}

// ── ScrollPicker ──
function createPicker(options,value,onChange,label,format,color){
  const ITEM_H=48;const fmt=format||(v=>v);
  const container=h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',flex:'1'}});
  container.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'2px',color:'#555570',marginBottom:'8px'}},label));
  const wrapper=h('div',{style:{position:'relative',height:`${ITEM_H*3}px`,width:'100%',overflow:'hidden',borderRadius:'14px',background:'#0a0a14'}});
  wrapper.appendChild(h('div',{style:{position:'absolute',top:`${ITEM_H}px`,left:'4px',right:'4px',height:`${ITEM_H}px`,borderRadius:'10px',background:`${color}15`,border:`1px solid ${color}30`,pointerEvents:'none',zIndex:'1'}}));
  wrapper.appendChild(h('div',{style:{position:'absolute',top:'0',left:'0',right:'0',height:`${ITEM_H}px`,background:'linear-gradient(to bottom, #0a0a14 20%, transparent)',pointerEvents:'none',zIndex:'2'}}));
  wrapper.appendChild(h('div',{style:{position:'absolute',bottom:'0',left:'0',right:'0',height:`${ITEM_H}px`,background:'linear-gradient(to top, #0a0a14 20%, transparent)',pointerEvents:'none',zIndex:'2'}}));
  const scroll=h('div',{className:'picker-scroll',style:{height:'100%',overflowY:'auto',paddingTop:`${ITEM_H}px`,paddingBottom:`${ITEM_H}px`}});
  let isScrolling=false;
  options.forEach((opt,i)=>{
    const selected=opt===value;
    scroll.appendChild(h('div',{style:{height:`${ITEM_H}px`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:selected?'26px':'18px',fontWeight:selected?'900':'500',color:selected?color:'#333348',transition:'all 0.15s',cursor:'pointer'},
      onClick:()=>{onChange(opt);scroll.scrollTo({top:i*ITEM_H,behavior:'smooth'})}},String(fmt(opt))));
  });
  scroll.addEventListener('scroll',()=>{if(isScrolling)return;isScrolling=true;requestAnimationFrame(()=>{const idx=Math.round(scroll.scrollTop/ITEM_H);const c=Math.max(0,Math.min(idx,options.length-1));if(options[c]!==value)onChange(options[c]);isScrolling=false})});
  wrapper.appendChild(scroll);container.appendChild(wrapper);
  requestAnimationFrame(()=>{const idx=options.indexOf(value);if(idx>=0)scroll.scrollTop=idx*ITEM_H});
  return container;
}

// ── Wake Lock (native + iOS video fallback) ──
async function toggleWakeLock(){
  if(state.wakeLockEnabled){
    if(state.wakeLockSentinel){try{await state.wakeLockSentinel.release()}catch(e){}state.wakeLockSentinel=null}
    if(state.wakeLockVideo){state.wakeLockVideo.pause();state.wakeLockVideo.remove();state.wakeLockVideo=null}
    state.wakeLockEnabled=false;store.set('wakeLock',false);showToast('Screen lock re-enabled');
  }else{
    try{
      // Try native Wake Lock API first (Android/Chrome)
      state.wakeLockSentinel=await navigator.wakeLock.request('screen');
      state.wakeLockEnabled=true;store.set('wakeLock',true);
      showToast('\u{1F506} Screen will stay on (uses more battery)');
      state.wakeLockSentinel.addEventListener('release',()=>{state.wakeLockEnabled=false;state.wakeLockSentinel=null});
    }catch(e){
      // iOS fallback: tiny silent canvas-stream video prevents sleep
      try{
        const canvas=document.createElement('canvas');canvas.width=canvas.height=1;
        canvas.getContext('2d').fillRect(0,0,1,1);
        const stream=canvas.captureStream(1);
        const video=document.createElement('video');
        video.srcObject=stream;video.muted=true;video.loop=true;
        video.setAttribute('playsinline','');
        video.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0.001;pointer-events:none;z-index:-1';
        document.body.appendChild(video);
        await video.play();
        state.wakeLockVideo=video;state.wakeLockEnabled=true;store.set('wakeLock',true);
        showToast('\u{1F506} Screen will stay on (iOS mode)');
      }catch(e2){showToast('Wake lock not supported on this device');state.wakeLockEnabled=false}
    }
  }
  render();
}

// ── Edit Last Set ──
function undoLastSet(){
  const day=state.selectedDay;const ex=day.exercises[state.exIndex];
  const sets=state.sessionSets[ex.id];
  if(!sets||sets.length===0){showToast('No sets to undo');return}
  const removed=sets.pop();
  if(removed.tag!=='warmup'&&state.currentSet>1)state.currentSet--;
  state.setWeight=removed.weight;state.setReps=removed.reps;state.setTag=removed.tag||'normal';
  showToast('Set removed \u21A9');render();
}

// ── Progress Pics ──
function captureProgressPic(dayName){
  const input=document.createElement('input');
  input.type='file';input.accept='image/*';input.capture='environment';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      // Compress to reasonable size
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const maxDim=800;const scale=Math.min(maxDim/img.width,maxDim/img.height,1);
        canvas.width=img.width*scale;canvas.height=img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        const dataUrl=canvas.toDataURL('image/jpeg',0.7);
        state.progressPics.push({date:new Date().toISOString(),dayName,dataUrl});
        store.set('pics',state.progressPics);
        showToast('\u{1F4F8} Progress pic saved!');render();
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

// ── Deload Detection ──
function checkDeload(){
  if(state.deloadDismiss&&(Date.now()-new Date(state.deloadDismiss).getTime())<7*864e5)return{needed:false};
  const liftSessions=state.history.filter(s=>s.type!=='activity');
  if(liftSessions.length<3)return{needed:false};
  // 1. Rising RPE
  const r3=liftSessions.slice(0,3).filter(s=>s.rpe);const p3=liftSessions.slice(3,6).filter(s=>s.rpe);
  if(r3.length>=3&&p3.length>=3){
    const ra=r3.reduce((a,s)=>a+s.rpe,0)/r3.length;const pa=p3.reduce((a,s)=>a+s.rpe,0)/p3.length;
    if(ra>=8&&ra-pa>=1.5)return{needed:true,reason:`Avg session RPE rose to ${ra.toFixed(1)} \u2014 up ${(ra-pa).toFixed(1)} pts from your previous baseline. Your body is accumulating fatigue.`};
  }
  // 2. Consistent heavy volume
  const sixWks=Date.now()-42*864e5;
  const n6=liftSessions.filter(s=>new Date(s.date).getTime()>sixWks).length;
  if(n6>=12)return{needed:true,reason:`${n6} lifting sessions in the last 6 weeks. Consistent heavy training demands a periodic deload.`};
  // 3. PR stagnation
  if(liftSessions.length>=8&&Object.keys(state.prRecords).length>0){
    const dates=Object.values(state.prRecords).map(p=>new Date(p.date).getTime());
    const days=Math.floor((Date.now()-Math.max(...dates))/864e5);
    if(days>=21)return{needed:true,reason:`No new PRs in ${days} days across ${liftSessions.length} sessions. Accumulated fatigue may be blunting your progress.`};
  }
  return{needed:false};
}

            h('div',{style:{fontSize:'10px',color:'var(--text3)',marginTop:'2px'}},`${ex.sets} sets x ${ex.repRange}${pr?'':''}`),
            pr?h('div',{style:{fontSize:'10px',color:'var(--gold)',marginTop:'1px'}},`PR: ${pr.weight} x ${pr.reps}`):null),
          h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
            done>0?h('span',{style:{fontSize:'10px',fontWeight:'700',color:complete?'#3dd68c':day.color,background:complete?'rgba(61,214,140,0.12)':day.colorGlow,borderRadius:'6px',padding:'3px 8px'}},`${done}/${ex.sets}`):null,
            h('span',{style:{fontSize:'16px',color:'var(--text3)'}},'\u203A')))));
    });root.appendChild(exList);return;
  }

  // ═══════════════ FULLSCREEN EXERCISE ═══════════════
  if(state.view==='exercise'&&state.selectedDay){
    const day=state.selectedDay;const ex=day.exercises[state.exIndex];
    const pr=state.prRecords[ex.id];const logged=state.sessionSets[ex.id]||[];
    const isLastSet=state.currentSet>=ex.sets;const isLastEx=state.exIndex>=day.exercises.length-1;
    const isNewPr=state.setWeight*state.setReps>(pr?pr.weight*pr.reps:0)&&state.setWeight*state.setReps>0;

    root.style.padding='0';root.style.display='flex';root.style.flexDirection='column';root.style.overflow='hidden';

    // Top bar
    root.appendChild(h('div',{style:{padding:`calc(12px + var(--safe-t)) 16px 0`,display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('button',{style:{background:'none',color:'var(--text2)',fontSize:'14px',fontWeight:'600',padding:'4px 0'},onClick:()=>{state.view='day';render()}},'\u2190 Exercises'),
      h('button',{style:{background:'none',color:'var(--text3)',fontSize:'12px',fontWeight:'600'},onClick:()=>skipExercise()},`${isLastEx?'Finish':'Skip'} \u203A`)));

    // Exercise info
    const info=h('div',{style:{padding:'12px 20px 0',textAlign:'center'}});
    info.appendChild(h('div',{style:{fontSize:'10px',fontWeight:'700',letterSpacing:'3px',color:day.color,marginBottom:'4px'}},`${state.exIndex+1} / ${day.exercises.length}`));
    // Show swap indicator if active
    const swap=state.sessionSwaps[ex.id];
    const displayName=swap?swap.subName:ex.name;
    const displayId=swap?swap.subId:ex.id;
    info.appendChild(h('div',{style:{fontSize:'20px',fontWeight:'900',color:'var(--text)',marginBottom:'2px'}},displayName));
    if(swap)info.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'1px',color:'var(--text3)',marginBottom:'2px'}},'\u21BA SWAPPED FROM: '+ex.name));
    else if(ex.sub)info.appendChild(h('div',{style:{fontSize:'11px',color:'var(--text3)',marginBottom:'2px'}},ex.sub));
    // Next exercise preview
    const nextEx=state.exIndex<day.exercises.length-1?day.exercises[state.exIndex+1]:null;
    if(nextEx){
      const nextSwap=state.sessionSwaps[nextEx.id];
      const nextName=nextSwap?nextSwap.subName:nextEx.name;
      info.appendChild(h('div',{style:{fontSize:'10px',color:'var(--text3)',marginBottom:'4px',letterSpacing:'0.3px'}},
        'NEXT: ',h('span',{style:{color:'var(--text2)',fontWeight:'600'}},`${nextName} \u00B7 ${nextEx.sets} sets \u00D7 ${nextEx.repRange}`)));
    }else{
      info.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'1px',color:'var(--text3)',marginBottom:'4px'}},'LAST EXERCISE'));
    }

    // How-To button + Info button + Swap button row
    const btnRow=h('div',{style:{display:'flex',justifyContent:'center',gap:'6px',marginBottom:'4px',flexWrap:'wrap'}});
    const hasDemo=!!EX_CLIPS[displayId];
    if(hasDemo){
      btnRow.appendChild(h('button',{style:{background:state.showDemo?`${day.color}15`:'rgba(255,255,255,0.04)',border:`1px solid ${state.showDemo?day.color+'30':'rgba(255,255,255,0.08)'}`,borderRadius:'8px',padding:'4px 12px',fontSize:'10px',fontWeight:'700',color:state.showDemo?day.color:'var(--text3)',letterSpacing:'1px'},
        onClick:()=>{state.showDemo=!state.showDemo;state.showExInfo=false;state.showSwapMenu=false;render()}},state.showDemo?'\u2715 CLOSE':'\u{1F3AC} HOW-TO'));
    }
    // Info button
    const hasInfo=!!(getExInfo(displayId));
    btnRow.appendChild(h('button',{style:{background:state.showExInfo?`${day.color}15`:'rgba(255,255,255,0.04)',border:`1px solid ${state.showExInfo?day.color+'30':'rgba(255,255,255,0.08)'}`,borderRadius:'8px',padding:'4px 12px',fontSize:'10px',fontWeight:'700',color:state.showExInfo?day.color:'var(--text3)',letterSpacing:'1px'},
      onClick:()=>{state.showExInfo=!state.showExInfo;state.showDemo=false;state.showSwapMenu=false;render()}},state.showExInfo?'\u2715 CLOSE':'\u2139\uFE0F INFO'));
    // Swap button (only if substitutions exist for this exercise)
    if(SUBSTITUTION_MAP[ex.id]){
      const hasActiveSwap=!!state.sessionSwaps[ex.id];
      btnRow.appendChild(h('button',{style:{background:hasActiveSwap?`${day.color}15`:(state.showSwapMenu?`${day.color}15`:'rgba(255,255,255,0.04)'),border:`1px solid ${state.showSwapMenu||hasActiveSwap?day.color+'30':'rgba(255,255,255,0.08)'}`,borderRadius:'8px',padding:'4px 12px',fontSize:'10px',fontWeight:'700',color:state.showSwapMenu||hasActiveSwap?day.color:'var(--text3)',letterSpacing:'1px'},
        onClick:()=>{state.showSwapMenu=!state.showSwapMenu;state.showDemo=false;state.showExInfo=false;render()}},state.showSwapMenu?'\u2715 CLOSE':'\u{1F504} SWAP'));
    }
    info.appendChild(btnRow);

    // Demo overlay
    if(state.showDemo&&hasDemo){renderDemoOverlay(info,displayId,day.color)}

    // Exercise info overlay
    if(state.showExInfo){
      const exInfo=getExInfo(displayId);
      const infoBox=h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'14px',padding:'12px',marginBottom:'8px',textAlign:'left',animation:'fadeIn 0.3s ease'}});
      if(exInfo){
        infoBox.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'2px',color:day.color,marginBottom:'6px'}},'TARGET MUSCLES'));
        infoBox.appendChild(h('div',{style:{fontSize:'12px',color:'var(--text)',marginBottom:'10px',fontWeight:'600'}},exInfo.muscles));
        infoBox.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'2px',color:day.color,marginBottom:'6px'}},'TIPS'));
        infoBox.appendChild(h('div',{style:{fontSize:'11px',color:'var(--text2)',lineHeight:'1.5'}},exInfo.tips));
      }else{
        infoBox.appendChild(h('div',{style:{fontSize:'11px',color:'var(--text3)'}},'No info available for this exercise yet.'));
      }
      // Form cues
      const cues=getFormCues(displayId);
      if(cues){
        infoBox.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'2px',color:'#ff8500',marginTop:'12px',marginBottom:'6px'}},'\u26A0\uFE0F FORM CUES'));
        cues.forEach(c=>infoBox.appendChild(h('div',{style:{fontSize:'11px',color:'var(--text2)',padding:'3px 0 3px 12px',borderLeft:'2px solid rgba(255,133,0,0.3)',marginBottom:'4px'}},c)));
      }
      info.appendChild(infoBox);
    }

    // Swap menu overlay
    if(state.showSwapMenu&&SUBSTITUTION_MAP[ex.id]){
      const subs=SUBSTITUTION_MAP[ex.id];
      const swapBox=h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'14px',padding:'12px',marginBottom:'8px',animation:'fadeIn 0.3s ease'}});
      if(state.sessionSwaps[ex.id]){
        swapBox.appendChild(h('div',{style:{fontSize:'10px',color:'var(--text2)',marginBottom:'8px',fontWeight:'600'}},'Currently swapped to: '+state.sessionSwaps[ex.id].subName));
        swapBox.appendChild(h('button',{style:{width:'100%',padding:'8px',borderRadius:'8px',background:'rgba(255,61,61,0.08)',border:'1px solid rgba(255,61,61,0.2)',color:'#ff3d3d',fontSize:'11px',fontWeight:'700'},
          onClick:()=>{delete state.sessionSwaps[ex.id];state.showSwapMenu=false;render()}},'Revert to Original'));
      }else{
        swapBox.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'800',letterSpacing:'2px',color:'var(--text3)',marginBottom:'8px'}},'SWAP FOR THIS SESSION ONLY'));
        const levels=[{key:'good',label:'GOOD',col:'var(--text3)'},{key:'better',label:'BETTER',col:'#ffb800'},{key:'best',label:'BEST',col:'#3dd68c'}];
        levels.forEach(lv=>{
          const subId=subs[lv.key];if(!subId)return;
          const subLib=getFullLibrary().find(e=>e.id===subId);if(!subLib)return;
          swapBox.appendChild(h('button',{style:{width:'100%',padding:'10px 12px',borderRadius:'8px',background:'rgba(255,255,255,0.03)',border:'1px solid var(--border)',marginBottom:'6px',display:'flex',alignItems:'center',gap:'10px',textAlign:'left',color:'var(--text)'},
            onClick:()=>{state.sessionSwaps[ex.id]={subId,subName:subLib.name};state.showSwapMenu=false;render()}},
            h('span',{style:{fontSize:'8px',fontWeight:'800',color:lv.col,letterSpacing:'1px',minWidth:'42px'}},lv.label),
            h('span',{style:{fontSize:'12px',fontWeight:'700'}},subLib.name)));
        });
      }
      info.appendChild(swapBox);
    }

    // Exercise notes
    const noteVal=getExNote(ex.id);
    const noteBox=h('div',{style:{marginBottom:'6px'}});
    const noteToggle=h('button',{style:{background:'none',border:'none',fontSize:'10px',fontWeight:'600',color:noteVal?day.color:'var(--text3)',letterSpacing:'0.5px',padding:'2px 8px'},
      onClick:()=>{
        const existing=getExNote(ex.id);
        const val=prompt('Exercise note (machine settings, injury notes, etc):',existing);
        if(val!==null){setExNote(ex.id,val);render()}
      }},noteVal?'\u{1F4DD} '+noteVal:'\u{1F4DD} Add note');
    noteBox.appendChild(noteToggle);
    info.appendChild(noteBox);

    // Progression controls
    const stepBtn=(label,onClick)=>h('button',{style:{width:'24px',height:'24px',borderRadius:'6px',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.08)',color:'var(--text2)',fontSize:'13px',fontWeight:'700',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:'1',padding:'0'},onClick},label);
    const targetRow=h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'12px',marginBottom:'8px',padding:'6px 10px',background:'rgba(255,255,255,0.02)',borderRadius:'8px',border:'1px solid rgba(255,255,255,0.04)'}});
    const setsG=h('div',{style:{display:'flex',alignItems:'center',gap:'5px'}});
    setsG.appendChild(stepBtn('\u2212',()=>adjustTarget(state.exIndex,'sets',-1)));
    setsG.appendChild(h('div',{style:{textAlign:'center',minWidth:'40px'}},h('div',{style:{fontSize:'14px',fontWeight:'800',color:'var(--text)',lineHeight:'1'}},String(ex.sets)),h('div',{style:{fontSize:'7px',fontWeight:'700',letterSpacing:'1px',color:'var(--text3)',marginTop:'1px'}},'SETS')));
    setsG.appendChild(stepBtn('+',()=>adjustTarget(state.exIndex,'sets',1)));
    targetRow.appendChild(setsG);
    targetRow.appendChild(h('div',{style:{fontSize:'11px',color:'rgba(255,255,255,0.1)'}},'\u00D7'));
    const repsG=h('div',{style:{display:'flex',alignItems:'center',gap:'5px'}});
    repsG.appendChild(stepBtn('\u2212',()=>adjustTarget(state.exIndex,'reps',-1)));
    repsG.appendChild(h('div',{style:{textAlign:'center',minWidth:'40px'}},h('div',{style:{fontSize:'14px',fontWeight:'800',color:'var(--text)',lineHeight:'1'}},ex.repRange),h('div',{style:{fontSize:'7px',fontWeight:'700',letterSpacing:'1px',color:'var(--text3)',marginTop:'1px'}},'REPS')));
    repsG.appendChild(stepBtn('+',()=>adjustTarget(state.exIndex,'reps',1)));
    targetRow.appendChild(repsG);
    info.appendChild(targetRow);

    // Set info + PR
    const warmupCount=logged.filter(s=>s.tag==='warmup').length;
    const workCount=logged.filter(s=>s.tag!=='warmup').length;
    const setInfo=h('div',{style:{fontSize:'11px',color:'var(--text2)'}});
    setInfo.innerHTML=`Set <span style="font-weight:800;color:${day.color};font-size:15px">${state.currentSet}</span> of ${ex.sets}`;
    if(warmupCount>0)setInfo.innerHTML+=`<span style="color:var(--text3)"> + ${warmupCount} warmup</span>`;
    if(pr)setInfo.innerHTML+=`<span style="color:var(--gold)"> \u2022 PR: ${pr.weight}\u00D7${pr.reps}</span>`;
    info.appendChild(setInfo);

    // Dots — working set dots only, warmup dots shown separately
    const dots=h('div',{style:{display:'flex',justifyContent:'center',gap:'6px',marginTop:'8px'}});
    // Warmup dots (small, muted)
    for(let i=0;i<warmupCount;i++)dots.appendChild(h('div',{style:{width:'6px',height:'6px',borderRadius:'3px',background:'rgba(255,165,0,0.4)',border:'1px solid rgba(255,165,0,0.3)',transition:'all 0.3s'}}));
    // Working set dots
    for(let i=0;i<ex.sets;i++)dots.appendChild(h('div',{style:{width:i===state.currentSet-1?'24px':'8px',height:'8px',borderRadius:'4px',background:i<workCount?'#3dd68c':i===state.currentSet-1?day.color:'var(--border)',transition:'all 0.3s'}}));
    info.appendChild(dots);root.appendChild(info);

    // Rest timer (inline between info and pickers)
    if(state.restActive){
      const restEl=h('div',{style:{padding:'8px 20px',textAlign:'center'}});
      const restBox=h('div',{style:{background:'rgba(255,61,61,0.06)',border:'1px solid rgba(255,61,61,0.15)',borderRadius:'12px',padding:'10px 16px',position:'relative',overflow:'hidden'}});
      restBox.appendChild(h('div',{id:'rest-progress',style:{position:'absolute',top:'0',left:'0',height:'100%',background:'rgba(255,61,61,0.08)',borderRadius:'12px',width:`${((state.restSeconds-state.restRemaining)/state.restSeconds)*100}%`,transition:'width 1s linear'}}));
      restBox.appendChild(h('div',{style:{position:'relative',display:'flex',alignItems:'center',justifyContent:'space-between'}},
        h('span',{style:{fontSize:'10px',fontWeight:'700',letterSpacing:'2px',color:'var(--text3)'}},'REST'),
        h('span',{id:'rest-display',style:{fontSize:'22px',fontWeight:'900',color:'var(--accent)'}},fmtTime(state.restRemaining)),
        h('button',{style:{background:'rgba(255,255,255,0.08)',borderRadius:'8px',padding:'4px 12px',fontSize:'10px',fontWeight:'700',color:'var(--text2)'},onClick:()=>{stopRest();render()}},'SKIP')));
      restEl.appendChild(restBox);root.appendChild(restEl);
    }

    // Tag selector
    const tagRow=h('div',{style:{padding:'4px 20px',display:'flex',justifyContent:'center',gap:'6px'}});
    SET_TAGS.forEach(tag=>{
      const active=state.setTag===tag;const col=TAG_COLORS[tag]||day.color;
      tagRow.appendChild(h('button',{style:{padding:'4px 10px',borderRadius:'6px',fontSize:'9px',fontWeight:'700',letterSpacing:'1px',
        background:active?(tag==='normal'?'rgba(255,255,255,0.08)':`${col}20`):'rgba(255,255,255,0.02)',
        border:`1px solid ${active?(tag==='normal'?'rgba(255,255,255,0.15)':`${col}40`):'rgba(255,255,255,0.04)'}`,
        color:active?(tag==='normal'?'var(--text)':col):'var(--text3)'},
        onClick:()=>{state.setTag=tag;render()}},tag.toUpperCase()));
    });root.appendChild(tagRow);

    // Per-set RPE selector
    const rpeRow=h('div',{style:{padding:'2px 16px',display:'flex',alignItems:'center',justifyContent:'center',gap:'4px'}});
    rpeRow.appendChild(h('span',{style:{fontSize:'8px',fontWeight:'700',letterSpacing:'1px',color:'var(--text3)',marginRight:'4px'}},'RPE'));
    for(let r=1;r<=10;r++){const active=r===state.setRpe;const col=getRpeColor(r);
      rpeRow.appendChild(h('button',{style:{width:active?'26px':'22px',height:active?'26px':'22px',borderRadius:'50%',
        border:active?`2px solid ${col}`:'1px solid rgba(255,255,255,0.06)',
        background:active?`${col}25`:'transparent',
        color:active?col:'var(--text3)',fontSize:active?'11px':'9px',fontWeight:active?'900':'600',
        display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s',padding:'0'},
        onClick:()=>{state.setRpe=r;render()}},String(r)))}
    root.appendChild(rpeRow);

    // Pickers
    const pickerRow=h('div',{style:{flex:'1',display:'flex',alignItems:'center',justifyContent:'center',padding:'0 24px',gap:'16px',minHeight:'0'}});
    pickerRow.appendChild(createPicker(WEIGHTS,state.setWeight,v=>{state.setWeight=v;updatePrInd()},'WEIGHT (lbs)',v=>v===0?'BW':v%1===0?v:v.toFixed(1),day.color));
    pickerRow.appendChild(h('div',{style:{width:'1px',height:'100px',background:'var(--border)',flexShrink:'0'}}));
    pickerRow.appendChild(createPicker(REPS,state.setReps,v=>{state.setReps=v;updatePrInd()},'REPS',null,day.color));
    root.appendChild(pickerRow);

    // Assisted movement weight picker
    if(ASSISTED_EXERCISES.has(ex.id)){
      const ASSIST_VALS=[0,5,10,15,20,25,30,35,40,45,50,60,70,80,90,100];
      const assistRow=h('div',{style:{padding:'4px 24px',display:'flex',alignItems:'center',justifyContent:'center',gap:'10px'}});
      assistRow.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'1.5px',color:'var(--text3)'}},'\u2212 ASSIST'));
      assistRow.appendChild(h('button',{style:{width:'28px',height:'28px',borderRadius:'8px',background:'rgba(255,255,255,0.06)',border:'1px solid var(--border)',color:'var(--text2)',fontSize:'18px',fontWeight:'700',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:'1'},
        onClick:()=>{const i=ASSIST_VALS.indexOf(state.setAssistWeight);if(i>0){state.setAssistWeight=ASSIST_VALS[i-1];render()}}},'−'));
      assistRow.appendChild(h('div',{style:{minWidth:'56px',textAlign:'center',fontSize:'18px',fontWeight:'800',color:state.setAssistWeight>0?day.color:'var(--text3)'}},
        state.setAssistWeight>0?`${state.setAssistWeight} lbs`:'None'));
      assistRow.appendChild(h('button',{style:{width:'28px',height:'28px',borderRadius:'8px',background:'rgba(255,255,255,0.06)',border:'1px solid var(--border)',color:'var(--text2)',fontSize:'18px',fontWeight:'700',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:'1'},
        onClick:()=>{const i=ASSIST_VALS.indexOf(state.setAssistWeight);if(i<ASSIST_VALS.length-1){state.setAssistWeight=ASSIST_VALS[i+1];render()}}},'+'));
      assistRow.appendChild(h('div',{style:{fontSize:'8px',color:'var(--text3)'}},'\n(BW minus assist)'));
      root.appendChild(assistRow);
    }

    // PR indicator
    const prInd=h('div',{id:'pr-indicator',style:{textAlign:'center',padding:'0 0 4px',minHeight:'20px'}});
    if(isNewPr)prInd.innerHTML='<span style="font-size:11px;font-weight:900;color:#ff3d3d;letter-spacing:2px;animation:prBurst 0.5s ease">\u{1F525} NEW PR \u{1F525}</span>';
    root.appendChild(prInd);

    // Logged sets chips
    if(logged.length>0){
      const chips=h('div',{style:{padding:'0 20px 4px',display:'flex',justifyContent:'center',gap:'5px',flexWrap:'wrap'}});
      logged.forEach(s=>{const tc=TAG_COLORS[s.tag]||'';const rc=s.rpe?getRpeColor(s.rpe):'';
        const assistTxt=s.assistWeight?` \u2212${s.assistWeight}`:'';
        chips.appendChild(h('div',{style:{fontSize:'9px',color:tc||'var(--text3)',background:'var(--card)',border:`1px solid ${tc?tc+'30':'var(--border)'}`,borderRadius:'6px',padding:'3px 6px',display:'flex',alignItems:'center',gap:'3px'}},
          `${s.tag&&s.tag!=='normal'?TAG_LABELS[s.tag]+' ':''}S${s.set}: ${s.weight===0?'BW':s.weight}\u00D7${s.reps}${assistTxt}`,
          s.rpe?h('span',{style:{fontSize:'7px',fontWeight:'800',color:rc,marginLeft:'2px'}},`R${s.rpe}`):null))});
      root.appendChild(chips);
    }

    // Rest timer presets (when not active, shown small)
    if(!state.restActive){
      const restRow=h('div',{style:{padding:'2px 20px 0',display:'flex',justifyContent:'center',alignItems:'center',gap:'4px'}});
      restRow.appendChild(h('span',{style:{fontSize:'8px',color:'var(--text3)',marginRight:'4px'}},'\u23F1'));
      REST_PRESETS.forEach(sec=>{const active=state.restSeconds===sec;
        restRow.appendChild(h('button',{style:{padding:'3px 7px',borderRadius:'5px',fontSize:'8px',fontWeight:active?'800':'600',background:active?'rgba(255,255,255,0.08)':'transparent',color:active?'var(--text)':'var(--text3)',border:active?'1px solid rgba(255,255,255,0.12)':'1px solid transparent'},
          onClick:()=>{state.restSeconds=sec;save();render()}},fmtTime(sec)))});
      root.appendChild(restRow);
    }

    // Undo last set + form cue
    const actionRow=h('div',{style:{padding:'0 20px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'2px'}});
    if(logged.length>0){
      actionRow.appendChild(h('button',{style:{background:'none',border:'none',fontSize:'9px',fontWeight:'600',color:'var(--text3)',padding:'4px 8px',letterSpacing:'0.5px'},
        onClick:()=>undoLastSet()},'\u21A9 Undo last set'));
    }else{actionRow.appendChild(h('div'))}
    // Form cue (subtle reminder) — use displayId so swap gets correct cues
    const cues=getFormCues(displayId);
    if(cues){
      const randomCue=cues[Math.floor(Math.random()*cues.length)];
      actionRow.appendChild(h('div',{style:{fontSize:'8px',color:'#ff8500',fontWeight:'600',maxWidth:'55%',textAlign:'right'}},'\u26A0 '+randomCue));
    }
    root.appendChild(actionRow);

    // LOG button
    const btnText=isLastSet?(isLastEx?'LOG SET & FINISH':'LOG & NEXT \u203A'):`LOG SET ${state.currentSet}`;
    root.appendChild(h('div',{style:{padding:`8px 20px calc(24px + var(--safe-b))`}},
      h('button',{style:{width:'100%',padding:'14px',borderRadius:'14px',background:isLastSet?(isLastEx?'var(--accent)':day.color):day.color,color:'#fff',fontSize:'15px',fontWeight:'900',letterSpacing:'2px',boxShadow:`0 4px 24px ${day.colorGlow}`},onClick:()=>logSet()},btnText)));
    return;
  }

  // ═══════════════ SUMMARY ═══════════════
  if(state.view==='summary'&&state.summaryData){
    const{session,prCount,prList,totalSets,totalVol}=state.summaryData;
    const center=h('div',{style:{textAlign:'center',paddingTop:'32px'}});

// ── Actions ──
function openDay(day){state.selectedDay=day;state.sessionSets={};state.sessionSwaps={};state.exIndex=0;stopRest();state.view='day';render()}
function openExercise(idx){
  const ex=state.selectedDay.exercises[idx];const existing=state.sessionSets[ex.id]||[];
  state.exIndex=idx;state.currentSet=existing.length+1;state.setTag='normal';
  state.showDemo=false;state.showExInfo=false;state.showSwapMenu=false;
  const pr=state.prRecords[ex.id];const last=existing.length>0?existing[existing.length-1]:null;
  state.setWeight=last?last.weight:(pr?pr.weight:0);state.setReps=last?last.reps:(pr?pr.reps:8);
  state.setAssistWeight=last?(last.assistWeight||0):0;
  state.view='exercise';render();
}
function logSet(){
  const day=state.selectedDay;const ex=day.exercises[state.exIndex];
  if(!state.sessionSets[ex.id])state.sessionSets[ex.id]=[];
  const isWarmup=state.setTag==='warmup';
  const setData={weight:state.setWeight,reps:state.setReps,set:isWarmup?'W':state.currentSet,tag:state.setTag,rpe:state.setRpe};
  if(ASSISTED_EXERCISES.has(ex.id)&&state.setAssistWeight>0)setData.assistWeight=state.setAssistWeight;
  const swap=state.sessionSwaps[ex.id];
  if(swap)setData.swappedTo=swap.subId;
  state.sessionSets[ex.id].push(setData);
  state.setTag='normal';

  // Hype message
  if(state.hypeEnabled&&!isWarmup)showToast(getHype());

  // Start rest timer (skip for warmup — shorter rest assumed)
  if(state.restSeconds>0&&!isWarmup)startRest();

  // Warmup sets don't advance the set counter
  if(isWarmup){render();return}

  if(state.currentSet<ex.sets){state.currentSet++;render()}
  else if(state.exIndex<day.exercises.length-1){
    const next=day.exercises[state.exIndex+1];const nextPr=state.prRecords[next.id];
    state.exIndex++;state.currentSet=1;state.showDemo=false;state.showExInfo=false;state.showSwapMenu=false;
    state.setWeight=nextPr?nextPr.weight:state.setWeight;state.setReps=nextPr?nextPr.reps:8;state.setAssistWeight=0;render();
  }else{stopRest();finishWorkout()}
}
function skipExercise(){
  const day=state.selectedDay;
  if(state.exIndex<day.exercises.length-1){
    const next=day.exercises[state.exIndex+1];const nextPr=state.prRecords[next.id];
    const existing=state.sessionSets[next.id]||[];
    state.exIndex++;state.currentSet=existing.length+1;state.showSwapMenu=false;
    state.setWeight=nextPr?nextPr.weight:0;state.setReps=nextPr?nextPr.reps:8;state.setAssistWeight=0;render();
  }else{stopRest();finishWorkout()}
}
function finishWorkout(){
  const day=state.selectedDay;const entries=[];const newPrs={...state.prRecords};let prCount=0;let prList=[];let totalVol=0;
  day.exercises.forEach(ex=>{
    const sets=state.sessionSets[ex.id];
    if(sets&&sets.length>0){
      const workSets=sets.filter(s=>s.tag!=='warmup');
      let best=workSets[0]||sets[0];workSets.forEach(s=>{if(s.weight*s.reps>best.weight*best.reps)best=s});
      entries.push({id:ex.id,name:ex.name,sets,bestWeight:best.weight,bestReps:best.reps});
      totalVol+=calcVolume(workSets);
      if(workSets.length>0){const old=newPrs[ex.id];if(!old||best.weight*best.reps>old.weight*old.reps){
        newPrs[ex.id]={weight:best.weight,reps:best.reps,date:new Date().toISOString()};
        prCount++;prList.push({name:ex.name,weight:best.weight,reps:best.reps})}}
    }});
  if(entries.length===0){showToast('No sets logged');state.view='home';render();return}
  const session={date:new Date().toISOString(),dayId:day.id,dayName:day.name,dayColor:day.color,dayIcon:day.icon,exercises:entries};
  state.history=[session,...state.history];state.prRecords=newPrs;
  state.summaryData={session,prCount,prList,totalSets:entries.reduce((s,e)=>s+e.sets.length,0),totalVol};
  save();state.view='summary';render();
}
function adjustTarget(exIdx,field,delta){
  const day=state.selectedDay;const ex=day.exercises[exIdx];
  const dayData=state.days.find(d=>d.id===day.id);if(!dayData)return;
  const exData=dayData.exercises.find(e=>e.id===ex.id);if(!exData)return;
  if(field==='sets'){const n=Math.max(1,Math.min(10,exData.sets+delta));exData.sets=n;ex.sets=n}
  else if(field==='reps'){
    const range=exData.repRange;const rm=range.match(/^(\d+)\s*-\s*(\d+)(.*)/);const sm=range.match(/^(\d+)(.*)/);
    if(rm){let lo=parseInt(rm[1])+delta;let hi=parseInt(rm[2])+delta;const suf=rm[3]||'';lo=Math.max(1,lo);hi=Math.max(lo,hi);const nr=`${lo}-${hi}${suf}`;exData.repRange=nr;ex.repRange=nr}
    else if(sm){let v=parseInt(sm[1])+delta;const suf=sm[2]||'';v=Math.max(1,v);const nr=`${v}${suf}`;exData.repRange=nr;ex.repRange=nr}
  }save();showToast(`${field==='sets'?'Sets':'Reps'} ${delta>0?'\u2191':'\u2193'} ${field==='sets'?exData.sets:exData.repRange}`);render();
}
function updatePrInd(){
  const el=document.getElementById('pr-indicator');if(!el||!state.selectedDay)return;
  const ex=state.selectedDay.exercises[state.exIndex];const pr=state.prRecords[ex.id];
  const isNewPr=state.setWeight*state.setReps>(pr?pr.weight*pr.reps:0)&&state.setWeight*state.setReps>0;
  el.innerHTML=isNewPr?'<span style="font-size:11px;font-weight:900;color:#ff3d3d;letter-spacing:2px;animation:prBurst 0.5s ease">\u{1F525} NEW PR \u{1F525}</span>':'';
}

// ── Init ──
state.prRecords=store.get('prs')||{};
state.history=store.get('history')||[];
state.days=store.get('days')||[...DEFAULT_DAYS];
state.restSeconds=store.get('rest')||90;
state.customExercises=store.get('customEx')||[];
state.exerciseNotes=store.get('exNotes')||{};
state.progressPics=store.get('pics')||[];
state.hypeEnabled=store.get('hype')!==false;
state.deloadDismiss=store.get('deloadDismiss')||null;
state.wakeLockEnabled=false;
// Re-acquire native wake lock if it was on (iOS video fallback requires user gesture so skip on init)
if(store.get('wakeLock')&&'wakeLock' in navigator){navigator.wakeLock.request('screen').then(s=>{state.wakeLockSentinel=s;state.wakeLockEnabled=true;s.addEventListener('release',()=>{state.wakeLockEnabled=false;state.wakeLockSentinel=null})}).catch(()=>{})}
// First launch: show template picker
if(!store.get('launched'))state.view='templatePicker';
render();
</script>
