const h=(tag,attrs,...ch)=>{const el=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='className')el.className=v;else if(k==='innerHTML')el.innerHTML=v;else el.setAttribute(k,v)});ch.flat(Infinity).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c)});return el};

function findExName(id){for(const d of state.days)for(const e of d.exercises)if(e.id===id)return e.name;const lib=getFullLibrary().find(e=>e.id===id);return lib?lib.name:id}
function findExDay(id){for(const d of state.days)for(const e of d.exercises)if(e.id===id)return d;return null}
function getFullLibrary(){return[...EXERCISE_LIBRARY,...state.customExercises]}
function genId(){return 'ex_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)}
function genDayId(){return 'day_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)}
function timeSince(ds){const d=Math.floor((Date.now()-new Date(ds).getTime())/864e5);return d===0?'Today':d===1?'Yesterday':`${d}d ago`}
function fmtDate(ds){return new Date(ds).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function getSkill(){return SKILL_CONFIG[state.profile.skillLevel]||SKILL_CONFIG.intermediate}
function skillSets(base){const sk=getSkill();return Math.max(sk.minSets,base+sk.setsAdjust)}
function skillRepRange(range){const sk=getSkill();if(!sk.repBump)return range;const rm=range.match(/^(\d+)\s*-\s*(\d+)(.*)/);if(rm){let lo=Math.max(1,parseInt(rm[1])-sk.repBump),hi=Math.max(lo,parseInt(rm[2])-sk.repBump);return`${lo}-${hi}${rm[3]||''}`}return range}
function relStrength(weight){const bw=parseFloat(state.profile.weight);if(!bw||!weight)return'';return(weight/bw).toFixed(1)+'x BW'}
function fmtDateShort(ds){return new Date(ds).toLocaleDateString('en-US',{month:'numeric',day:'numeric'})}
function getTodayWD(){return WEEKDAYS[((new Date().getDay()+6)%7)]}
function getRpeColor(rpe){const c={1:'#5a9a6a',2:'#5a9a6a',3:'#7aaa70',4:'#a8b868',5:'#d4a840',6:'#e89830',7:'#e87a18',8:'#e85a10',9:'#e84010',10:'#cc2200'};return c[rpe]||'#888'}
function fmtTime(s){const m=Math.floor(s/60);const sec=s%60;return m>0?`${m}:${String(sec).padStart(2,'0')}`:`${sec}s`}

let audioCtx=null;
function ensureAudio(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();return audioCtx}

function playDing(){
  try{
    const ctx=ensureAudio();if(!ctx)return;
    const t=ctx.currentTime;
    const osc=ctx.createOscillator();const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sine';osc.frequency.value=660;
    gain.gain.setValueAtTime(0.12,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    osc.start(t);osc.stop(t+0.5);
  }catch(e){}
}

    try{navigator.serviceWorker.ready.then(reg=>{reg.showNotification('Forge',{body:'Rest complete! Go time.',icon:'./icon-192.png',tag:'rest-done',renotify:true})})}catch(e){}

    const el=document.getElementById('rest-display');

    if(prog)prog.style.width=`${Math.min(100,((state.restSeconds-remaining)/state.restSeconds)*100)}%`;

      try{if(navigator.vibrate)navigator.vibrate([200,100,200])}catch{}

}

    const file=input.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>{

        if(!data.history&&!data.days&&!data.prRecords){showToast('Invalid backup file');return}
        const merge=state.history.length>0&&data.history&&data.history.length>0;
        if(merge&&!confirm('You have existing data. Import will REPLACE all your data with the backup. Continue?'))return;
        if(!merge&&!confirm('Restore data from this backup?'))return;
        if(data.profile){state.profile={...state.profile,...data.profile};store.set('profile',state.profile)}
        if(data.prRecords){state.prRecords=data.prRecords;store.set('prs',state.prRecords)}
        if(data.lastWeights){state.lastWeights=data.lastWeights;store.set('lastWeights',state.lastWeights)}
        if(data.history){state.history=data.history;store.set('history',state.history)}
        if(data.days){

          // Also update splits if using multi-split
          if(state.splits.length>0){state.splits[state.activeSplitIdx].days=data.days;store.set('splits',state.splits)}
        }
        if(data.measurements){state.measurements=data.measurements;store.set('measurements',state.measurements)}
        if(data.supersets){state.supersets=data.supersets;store.set('supersets',state.supersets)}

// ── Plate Calculator ──
const PLATES_LBS=[45,35,25,10,5,2.5];const PLATES_KG=[25,20,15,10,5,2.5,1.25];
function calcPlates(targetWeight,barWeight){
  const plates=(state.profile.weightUnit||'lbs')==='kg'?PLATES_KG:PLATES_LBS;
  let perSide=(targetWeight-barWeight)/2;if(perSide<=0)return{plates:[],perSide:0,valid:perSide===0};
  const result=[];plates.forEach(p=>{while(perSide>=p-0.01){result.push(p);perSide-=p}});
  return{plates:result,perSide:(targetWeight-barWeight)/2,valid:Math.abs(perSide)<0.01};
}

function calcWarmupSets(workingWeight){
  const barW=state.barWeight||((state.profile.weightUnit||'lbs')==='kg'?20:45);
  if(!workingWeight||workingWeight<=barW)return[];
  const sets=[];const pcts=[{pct:0,reps:5,label:'Bar only'},{pct:0.4,reps:5,label:'40%'},{pct:0.6,reps:3,label:'60%'},{pct:0.8,reps:2,label:'80%'}];
  pcts.forEach(({pct,reps,label})=>{const w=pct===0?barW:Math.round(workingWeight*pct/5)*5;if(w<barW)return;if(sets.length>0&&w<=sets[sets.length-1].weight)return;sets.push({weight:w,reps,label,pct:pct===0?null:Math.round(pct*100)})});
  return sets;
}

// ── Streak Counter ──
function getWorkoutStreak(){
  if(state.history.length===0)return{current:0,best:0};
  const weekSet=new Set();
  state.history.forEach(s=>{const d=new Date(s.date);const jan1=new Date(d.getFullYear(),0,1);const weekNum=Math.ceil(((d-jan1)/864e5+jan1.getDay()+1)/7);weekSet.add(`${d.getFullYear()}-W${weekNum}`)});
  const now=new Date();const jan1Now=new Date(now.getFullYear(),0,1);let currentWeek=Math.ceil(((now-jan1Now)/864e5+jan1Now.getDay()+1)/7);let currentYear=now.getFullYear();let streak=0;
  for(let i=0;i<52;i++){const key=`${currentYear}-W${currentWeek}`;if(weekSet.has(key)){streak++;currentWeek--;if(currentWeek<=0){currentYear--;currentWeek=52}}else if(i===0){currentWeek--;if(currentWeek<=0){currentYear--;currentWeek=52};if(weekSet.has(`${currentYear}-W${currentWeek}`)){streak++;currentWeek--;if(currentWeek<=0){currentYear--;currentWeek=52}}else break}else break}
  const sortedWeeks=[...weekSet].sort();let best=0,run=1;
  for(let i=1;i<sortedWeeks.length;i++){const[py,pw]=sortedWeeks[i-1].split('-W').map(Number);const[cy,cw]=sortedWeeks[i].split('-W').map(Number);if((cy===py&&cw===pw+1)||(cy===py+1&&cw===1&&pw>=51)){run++}else{best=Math.max(best,run);run=1}}
  best=Math.max(best,run);return{current:streak,best};
}

// ── Smart Superset Analysis ──
const SS_PUSH=new Set(['Chest','Shoulders','Triceps']);const SS_PULL=new Set(['Back','Biceps']);const SS_UPPER=new Set(['Chest','Back','Shoulders','Biceps','Triceps']);const SS_LOWER=new Set(['Quads','Hamstrings','Calves','Glutes']);
const SS_COMPOUND=new Set(['squat','deadlift','bb_bench','db_bench','bb_row','rdl','leg_press','bb_ohp','incline_db','incline_bb','front_squat','sumo_deadlift','hack_squat']);
const SS_PRESS_EX=new Set(['db_bench','bb_bench','incline_db','incline_bb','db_ohp','bb_ohp','leg_press']);
const SS_PULL_EX=new Set(['pullups','weighted_pu','chinups','lat_pulldown','bb_row','cs_row','db_row']);
function analyzePairing(exA,exB){
  const mA=EX_MUSCLES[exA.id]||'Other',mB=EX_MUSCLES[exB.id]||'Other';const warnings=[],tips=[];
  if(mA===mB)warnings.push(`Both target ${mA} — they'll fatigue each other, reducing performance on both.`);
  if(SS_COMPOUND.has(exA.id)&&SS_COMPOUND.has(exB.id))warnings.push('Two heavy compounds paired — high CNS demand, consider compound + isolation instead.');
  if((SS_PUSH.has(mA)&&SS_PULL.has(mB))||(SS_PULL.has(mA)&&SS_PUSH.has(mB)))tips.push('Antagonist pairing (push/pull) — excellent! Muscles recover while partner works.');
  if((SS_UPPER.has(mA)&&SS_LOWER.has(mB))||(SS_LOWER.has(mA)&&SS_UPPER.has(mB)))tips.push('Upper/lower pairing — great for saving time with zero interference.');
  if(SS_PRESS_EX.has(exA.id)&&SS_PRESS_EX.has(exB.id))warnings.push('Both are pressing movements — shared stabilizers will fatigue, reducing strength.');
  if(SS_PULL_EX.has(exA.id)&&SS_PULL_EX.has(exB.id))warnings.push('Both are pulling movements — grip and back fatigue will limit performance.');
  if((mA==='Core'&&SS_COMPOUND.has(exB.id))||(mB==='Core'&&SS_COMPOUND.has(exA.id)))warnings.push('Core fatigue before a compound lift risks bracing stability. Do core work after heavy lifts.');
  if(tips.length===0&&warnings.length===0)tips.push(`${mA} + ${mB} — neutral pairing, should work fine.`);
  return{warnings,tips};
}

// ── Progress Chart (canvas-based) ──
function drawChart(container,exId,color){
  const sessions=state.history.filter(s=>s.exercises.some(e=>e.id===exId)).reverse();
  if(sessions.length<2){container.appendChild(h('div',{style:{textAlign:'center',padding:'20px',color:'var(--text3)',fontSize:'12px'}},'Need 2+ sessions to show chart'));return}
  const points=sessions.map(s=>{
    const ex=s.exercises.find(e=>e.id===exId);
    const best=ex.sets?ex.sets.reduce((b,cur)=>cur.weight*cur.reps>b.weight*b.reps?cur:b,ex.sets[0]):{weight:ex.bestWeight||0,reps:ex.bestReps||0};
    return{date:new Date(s.date),weight:best.weight,reps:best.reps,vol:best.weight*best.reps};
  }).slice(-12);

  const maxW=Math.max(...points.map(p=>p.weight));
  const minW=Math.min(...points.map(p=>p.weight));
  const range=maxW-minW||1;
  const W=Math.min(container.offsetWidth||300,400);
  const H=140;

  const canvas=document.createElement('canvas');canvas.width=W*2;canvas.height=H*2;
  canvas.style.cssText=`width:${W}px;height:${H}px`;
  const ctx=canvas.getContext('2d');ctx.scale(2,2);

  const padL=36,padR=10,padT=10,padB=28;
  const cw=W-padL-padR,ch=H-padT-padB;

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
  for(let i=0;i<4;i++){const y=padT+ch*(i/3);ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke()}

  // Y labels
  ctx.fillStyle='#555570';ctx.font='9px system-ui';ctx.textAlign='right';
  for(let i=0;i<4;i++){const val=maxW-range*(i/3);ctx.fillText(val%1===0?val:val.toFixed(1),padL-6,padT+ch*(i/3)+3)}

  // Line + area
  const pts=points.map((p,i)=>({x:padL+cw*(i/(points.length-1)),y:padT+ch*(1-(p.weight-minW)/range)}));
  
  // Area fill
  ctx.beginPath();ctx.moveTo(pts[0].x,H-padB);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H-padB);ctx.closePath();
  const grad=ctx.createLinearGradient(0,padT,0,H-padB);
  grad.addColorStop(0,color+'30');grad.addColorStop(1,color+'05');
  ctx.fillStyle=grad;ctx.fill();

  // Line
  ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();

  // Dots
  pts.forEach((p,i)=>{
    ctx.beginPath();ctx.arc(p.x,p.y,i===pts.length-1?4:2.5,0,Math.PI*2);
    ctx.fillStyle=i===pts.length-1?color:'#fff';ctx.fill();
    if(i===pts.length-1){ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke()}
  });

  // X labels
  ctx.fillStyle='#555570';ctx.font='8px system-ui';ctx.textAlign='center';
  const step=Math.max(1,Math.floor(points.length/5));
  points.forEach((p,i)=>{if(i%step===0||i===points.length-1)ctx.fillText(`${p.date.getMonth()+1}/${p.date.getDate()}`,pts[i].x,H-padB+14)});

  container.appendChild(canvas);

  // Latest stats
  const latest=points[points.length-1];
  const prev=points.length>=2?points[points.length-2]:null;
  const diff=prev?latest.weight-prev.weight:0;
  container.appendChild(h('div',{style:{display:'flex',justifyContent:'center',gap:'16px',marginTop:'8px',fontSize:'11px'}},
    h('span',{style:{color:'var(--text2)'}},`Latest: `,h('span',{style:{fontWeight:'800',color}},`${latest.weight} x ${latest.reps}`)),
    diff!==0?h('span',{style:{color:diff>0?'#6a9a5a':'#ff3d3d',fontWeight:'700'}},`${diff>0?'\u2191':'\u2193'}${Math.abs(diff).toFixed(1)} ${state.profile.weightUnit||'lbs'}`):null
  ));
}

// ── ScrollPicker ──
function createPicker(options,value,onChange,label,format,color){
  const ITEM_H=48;const fmt=format||(v=>v);
  const container=h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',flex:'1'}});
  container.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'2px',color:'#555570',marginBottom:'8px'}},label));
  const wrapper=h('div',{style:{position:'relative',height:`${ITEM_H*3}px`,width:'100%',overflow:'hidden',borderRadius:'14px',background:'#0a0a14'}});
  wrapper.appendChild(h('div',{style:{position:'absolute',top:`${ITEM_H}px`,left:'4px',right:'4px',height:`${ITEM_H}px`,borderRadius:'10px',background:`${color}15`,border:`1px solid ${color}30`,pointerEvents:'none',zIndex:'1'}}));
  wrapper.appendChild(h('div',{style:{position:'absolute',top:'0',left:'0',right:'0',height:`${ITEM_H}px`,background:'linear-gradient(to bottom, #0a0a14 20%, transparent)',pointerEvents:'none',zIndex:'2'}}));
  wrapper.appendChild(h('div',{style:{position:'absolute',bottom:'0',left:'0',right:'0',height:`${ITEM_H}px`,background:'linear-gradient(to top, #0a0a14 20%, transparent)',pointerEvents:'none',zIndex:'2'}}));
  const scroll=h('div',{className:'picker-scroll',style:{height:'100%',overflowY:'auto',paddingTop:`${ITEM_H}px`,paddingBottom:`${ITEM_H}px`}});
  let isScrolling=false;
  options.forEach((opt,i)=>{
    const selected=opt===value;
    scroll.appendChild(h('div',{style:{height:`${ITEM_H}px`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:selected?'26px':'18px',fontWeight:selected?'900':'500',color:selected?color:'#333348',transition:'all 0.15s',cursor:'pointer'},
      onClick:()=>{onChange(opt);scroll.scrollTo({top:i*ITEM_H,behavior:'smooth'})}},String(fmt(opt))));
  });
  scroll.addEventListener('scroll',()=>{if(isScrolling)return;isScrolling=true;requestAnimationFrame(()=>{const idx=Math.round(scroll.scrollTop/ITEM_H);const c=Math.max(0,Math.min(idx,options.length-1));if(options[c]!==value)onChange(options[c]);isScrolling=false})});
  wrapper.appendChild(scroll);container.appendChild(wrapper);
  requestAnimationFrame(()=>{const idx=options.indexOf(value);if(idx>=0)scroll.scrollTop=idx*ITEM_H});
  return container;
}

// ── Wake Lock (native + iOS video fallback) ──
async function toggleWakeLock(){
  if(state.wakeLockEnabled){
    if(state.wakeLockSentinel){try{await state.wakeLockSentinel.release()}catch(e){}state.wakeLockSentinel=null}
    if(state.wakeLockVideo){state.wakeLockVideo.pause();state.wakeLockVideo.remove();state.wakeLockVideo=null}
    state.wakeLockEnabled=false;store.set('wakeLock',false);showToast('Screen lock re-enabled');
  }else{
    try{
      // Try native Wake Lock API first (Android/Chrome)
      state.wakeLockSentinel=await navigator.wakeLock.request('screen');
      state.wakeLockEnabled=true;store.set('wakeLock',true);
      showToast('\u{1F506} Screen will stay on (uses more battery)');
      state.wakeLockSentinel.addEventListener('release',()=>{state.wakeLockEnabled=false;state.wakeLockSentinel=null});
    }catch(e){
      // iOS fallback: tiny silent canvas-stream video prevents sleep
      try{
        const canvas=document.createElement('canvas');canvas.width=canvas.height=1;
        canvas.getContext('2d').fillRect(0,0,1,1);
        const stream=canvas.captureStream(1);
        const video=document.createElement('video');
        video.srcObject=stream;video.muted=true;video.loop=true;
        video.setAttribute('playsinline','');

// ── Progress Pics ──
function captureProgressPic(dayName){
  const input=document.createElement('input');
  input.type='file';input.accept='image/*';input.capture='environment';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      // Compress to reasonable size
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const maxDim=800;const scale=Math.min(maxDim/img.width,maxDim/img.height,1);
        canvas.width=img.width*scale;canvas.height=img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        const dataUrl=canvas.toDataURL('image/jpeg',0.7);
        state.progressPics.push({date:new Date().toISOString(),dayName,dataUrl});
        store.set('pics',state.progressPics);
        showToast('\u{1F4F8} Progress pic saved!');render();
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

// ── Deload Detection ──
function checkDeload(){
  if(state.deloadDismiss&&(Date.now()-new Date(state.deloadDismiss).getTime())<7*864e5)return{needed:false};
  const liftSessions=state.history.filter(s=>s.type!=='activity');
  if(liftSessions.length<3)return{needed:false};
  // 1. Rising RPE
  const r3=liftSessions.slice(0,3).filter(s=>s.rpe);const p3=liftSessions.slice(3,6).filter(s=>s.rpe);
  if(r3.length>=3&&p3.length>=3){
    const ra=r3.reduce((a,s)=>a+s.rpe,0)/r3.length;const pa=p3.reduce((a,s)=>a+s.rpe,0)/p3.length;
    if(ra>=8&&ra-pa>=1.5)return{needed:true,reason:`Avg session RPE rose to ${ra.toFixed(1)} \u2014 up ${(ra-pa).toFixed(1)} pts from your previous baseline. Your body is accumulating fatigue.`};
  }
  // 2. Consistent heavy volume (skill-adjusted threshold)
  const sk=getSkill();const deloadWks=sk.deloadWeeks||5;
  const periodMs=deloadWks*7*864e5;
  const threshold=Math.round(deloadWks*2);
  const nPeriod=liftSessions.filter(s=>new Date(s.date).getTime()>Date.now()-periodMs).length;
  if(nPeriod>=threshold)return{needed:true,reason:`${nPeriod} lifting sessions in ${deloadWks} weeks. Consistent heavy training demands a periodic deload.`};
  // 3. PR stagnation
  if(liftSessions.length>=8&&Object.keys(state.prRecords).length>0){
    const dates=Object.values(state.prRecords).map(p=>new Date(p.date).getTime());
    const days=Math.floor((Date.now()-Math.max(...dates))/864e5);
    if(days>=21)return{needed:true,reason:`No new PRs in ${days} days across ${liftSessions.length} sessions. Accumulated fatigue may be blunting your progress.`};
  }
  return{needed:false};
}

// ── Deload Helpers ──
const DELOAD_STRATEGIES=[
  {id:'light',name:'LIGHT WEEK',desc:'Same exercises & sets. All weights reduced to 50%.',icon:'\u{1F4A1}',color:'#c4883a',
    apply:(w)=>Math.round(w*0.5/5)*5, setsModify:(s)=>s},
  {id:'volume',name:'VOLUME CUT',desc:'Same exercises & weights. Sets cut in half (min 2).',icon:'\u2702\uFE0F',color:'#6a9a5a',
    apply:(w)=>w, setsModify:(s)=>Math.max(2,Math.ceil(s/2))},
  {id:'easy',name:'EASY WEEK',desc:'Weights at 60%, sets reduced by 1. The full reset.',icon:'\u{1F9D8}',color:'#c45fff',
    apply:(w)=>Math.round(w*0.6/5)*5, setsModify:(s)=>Math.max(2,s-1)}
];
function getDeloadStrategy(id){return DELOAD_STRATEGIES.find(s=>s.id===id)}
function getDeloadWeight(exId,strategy){
  const last=state.lastWeights[exId];const pr=state.prRecords[exId];
  const baseWeight=last?last.weight:(pr?pr.weight:0);
  if(!baseWeight)return 0;
  const strat=getDeloadStrategy(strategy);
  return strat?strat.apply(baseWeight):baseWeight;
}
function getDeloadSets(originalSets,strategy){
  const strat=getDeloadStrategy(strategy);
  return strat?strat.setsModify(originalSets):originalSets;
}
function isDeloadActive(){return state.deloadActive&&new Date(state.deloadActive.endDate).getTime()>Date.now()}
function deloadDaysLeft(){
  if(!isDeloadActive())return 0;
  return Math.ceil((new Date(state.deloadActive.endDate).getTime()-Date.now())/864e5);
}
function activateDeload(strategyId){
  const now=new Date();const end=new Date(now.getTime()+7*864e5);
  state.deloadActive={strategy:strategyId,startDate:now.toISOString(),endDate:end.toISOString()};
  state.deloadDismiss=now.toISOString();
  store.set('deloadActive',state.deloadActive);store.set('deloadDismiss',state.deloadDismiss);
  state.view='home';render();
  showToast('Deload week activated!');
}
function endDeload(){
  state.deloadActive=null;store.set('deloadActive',null);
  state.view='home';render();
  showToast('Deload ended \u2014 back to full power');
}

    const GUIDE_SECTIONS=[
      {title:'GETTING STARTED',items:[
        {name:'Choose a Program',desc:'When you first open Forge, pick from 3 built-in programs (Bro Split, Push/Pull/Legs, Upper/Lower) or skip to build your own from scratch. You can always change this later.'},
        {name:'Your Training Split',desc:'The home screen shows your weekly training days as cards. Each card is a workout day with a name, icon, color, and list of exercises. Tap a card to start that workout.'},

      {title:'LOGGING A WORKOUT',items:[

        {name:'Undo Last Set',desc:'Made a mistake? The UNDO button appears after logging a set. Tap it to remove the last logged set and redo it.'},

        {name:'Workout Notes',desc:'On the day overview screen, there\'s a notes field at the bottom. Jot down how the session felt, injuries, or anything you want to remember.'},

      {title:'WEIGHT & REPS TOOLS',items:[
        {name:'Quick-Adjust Buttons',desc:'The weight row has buttons from -45 to +45 for fast plate-math jumps. The reps row has -1/+1. You can also use the scroll pickers below for fine-tuning.'},
        {name:'e1RM (Estimated 1-Rep Max)',desc:'Shown above the weight picker. Calculated using the Epley formula: weight \u00D7 (1 + reps/30). This estimates the heaviest single rep you could do based on your current set.'},
        {name:'Plate Calculator',desc:'Tap PLATES in the toolbar during an exercise. Shows exactly which plates to load on each side of the bar based on your selected weight and bar weight (configurable in Settings).'},
        {name:'Warm-Up Ramp',desc:'Tap WARM-UP in the toolbar. Generates a warm-up progression: bar only \u2192 40% \u2192 60% \u2192 80% \u2192 working weight, with suggested reps for each.'},
        {name:'Weight Range',desc:'The weight selector goes up to 1,500 lbs to accommodate heavy compound movements like leg press.'},
      ]},
      {title:'EXERCISE TOOLS',items:[
        {name:'How-To Videos',desc:'Tap the \u{1F3AC} icon on any exercise to see a form video. Plays inline or links to the full YouTube tutorial.'},
        {name:'Exercise Info',desc:'Tap the \u2139\uFE0F icon to see target muscles, form tips, injury risk warnings, and form cues for the current exercise.'},
        {name:'Exercise Notes',desc:'Tap the \u{1F4DD} icon to save personal notes for an exercise — machine settings, grip preferences, injury modifications. Notes persist across sessions.'},
        {name:'Exercise Substitution (Swap)',desc:'Tap the \u{1F504} icon to swap an exercise for a similar movement. Options are rated Good / Better / Best. Swaps only last for the current session.'},
        {name:'Assisted Movements',desc:'For pullups, dips, and other bodyweight exercises, an assist weight option appears. Set the amount of assistance (e.g., band or machine counterweight) and it\'s tracked separately.'},

      {title:'TRACKING & ANALYTICS',items:[

        {name:'Intensity Insight',desc:'On the Insights tab, the "How Hard Are You Training?" card analyzes your recent RPE averages and gives a plain-English verdict: LIGHT (push harder), BUILDING (good hypertrophy zone), DIALED IN (sweet spot), HEAVY BLOCK (plan a deload), or BACK OFF (reduce intensity).'},

  // ═══════════════ TEMPLATE PICKER (first launch) ═══════════════
  if(state.view==='templatePicker'){
    root.appendChild(h('div',{style:{textAlign:'center',paddingTop:'32px',marginBottom:'32px'}},

      const active=false;

        onClick:()=>{const days=tmpl.days.map(d=>({...d,exercises:d.exercises.map(e=>({...e}))}));state.splits=[{name:tmpl.name,days}];state.activeSplitIdx=0;state.days=days;save();store.set('launched',true);state.view='home';render()}},

      onClick:()=>{state.days=[];state.splits=[{name:'My Split',days:[]}];state.activeSplitIdx=0;save();store.set('launched',true);state.view='home';render()}},'SKIP \u2014 I\'LL BUILD MY OWN'));

  // ═══════════════ ACTIVITY LOGGING ═══════════════
  if(state.view==='activity'){

      h('div',{style:{fontSize:'12px',fontWeight:'800',letterSpacing:'3px',color:'var(--text2)'}},'LOG ACTIVITY'),
      h('div',{style:{width:'50px'}})));

    // Category filter
    const allCats=['All',...RECREATIONAL_ACTIVITIES.map(c=>c.cat)];
    const catRow=h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'16px'}});

      if(!showCat){root.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'2px',color:'var(--text3)',marginBottom:'8px',marginTop:'4px'}},group.icon+' '+group.cat.toUpperCase()));}
      const row=h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'12px'}});

        const sel=state.selectedActivity&&state.selectedActivity.name===act.name;

      const card=h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'14px',padding:'16px',marginBottom:'16px'}});
      card.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'800',letterSpacing:'2px',color:'var(--text3)',marginBottom:'12px'}},'DURATION'));

      const scroller=h('div',{style:{height:'100%',overflowY:'scroll',scrollSnapType:'y mandatory',WebkitOverflowScrolling:'touch',paddingTop:'40px',paddingBottom:'40px',msOverflowStyle:'none',scrollbarWidth:'none'}});
      scroller.style.cssText+='::-webkit-scrollbar{display:none}';
      ACTIVITY_DURATIONS.forEach(d=>{
        const item=h('div',{style:{height:'40px',display:'flex',alignItems:'center',justifyContent:'center',scrollSnapAlign:'center',fontSize:'18px',fontWeight:'800',color:d===state.activityDuration?'#ff8500':'var(--text3)',transition:'color 0.15s'}},
          d<60?`${d} min`:d%60===0?`${d/60} hr${d>60?'s':''}`:`${Math.floor(d/60)}h ${d%60}m`);

      pickerWrap.appendChild(scroller);
      card.appendChild(pickerWrap);
      // Scroll to current value & listen for changes
      requestAnimationFrame(()=>{
        const idx=ACTIVITY_DURATIONS.indexOf(state.activityDuration);

        let scrollTimer;
        scroller.addEventListener('scroll',()=>{
          clearTimeout(scrollTimer);

            const snapIdx=Math.round(scroller.scrollTop/40);

// ── Actions ──
function openDay(day){state.selectedDay=day;state.sessionSets={};state.sessionSwaps={};state.exIndex=0;state.showWarmup=false;state.workoutNote='';state.workoutStartTime=null;if(state.workoutElapsedTimer){clearInterval(state.workoutElapsedTimer);state.workoutElapsedTimer=null}stopRest();state.view='day';render()}
const WARMUP_STRETCHES={
  chest:['Doorway pec stretch (30s each side)','Arm circles \u2014 10 forward, 10 backward','Band pull-aparts \u00D7 15'],
  shoulders:['Shoulder dislocates with band \u00D7 10','Cross-body arm stretch (20s each)','Wall slides \u00D7 10'],
  triceps:['Overhead tricep stretch (20s each arm)','Arm circles \u2014 10 forward, 10 backward'],
  back:['Cat-cow stretch \u00D7 10','Lat hang from pull-up bar (20s)','Thoracic rotations \u00D7 8 each side'],
  lats:['Lat hang from pull-up bar (20s)','Side-bending lat stretch (20s each)','Child\u2019s pose with arms extended (30s)'],
  biceps:['Doorway bicep stretch (20s each arm)','Wrist circles \u00D7 10 each direction'],
  quads:['Standing quad stretch (20s each leg)','Walking lunges \u00D7 8 each leg','Leg swings \u2014 10 forward/back each leg'],
  glutes:['Pigeon stretch (30s each side)','Glute bridges \u00D7 15','90/90 hip stretch (20s each side)'],
  hamstrings:['Standing toe touch (20s)','Walking RDLs (bodyweight) \u00D7 8','Leg swings \u2014 10 forward/back each leg'],
  calves:['Wall calf stretch (20s each leg)','Ankle circles \u00D7 10 each direction'],
  core:['Cat-cow stretch \u00D7 10','Dead bugs (bodyweight) \u00D7 8 each side','Plank hold 20s'],
  hips:['Hip circles \u00D7 10 each direction','Deep bodyweight squat hold (30s)','90/90 hip stretch (20s each side)'],
};
const MUSCLE_KEYWORDS={
  chest:['chest','pec'],shoulders:['delt','shoulder'],triceps:['tricep'],
  back:['back','rhomb','trap','posterior'],lats:['lat'],biceps:['bicep'],
  quads:['quad'],glutes:['glute'],hamstrings:['hamstring','ham'],
  calves:['calf','calve','soleus','gastroc'],core:['core','ab','oblique'],
  hips:['hip','adduct'],
};
function getDayMuscleGroups(day){
  const groups=new Set();
  day.exercises.forEach(ex=>{
    const info=getExInfo(ex.id);if(!info||!info.muscles)return;
    const m=info.muscles.toLowerCase();
    Object.entries(MUSCLE_KEYWORDS).forEach(([group,keywords])=>{
      if(keywords.some(kw=>m.includes(kw)))groups.add(group);
    });
  });
  return[...groups];
}
function getWarmupStretches(day){
  const groups=getDayMuscleGroups(day);
  const seen=new Set();const stretches=[];
  // Prioritize primary muscle groups, pick 3-4 unique stretches
  groups.forEach(g=>{
    const s=WARMUP_STRETCHES[g];if(!s)return;
    s.forEach(str=>{if(!seen.has(str)){seen.add(str);stretches.push({group:g,stretch:str})}});
  });
  return stretches.slice(0,5);
}
function openExercise(idx){
  const ex=state.selectedDay.exercises[idx];const existing=state.sessionSets[ex.id]||[];
  state.exIndex=idx;state.currentSet=existing.filter(s=>s.tag!=='warmup').length+1;state.setTag='normal';
  state.showDemo=false;state.showExInfo=false;state.showSwapMenu=false;
  const pr=state.prRecords[ex.id];const last=existing.length>0?existing[existing.length-1]:null;
  const lastW=state.lastWeights[ex.id];
  // Base weight: current session last set > last workout weight > PR > 0
  let baseWeight=last?last.weight:(lastW?lastW.weight:(pr?pr.weight:0));
  let baseReps=last?last.reps:(lastW?lastW.reps:(pr?pr.reps:8));
  // Apply deload modifier
  if(isDeloadActive()&&!last){
    const strat=getDeloadStrategy(state.deloadActive.strategy);
    if(baseWeight>0)baseWeight=strat.apply(baseWeight);
  }
  state.setWeight=baseWeight;state.setReps=baseReps;
  state.setAssistWeight=last?(last.assistWeight||0):0;
  state.view='exercise';render();
}
function logSet(){
  const day=state.selectedDay;const ex=day.exercises[state.exIndex];
  if(!state.sessionSets[ex.id])state.sessionSets[ex.id]=[];
  const isWarmup=state.setTag==='warmup';
  const setData={weight:state.setWeight,reps:state.setReps,set:isWarmup?'W':state.currentSet,tag:state.setTag,rpe:state.setRpe};
  if(ASSISTED_EXERCISES.has(ex.id)&&state.setAssistWeight>0)setData.assistWeight=state.setAssistWeight;
  const swap=state.sessionSwaps[ex.id];
  if(swap)setData.swappedTo=swap.subId;
  state.sessionSets[ex.id].push(setData);
  state.setTag='normal';
  startWorkoutTimer();

  // Start rest timer (skip for warmup — shorter rest assumed)
  if(state.restSeconds>0&&!isWarmup)startRest();

  // Warmup sets don't advance the set counter
  if(isWarmup){render();return}

  // Superset auto-advance
  const partnerId=state.supersets[ex.id];
  if(partnerId){const pIdx=day.exercises.findIndex(e=>e.id===partnerId);
    if(pIdx>=0){const pSets=state.sessionSets[partnerId]||[];const pWork=pSets.filter(s=>s.tag!=='warmup').length;const pAdj=skillSets(day.exercises[pIdx].sets);
      if(pWork<pAdj){const pEx=day.exercises[pIdx];const pPr=state.prRecords[pEx.id];const pLast=state.lastWeights[pEx.id];
        state.exIndex=pIdx;state.currentSet=pWork+1;state.setWeight=pLast?pLast.weight:(pPr?pPr.weight:0);state.setReps=pLast?pLast.reps:(pPr?pPr.reps:8);state.setAssistWeight=0;state.showDemo=false;state.showExInfo=false;state.showSwapMenu=false;render();return}}}

  if(state.currentSet<skillSets(ex.sets)){state.currentSet++;render()}
  else if(state.exIndex<day.exercises.length-1){
    const next=day.exercises[state.exIndex+1];const nextPr=state.prRecords[next.id];
    const lastW=state.lastWeights[next.id];
    state.exIndex++;state.currentSet=1;state.showDemo=false;state.showExInfo=false;state.showSwapMenu=false;
    let w=lastW?lastW.weight:(nextPr?nextPr.weight:state.setWeight);
    let r=lastW?lastW.reps:(nextPr?nextPr.reps:8);
    if(isDeloadActive()&&w>0){const strat=getDeloadStrategy(state.deloadActive.strategy);w=strat.apply(w)}
    state.setWeight=w;state.setReps=r;state.setAssistWeight=0;render();
  }else{stopRest();finishWorkout()}
}
function skipExercise(){
  stopRest();
  const day=state.selectedDay;
  if(state.exIndex<day.exercises.length-1){
    const next=day.exercises[state.exIndex+1];const nextPr=state.prRecords[next.id];
    const lastW=state.lastWeights[next.id];
    const existing=state.sessionSets[next.id]||[];
    state.exIndex++;state.currentSet=existing.length+1;state.showSwapMenu=false;
    let w=lastW?lastW.weight:(nextPr?nextPr.weight:0);
    let r=lastW?lastW.reps:(nextPr?nextPr.reps:8);
    if(isDeloadActive()&&w>0){const strat=getDeloadStrategy(state.deloadActive.strategy);w=strat.apply(w)}
    state.setWeight=w;state.setReps=r;state.setAssistWeight=0;render();
  }else{finishWorkout()}
}
function finishWorkout(){
  const day=state.selectedDay;const entries=[];const newPrs={...state.prRecords};let prCount=0;let prList=[];let totalVol=0;
  day.exercises.forEach(ex=>{
    const sets=state.sessionSets[ex.id];
    if(sets&&sets.length>0){
      const workSets=sets.filter(s=>s.tag!=='warmup');
      let best=workSets[0]||sets[0];workSets.forEach(s=>{if(s.weight*s.reps>best.weight*best.reps)best=s});
      entries.push({id:ex.id,name:ex.name,sets,bestWeight:best.weight,bestReps:best.reps});
      totalVol+=calcVolume(workSets);
      if(workSets.length>0){const old=newPrs[ex.id];if(!old||best.weight*best.reps>old.weight*old.reps){
        newPrs[ex.id]={weight:best.weight,reps:best.reps,date:new Date().toISOString()};
        prCount++;prList.push({name:ex.name,weight:best.weight,reps:best.reps})}}
    }});
  if(entries.length===0){showToast('No sets logged');state.view='home';render();return}
  // Save last used weights per exercise
  day.exercises.forEach(ex=>{
    const sets=state.sessionSets[ex.id];if(!sets)return;
    const workSets=sets.filter(s=>s.tag!=='warmup');
    if(workSets.length>0){
      const heaviest=workSets.reduce((a,s)=>s.weight>a.weight?s:a,workSets[0]);
      state.lastWeights[ex.id]={weight:heaviest.weight,reps:heaviest.reps,date:new Date().toISOString()};
    }
  });
  const workoutDuration=stopWorkoutTimer();
  const session={date:new Date().toISOString(),dayId:day.id,dayName:day.name,dayColor:day.color,dayIcon:day.icon,exercises:entries,duration:workoutDuration,note:state.workoutNote||''};
  state.history=[session,...state.history];state.prRecords=newPrs;
  state.summaryData={session,prCount,prList,totalSets:entries.reduce((s,e)=>s+e.sets.length,0),totalVol,workoutDuration};
  save();state.view='summary';render();
}
function adjustTarget(exIdx,field,delta){
  const day=state.selectedDay;const ex=day.exercises[exIdx];
  const dayData=state.days.find(d=>d.id===day.id);if(!dayData)return;
  const exData=dayData.exercises.find(e=>e.id===ex.id);if(!exData)return;
  if(field==='sets'){const n=Math.max(1,Math.min(10,exData.sets+delta));exData.sets=n;ex.sets=n}
  else if(field==='reps'){
    const range=exData.repRange;const rm=range.match(/^(\d+)\s*-\s*(\d+)(.*)/);const sm=range.match(/^(\d+)(.*)/);
    if(rm){let lo=parseInt(rm[1])+delta;let hi=parseInt(rm[2])+delta;const suf=rm[3]||'';lo=Math.max(1,lo);hi=Math.max(lo,hi);const nr=`${lo}-${hi}${suf}`;exData.repRange=nr;ex.repRange=nr}
    else if(sm){let v=parseInt(sm[1])+delta;const suf=sm[2]||'';v=Math.max(1,v);const nr=`${v}${suf}`;exData.repRange=nr;ex.repRange=nr}
  }save();showToast(`${field==='sets'?'Sets':'Reps'} ${delta>0?'\u2191':'\u2193'} ${field==='sets'?exData.sets:exData.repRange}`);render();
}
function updatePrInd(){
  const el=document.getElementById('pr-indicator');if(!el||!state.selectedDay)return;
  const ex=state.selectedDay.exercises[state.exIndex];const pr=state.prRecords[ex.id];
  const isNewPr=state.setWeight*state.setReps>(pr?pr.weight*pr.reps:0)&&state.setWeight*state.setReps>0;
  el.innerHTML=isNewPr?'<span style="font-size:11px;font-weight:900;color:#ffb800;letter-spacing:2px;animation:prBurst 0.5s ease">\u{1F525} NEW PR \u{1F525}</span>':'';
}

// ── Init ──
state.prRecords=store.get('prs')||{};
state.history=store.get('history')||[];
state.splits=store.get('splits')||[];
state.activeSplitIdx=store.get('activeSplitIdx')||0;
// Load days — migrate existing users into splits system
const savedDays=store.get('days');
if(state.splits.length===0&&savedDays&&savedDays.length>0){
  // Existing user: wrap their current days into a split
  state.splits=[{name:'My Split',days:savedDays}];
  state.activeSplitIdx=0;state.days=savedDays;
}else if(state.splits.length>0){
  // Multi-split user: load active split
  if(state.activeSplitIdx>=state.splits.length)state.activeSplitIdx=0;
  state.days=state.splits[state.activeSplitIdx].days;
}else{
  state.days=[...DEFAULT_DAYS];
}
state.restSeconds=store.get('rest')||90;
state.customExercises=store.get('customEx')||[];
state.exerciseNotes=store.get('exNotes')||{};
state.progressPics=store.get('pics')||[];
state.deloadDismiss=store.get('deloadDismiss')||null;
state.lastWeights=store.get('lastWeights')||{};
state.deloadActive=store.get('deloadActive')||null;
state.measurements=store.get('measurements')||[];
state.supersets=store.get('supersets')||{};
state.barWeight=store.get('barWeight')||45;
// Auto-expire deload if past end date
if(state.deloadActive&&new Date(state.deloadActive.endDate).getTime()<Date.now()){state.deloadActive=null;store.set('deloadActive',null)}
const savedProfile=store.get('profile')||{};
state.profile={weight:savedProfile.weight||'',weightUnit:savedProfile.weightUnit||'lbs',skillLevel:savedProfile.skillLevel||''};
state.wakeLockEnabled=false;
// Re-acquire native wake lock if it was on (iOS video fallback requires user gesture so skip on init)
if(store.get('wakeLock')&&'wakeLock' in navigator){navigator.wakeLock.request('screen').then(s=>{state.wakeLockSentinel=s;state.wakeLockEnabled=true;s.addEventListener('release',()=>{state.wakeLockEnabled=false;state.wakeLockSentinel=null})}).catch(()=>{})}
// First launch: show template picker
if(!store.get('launched'))state.view='templatePicker';
render();
</script>
