.chart-bar{transition:height .5s ease}

.ex-toolbar{display:flex;justify-content:center;gap:10px;padding:0 20px;opacity:0.5;transition:opacity .2s}
.ex-toolbar:hover,.ex-toolbar:active{opacity:0.8}
.ex-toolbar button{background:none;border:none;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.5px;padding:4px 8px}

const h=(tag,attrs,...ch)=>{const el=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='className')el.className=v;else if(k==='innerHTML')el.innerHTML=v;else el.setAttribute(k,v)});ch.flat(Infinity).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c)});return el};

function findExName(id){for(const d of state.days)for(const e of d.exercises)if(e.id===id)return e.name;const lib=getFullLibrary().find(e=>e.id===id);return lib?lib.name:id}
function findExDay(id){for(const d of state.days)for(const e of d.exercises)if(e.id===id)return d;return null}
function getFullLibrary(){return[...EXERCISE_LIBRARY,...state.customExercises]}
function genId(){return 'ex_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)}
function genDayId(){return 'day_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)}
function timeSince(ds){const d=Math.floor((Date.now()-new Date(ds).getTime())/864e5);return d===0?'Today':d===1?'Yesterday':`${d}d ago`}
function fmtDate(ds){return new Date(ds).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function getSkill(){return SKILL_CONFIG[state.profile.skillLevel]||SKILL_CONFIG.intermediate}
function skillSets(base){const sk=getSkill();return Math.max(sk.minSets,base+sk.setsAdjust)}
function skillRepRange(range){const sk=getSkill();if(!sk.repBump)return range;const rm=range.match(/^(\d+)\s*-\s*(\d+)(.*)/);if(rm){let lo=Math.max(1,parseInt(rm[1])-sk.repBump),hi=Math.max(lo,parseInt(rm[2])-sk.repBump);return`${lo}-${hi}${rm[3]||''}`}return range}
function relStrength(weight){const bw=parseFloat(state.profile.weight);if(!bw||!weight)return'';return(weight/bw).toFixed(1)+'x BW'}
function fmtDateShort(ds){return new Date(ds).toLocaleDateString('en-US',{month:'numeric',day:'numeric'})}
function getTodayWD(){return WEEKDAYS[((new Date().getDay()+6)%7)]}
function getRpeColor(rpe){const c={1:'#3dd68c',2:'#3dd68c',3:'#5ae0a0',4:'#7de8b0',5:'#ffb800',6:'#ffa200',7:'#ff8500',8:'#ff5533',9:'#ff3d3d',10:'#ff1a1a'};return c[rpe]||'#888'}
function fmtTime(s){const m=Math.floor(s/60);const sec=s%60;return m>0?`${m}:${String(sec).padStart(2,'0')}`:`${sec}s`}
function calcVolume(sets){return sets.reduce((sum,s)=>sum+(s.tag==='warmup'?0:s.weight*s.reps),0)}

// ── Audio (Web Audio API) ──
let audioCtx=null;
function ensureAudio(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();return audioCtx}
document.addEventListener('touchstart',ensureAudio,{once:true});
document.addEventListener('click',ensureAudio,{once:true});
function playDing(){
  try{
    const ctx=ensureAudio();if(!ctx)return;
    const t=ctx.currentTime;
    const osc=ctx.createOscillator();const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sine';osc.frequency.value=660;
    gain.gain.setValueAtTime(0.12,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    osc.start(t);osc.stop(t+0.5);
  }catch(e){}
}
function notifyRestDone(){
  playDing();
  if('Notification' in window&&Notification.permission==='granted'){
    try{navigator.serviceWorker.ready.then(reg=>{reg.showNotification('Iron Log',{body:'Rest complete! Go time.',icon:'./icon-192.png',tag:'rest-done',renotify:true})})}catch(e){}
  }
}

// ── Rest Timer (timestamp-based — survives backgrounding) ──
function startRest(){
  stopRest();
  if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();
  state.restEndTime=Date.now()+state.restSeconds*1000;
  state.restActive=true;
  function tick(){
    const remaining=Math.max(0,Math.ceil((state.restEndTime-Date.now())/1000));
    state.restRemaining=remaining;
    const el=document.getElementById('rest-display');
    if(el)el.textContent=fmtTime(remaining);
    const prog=document.getElementById('rest-progress');
    if(prog)prog.style.width=`${Math.min(100,((state.restSeconds-remaining)/state.restSeconds)*100)}%`;
    if(remaining<=0){
      state.restActive=false;state.restRemaining=0;state.restEndTime=null;state.restInterval=null;
      try{if(navigator.vibrate)navigator.vibrate([200,100,200])}catch{}
      notifyRestDone();
      showToast('\u23F0 Rest complete! Go time.');
      render();
    }else{state.restInterval=setTimeout(tick,250)}
  }
  tick();render();
}
function stopRest(){if(state.restInterval){clearTimeout(state.restInterval);state.restInterval=null}state.restActive=false;state.restRemaining=0;state.restEndTime=null}

// ── CSV Export ──
function exportCSV(){
  let csv='Date,Day,Exercise,Set,Weight,Reps,Tag,RPE,Volume,AssistWeight\n';
  state.history.forEach(sess=>{
    if(sess.type==='activity'){
      csv+=`"${new Date(sess.date).toISOString()}","${sess.dayName}","Activity",,,,,,${sess.duration||''}min\n`;
      return;
    }
    sess.exercises.forEach(ex=>{
      (ex.sets||[]).forEach(s=>{
        csv+=`"${new Date(sess.date).toISOString()}","${sess.dayName}","${ex.name}",${s.set},${s.weight},${s.reps},${s.tag||'normal'},${s.rpe||''},${s.weight*s.reps},${s.assistWeight||''}\n`;
      });
    });
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`ironlog-export-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('CSV downloaded \u2705');
}

// ── Progress Chart (canvas-based) ──
function drawChart(container,exId,color){
  const sessions=state.history.filter(s=>s.exercises.some(e=>e.id===exId)).reverse();
  if(sessions.length<2){container.appendChild(h('div',{style:{textAlign:'center',padding:'20px',color:'var(--text3)',fontSize:'12px'}},'Need 2+ sessions to show chart'));return}
  const points=sessions.map(s=>{
    const ex=s.exercises.find(e=>e.id===exId);
    const best=ex.sets?ex.sets.reduce((b,cur)=>cur.weight*cur.reps>b.weight*b.reps?cur:b,ex.sets[0]):{weight:ex.bestWeight||0,reps:ex.bestReps||0};
    return{date:new Date(s.date),weight:best.weight,reps:best.reps,vol:best.weight*best.reps};
  }).slice(-12);

  const maxW=Math.max(...points.map(p=>p.weight));
  const minW=Math.min(...points.map(p=>p.weight));
  const range=maxW-minW||1;
  const W=Math.min(container.offsetWidth||300,400);
  const H=140;

  const canvas=document.createElement('canvas');canvas.width=W*2;canvas.height=H*2;
  canvas.style.cssText=`width:${W}px;height:${H}px`;
  const ctx=canvas.getContext('2d');ctx.scale(2,2);

  const padL=36,padR=10,padT=10,padB=28;
  const cw=W-padL-padR,ch=H-padT-padB;

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
  for(let i=0;i<4;i++){const y=padT+ch*(i/3);ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke()}

  // Y labels
  ctx.fillStyle='#555570';ctx.font='9px system-ui';ctx.textAlign='right';
  for(let i=0;i<4;i++){const val=maxW-range*(i/3);ctx.fillText(val%1===0?val:val.toFixed(1),padL-6,padT+ch*(i/3)+3)}

  // Line + area
  const pts=points.map((p,i)=>({x:padL+cw*(i/(points.length-1)),y:padT+ch*(1-(p.weight-minW)/range)}));
  
  // Area fill
  ctx.beginPath();ctx.moveTo(pts[0].x,H-padB);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H-padB);ctx.closePath();
  const grad=ctx.createLinearGradient(0,padT,0,H-padB);
  grad.addColorStop(0,color+'30');grad.addColorStop(1,color+'05');
  ctx.fillStyle=grad;ctx.fill();

  // Line
  ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();

  // Dots
  pts.forEach((p,i)=>{
    ctx.beginPath();ctx.arc(p.x,p.y,i===pts.length-1?4:2.5,0,Math.PI*2);
    ctx.fillStyle=i===pts.length-1?color:'#fff';ctx.fill();
    if(i===pts.length-1){ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke()}
  });

  // X labels
  ctx.fillStyle='#555570';ctx.font='8px system-ui';ctx.textAlign='center';
  const step=Math.max(1,Math.floor(points.length/5));
  points.forEach((p,i)=>{if(i%step===0||i===points.length-1)ctx.fillText(`${p.date.getMonth()+1}/${p.date.getDate()}`,pts[i].x,H-padB+14)});

  container.appendChild(canvas);

  // Latest stats
  const latest=points[points.length-1];
  const prev=points.length>=2?points[points.length-2]:null;
  const diff=prev?latest.weight-prev.weight:0;
  container.appendChild(h('div',{style:{display:'flex',justifyContent:'center',gap:'16px',marginTop:'8px',fontSize:'11px'}},
    h('span',{style:{color:'var(--text2)'}},`Latest: `,h('span',{style:{fontWeight:'800',color}},`${latest.weight} x ${latest.reps}`)),
    diff!==0?h('span',{style:{color:diff>0?'#3dd68c':'#ff3d3d',fontWeight:'700'}},`${diff>0?'\u2191':'\u2193'}${Math.abs(diff).toFixed(1)} ${state.profile.weightUnit||'lbs'}`):null
  ));
}

// ── ScrollPicker ──
function createPicker(options,value,onChange,label,format,color){
  const ITEM_H=48;const fmt=format||(v=>v);
  const container=h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',flex:'1'}});
  container.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'2px',color:'#555570',marginBottom:'8px'}},label));
  const wrapper=h('div',{style:{position:'relative',height:`${ITEM_H*3}px`,width:'100%',overflow:'hidden',borderRadius:'14px',background:'#0a0a14'}});
  wrapper.appendChild(h('div',{style:{position:'absolute',top:`${ITEM_H}px`,left:'4px',right:'4px',height:`${ITEM_H}px`,borderRadius:'10px',background:`${color}15`,border:`1px solid ${color}30`,pointerEvents:'none',zIndex:'1'}}));
  wrapper.appendChild(h('div',{style:{position:'absolute',top:'0',left:'0',right:'0',height:`${ITEM_H}px`,background:'linear-gradient(to bottom, #0a0a14 20%, transparent)',pointerEvents:'none',zIndex:'2'}}));
  wrapper.appendChild(h('div',{style:{position:'absolute',bottom:'0',left:'0',right:'0',height:`${ITEM_H}px`,background:'linear-gradient(to top, #0a0a14 20%, transparent)',pointerEvents:'none',zIndex:'2'}}));
  const scroll=h('div',{className:'picker-scroll',style:{height:'100%',overflowY:'auto',paddingTop:`${ITEM_H}px`,paddingBottom:`${ITEM_H}px`}});
  let isScrolling=false;
  options.forEach((opt,i)=>{
    const selected=opt===value;
    scroll.appendChild(h('div',{style:{height:`${ITEM_H}px`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:selected?'26px':'18px',fontWeight:selected?'900':'500',color:selected?color:'#333348',transition:'all 0.15s',cursor:'pointer'},
      onClick:()=>{onChange(opt);scroll.scrollTo({top:i*ITEM_H,behavior:'smooth'})}},String(fmt(opt))));
  });
  scroll.addEventListener('scroll',()=>{if(isScrolling)return;isScrolling=true;requestAnimationFrame(()=>{const idx=Math.round(scroll.scrollTop/ITEM_H);const c=Math.max(0,Math.min(idx,options.length-1));if(options[c]!==value)onChange(options[c]);isScrolling=false})});
  wrapper.appendChild(scroll);container.appendChild(wrapper);
  requestAnimationFrame(()=>{const idx=options.indexOf(value);if(idx>=0)scroll.scrollTop=idx*ITEM_H});
  return container;
}

// ── Wake Lock (native + iOS video fallback) ──
async function toggleWakeLock(){
  if(state.wakeLockEnabled){
    if(state.wakeLockSentinel){try{await state.wakeLockSentinel.release()}catch(e){}state.wakeLockSentinel=null}
    if(state.wakeLockVideo){state.wakeLockVideo.pause();state.wakeLockVideo.remove();state.wakeLockVideo=null}
    state.wakeLockEnabled=false;store.set('wakeLock',false);showToast('Screen lock re-enabled');
  }else{
    try{
      // Try native Wake Lock API first (Android/Chrome)
      state.wakeLockSentinel=await navigator.wakeLock.request('screen');
      state.wakeLockEnabled=true;store.set('wakeLock',true);
      showToast('\u{1F506} Screen will stay on (uses more battery)');
      state.wakeLockSentinel.addEventListener('release',()=>{state.wakeLockEnabled=false;state.wakeLockSentinel=null});
    }catch(e){
      // iOS fallback: tiny silent canvas-stream video prevents sleep
      try{
        const canvas=document.createElement('canvas');canvas.width=canvas.height=1;
        canvas.getContext('2d').fillRect(0,0,1,1);
        const stream=canvas.captureStream(1);
        const video=document.createElement('video');
        video.srcObject=stream;video.muted=true;video.loop=true;
        video.setAttribute('playsinline','');
        video.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0.001;pointer-events:none;z-index:-1';
        document.body.appendChild(video);
        await video.play();
        state.wakeLockVideo=video;state.wakeLockEnabled=true;store.set('wakeLock',true);
        showToast('\u{1F506} Screen will stay on (iOS mode)');
      }catch(e2){showToast('Wake lock not supported on this device');state.wakeLockEnabled=false}
    }
  }
  render();
}

function undoLastSet(){
  const day=state.selectedDay;const ex=day.exercises[state.exIndex];
  const sets=state.sessionSets[ex.id];
  if(!sets||sets.length===0){showToast('No sets to undo');return}
  const removed=sets.pop();
  if(removed.tag!=='warmup'&&state.currentSet>1)state.currentSet--;
  state.setWeight=removed.weight;state.setReps=removed.reps;state.setTag=removed.tag||'normal';
  showToast('Set removed \u21A9');render();
}

// ── Progress Pics ──
function captureProgressPic(dayName){
  const input=document.createElement('input');
  input.type='file';input.accept='image/*';input.capture='environment';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      // Compress to reasonable size
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const maxDim=800;const scale=Math.min(maxDim/img.width,maxDim/img.height,1);
        canvas.width=img.width*scale;canvas.height=img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        const dataUrl=canvas.toDataURL('image/jpeg',0.7);
        state.progressPics.push({date:new Date().toISOString(),dayName,dataUrl});
        store.set('pics',state.progressPics);
        showToast('\u{1F4F8} Progress pic saved!');render();
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

// ── Deload Detection ──
function checkDeload(){
  if(state.deloadDismiss&&(Date.now()-new Date(state.deloadDismiss).getTime())<7*864e5)return{needed:false};
  const liftSessions=state.history.filter(s=>s.type!=='activity');
  if(liftSessions.length<3)return{needed:false};
  // 1. Rising RPE
  const r3=liftSessions.slice(0,3).filter(s=>s.rpe);const p3=liftSessions.slice(3,6).filter(s=>s.rpe);
  if(r3.length>=3&&p3.length>=3){
    const ra=r3.reduce((a,s)=>a+s.rpe,0)/r3.length;const pa=p3.reduce((a,s)=>a+s.rpe,0)/p3.length;
    if(ra>=8&&ra-pa>=1.5)return{needed:true,reason:`Avg session RPE rose to ${ra.toFixed(1)} \u2014 up ${(ra-pa).toFixed(1)} pts from your previous baseline. Your body is accumulating fatigue.`};
  }
  // 2. Consistent heavy volume (skill-adjusted threshold)
  const sk=getSkill();const deloadWks=sk.deloadWeeks||5;
  const periodMs=deloadWks*7*864e5;
  const threshold=Math.round(deloadWks*2);
  const nPeriod=liftSessions.filter(s=>new Date(s.date).getTime()>Date.now()-periodMs).length;
  if(nPeriod>=threshold)return{needed:true,reason:`${nPeriod} lifting sessions in ${deloadWks} weeks. Consistent heavy training demands a periodic deload.`};
  // 3. PR stagnation
  if(liftSessions.length>=8&&Object.keys(state.prRecords).length>0){
    const dates=Object.values(state.prRecords).map(p=>new Date(p.date).getTime());
    const days=Math.floor((Date.now()-Math.max(...dates))/864e5);
    if(days>=21)return{needed:true,reason:`No new PRs in ${days} days across ${liftSessions.length} sessions. Accumulated fatigue may be blunting your progress.`};
  }
  return{needed:false};
}

// ── Deload Helpers ──
const DELOAD_STRATEGIES=[
  {id:'light',name:'LIGHT WEEK',desc:'Same exercises & sets. All weights reduced to 50%.',icon:'\u{1F4A1}',color:'#4d8df7',
    apply:(w)=>Math.round(w*0.5/5)*5, setsModify:(s)=>s},
  {id:'volume',name:'VOLUME CUT',desc:'Same exercises & weights. Sets cut in half (min 2).',icon:'\u2702\uFE0F',color:'#3dd68c',
    apply:(w)=>w, setsModify:(s)=>Math.max(2,Math.ceil(s/2))},
  {id:'easy',name:'EASY WEEK',desc:'Weights at 60%, sets reduced by 1. The full reset.',icon:'\u{1F9D8}',color:'#c45fff',
    apply:(w)=>Math.round(w*0.6/5)*5, setsModify:(s)=>Math.max(2,s-1)}
];
function getDeloadStrategy(id){return DELOAD_STRATEGIES.find(s=>s.id===id)}
function getDeloadWeight(exId,strategy){
  const last=state.lastWeights[exId];const pr=state.prRecords[exId];
  const baseWeight=last?last.weight:(pr?pr.weight:0);
  if(!baseWeight)return 0;
  const strat=getDeloadStrategy(strategy);
  return strat?strat.apply(baseWeight):baseWeight;
}
function getDeloadSets(originalSets,strategy){
  const strat=getDeloadStrategy(strategy);
  return strat?strat.setsModify(originalSets):originalSets;
}
function isDeloadActive(){return state.deloadActive&&new Date(state.deloadActive.endDate).getTime()>Date.now()}
function deloadDaysLeft(){
  if(!isDeloadActive())return 0;
  return Math.ceil((new Date(state.deloadActive.endDate).getTime()-Date.now())/864e5);
}
function activateDeload(strategyId){
  const now=new Date();const end=new Date(now.getTime()+7*864e5);
  state.deloadActive={strategy:strategyId,startDate:now.toISOString(),endDate:end.toISOString()};
  state.deloadDismiss=now.toISOString();
  store.set('deloadActive',state.deloadActive);store.set('deloadDismiss',state.deloadDismiss);
  state.view='home';render();
  showToast('Deload week activated!');
}
function endDeload(){
  state.deloadActive=null;store.set('deloadActive',null);
  state.view='home';render();
  showToast('Deload ended \u2014 back to full power');
}

    for(let i=0;i<adjSets;i++)dots.appendChild(h('div',{style:{width:i===state.currentSet-1?'16px':'6px',height:'6px',borderRadius:'3px',background:i<workCount?'#3dd68c':i===state.currentSet-1?day.color:'rgba(255,255,255,0.08)',transition:'all 0.3s'}}));
    progressLine.appendChild(dots);
    progressLine.appendChild(h('span',{style:{fontSize:'10px',color:'var(--text3)'}},`${state.currentSet}/${adjSets}`));
    if(pr)progressLine.appendChild(h('span',{style:{fontSize:'9px',color:'var(--gold)',fontWeight:'700'}},`PR ${pr.weight}\u00D7${pr.reps}`));
    header.appendChild(progressLine);
    // Target rep range badge
    const adjReps=skillRepRange(ex.repRange);
    header.appendChild(h('div',{style:{display:'inline-flex',alignItems:'center',gap:'6px',padding:'4px 12px',borderRadius:'8px',background:`${day.color}10`,border:`1px solid ${day.color}20`,marginTop:'4px'}},
      h('span',{style:{fontSize:'8px',fontWeight:'800',letterSpacing:'1.5px',color:day.color}},'TARGET'),
      h('span',{style:{fontSize:'11px',fontWeight:'700',color:'var(--text)'}},`${adjSets} sets \u00D7 ${adjReps} reps`)));
    root.appendChild(header);

    // ── Expandable panels (info/demo/swap) — tucked away ──
    if(state.showDemo||state.showExInfo||state.showSwapMenu){
      const panel=h('div',{style:{padding:'0 20px 4px',animation:'fadeIn 0.2s ease'}});
      if(state.showDemo){renderDemoOverlay(panel,displayId,day.color)}
      if(state.showExInfo){
        const exInfo=getExInfo(displayId);
        const infoBox=h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'12px',padding:'12px',textAlign:'left'}});
        if(exInfo){
          // Muscles
          infoBox.appendChild(h('div',{style:{fontSize:'8px',fontWeight:'700',letterSpacing:'1.5px',color:day.color,marginBottom:'3px'}},'TARGET'));
          infoBox.appendChild(h('div',{style:{fontSize:'11px',color:'var(--text)',fontWeight:'600',marginBottom:'8px'}},exInfo.muscles));
          // Tips
          infoBox.appendChild(h('div',{style:{fontSize:'10px',color:'var(--text3)',lineHeight:'1.5',marginBottom:'6px'}},exInfo.tips));
          // Injury risk warning
          if(exInfo.risk){
            const riskCol=exInfo.risk==='high'?'#ff3d3d':'#ff8500';
            const riskBg=exInfo.risk==='high'?'rgba(255,61,61,0.06)':'rgba(255,133,0,0.06)';
            const riskBorder=exInfo.risk==='high'?'rgba(255,61,61,0.2)':'rgba(255,133,0,0.2)';
            infoBox.appendChild(h('div',{style:{background:riskBg,border:`1px solid ${riskBorder}`,borderRadius:'8px',padding:'8px 10px',marginTop:'4px'}},
              h('div',{style:{fontSize:'8px',fontWeight:'800',letterSpacing:'1.5px',color:riskCol,marginBottom:'3px'}},exInfo.risk==='high'?'\u26A0\uFE0F HIGHER INJURY RISK':'\u26A0 TECHNIQUE-SENSITIVE'),
              h('div',{style:{fontSize:'10px',color:'var(--text2)',lineHeight:'1.5'}},exInfo.riskNote)));
          }
          // Novice skill warning
          const sk=getSkill();
          if(state.profile.skillLevel==='novice'&&SKILL_CONFIG.novice.warn.has(displayId)){
            infoBox.appendChild(h('div',{style:{background:'rgba(77,141,247,0.06)',border:'1px solid rgba(77,141,247,0.2)',borderRadius:'8px',padding:'8px 10px',marginTop:'6px'}},
              h('div',{style:{fontSize:'8px',fontWeight:'800',letterSpacing:'1.5px',color:'#4d8df7',marginBottom:'3px'}},'NOVICE TIP'),
              h('div',{style:{fontSize:'10px',color:'var(--text2)',lineHeight:'1.5'}},'This is a complex compound movement. Focus on light weight and proper form before adding load. Consider the substitution options below.')));
          }
        }else{infoBox.appendChild(h('div',{style:{fontSize:'10px',color:'var(--text3)'}},'No info available for this exercise.'))}
        // Form cues
        const cuesInfo=getFormCues(displayId);
        if(cuesInfo){infoBox.appendChild(h('div',{style:{fontSize:'8px',fontWeight:'700',letterSpacing:'1.5px',color:'var(--text3)',marginTop:'10px',marginBottom:'4px'}},'FORM CUES'));
          cuesInfo.forEach(c=>infoBox.appendChild(h('div',{style:{fontSize:'10px',color:'var(--text2)',padding:'2px 0 2px 10px',borderLeft:`2px solid ${day.color}30`,marginBottom:'3px'}},c)))}
        panel.appendChild(infoBox);
      }
      if(state.showSwapMenu&&SUBSTITUTION_MAP[ex.id]){
        const subs=SUBSTITUTION_MAP[ex.id];
        const swapBox=h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'12px',padding:'12px'}});
        if(state.sessionSwaps[ex.id]){
          swapBox.appendChild(h('div',{style:{fontSize:'10px',color:'var(--text2)',marginBottom:'6px'}},'\u2713 Swapped to: '+state.sessionSwaps[ex.id].subName));
          swapBox.appendChild(h('button',{style:{width:'100%',padding:'7px',borderRadius:'8px',background:'rgba(255,61,61,0.06)',border:'1px solid rgba(255,61,61,0.15)',color:'#ff3d3d',fontSize:'10px',fontWeight:'700'},onClick:()=>{delete state.sessionSwaps[ex.id];state.showSwapMenu=false;render()}},'Revert'));
        }else{
          [{key:'good',label:'GOOD',col:'var(--text3)'},{key:'better',label:'BETTER',col:'#ffb800'},{key:'best',label:'BEST',col:'#3dd68c'}].forEach(lv=>{
            const subId=subs[lv.key];if(!subId)return;const subLib=getFullLibrary().find(e=>e.id===subId);if(!subLib)return;
            swapBox.appendChild(h('button',{style:{width:'100%',padding:'8px 10px',borderRadius:'8px',background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',marginBottom:'4px',display:'flex',alignItems:'center',gap:'8px',textAlign:'left',color:'var(--text)'},
              onClick:()=>{state.sessionSwaps[ex.id]={subId,subName:subLib.name};state.showSwapMenu=false;render()}},
              h('span',{style:{fontSize:'8px',fontWeight:'800',color:lv.col,letterSpacing:'1px',minWidth:'38px'}},lv.label),
              h('span',{style:{fontSize:'11px',fontWeight:'600'}},subLib.name)));
          });
        }
        panel.appendChild(swapBox);
      }
      // Close button
      panel.appendChild(h('div',{style:{textAlign:'center',marginTop:'4px'}},
        h('button',{style:{background:'none',border:'none',fontSize:'9px',color:'var(--text3)',fontWeight:'600',padding:'4px 12px'},
          onClick:()=>{state.showDemo=false;state.showExInfo=false;state.showSwapMenu=false;render()}},'\u2715 close')));
      root.appendChild(panel);
    }

    // ── Toolbar: subtle row of text links ──
    if(!state.showDemo&&!state.showExInfo&&!state.showSwapMenu){
      const toolbar=h('div',{className:'ex-toolbar'});
      toolbar.appendChild(h('button',{onClick:()=>{state.showDemo=true;render()}},'\u{1F3AC} how-to'));
      toolbar.appendChild(h('button',{onClick:()=>{state.showExInfo=true;render()}},'\u2139\uFE0F info'));
      if(SUBSTITUTION_MAP[ex.id])toolbar.appendChild(h('button',{style:{color:swap?day.color:'var(--text3)'},onClick:()=>{state.showSwapMenu=true;render()}},swap?'\u{1F504} swapped':'\u{1F504} swap'));
      const noteVal=getExNote(ex.id);
      toolbar.appendChild(h('button',{style:{color:noteVal?day.color:'var(--text3)'},onClick:()=>{
        const val=prompt('Exercise note:',getExNote(ex.id));if(val!==null){setExNote(ex.id,val);render()}
      }},noteVal?'\u{1F4DD} note':'\u{1F4DD} note'));
      root.appendChild(toolbar);
    }

    // ── Rest timer ──
    if(state.restActive){
      const restBox=h('div',{style:{margin:'4px 20px',background:'rgba(255,255,255,0.03)',borderRadius:'10px',padding:'8px 14px',position:'relative',overflow:'hidden'}});
      restBox.appendChild(h('div',{id:'rest-progress',style:{position:'absolute',top:'0',left:'0',height:'100%',background:`${day.color}12`,borderRadius:'10px',width:`${((state.restSeconds-state.restRemaining)/state.restSeconds)*100}%`,transition:'width 1s linear'}}));
      restBox.appendChild(h('div',{style:{position:'relative',display:'flex',alignItems:'center',justifyContent:'space-between'}},
        h('span',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'1.5px',color:'var(--text3)'}},'REST'),
        h('span',{id:'rest-display',style:{fontSize:'20px',fontWeight:'900',color:day.color}},fmtTime(state.restRemaining)),
        h('button',{style:{background:'rgba(255,255,255,0.06)',borderRadius:'6px',padding:'3px 10px',fontSize:'9px',fontWeight:'700',color:'var(--text3)'},onClick:()=>{stopRest();render()}},'SKIP')));
      root.appendChild(restBox);
    }

    // ── Weight + Reps pickers ──
    const pickerRow=h('div',{style:{flex:'1',display:'flex',alignItems:'center',justifyContent:'center',padding:'0 24px',gap:'16px',minHeight:'0'}});
    pickerRow.appendChild(createPicker(WEIGHTS,state.setWeight,v=>{state.setWeight=v;updatePrInd()},'WEIGHT',v=>v===0?'BW':v%1===0?v:v.toFixed(1),day.color));
    pickerRow.appendChild(h('div',{style:{width:'1px',height:'80px',background:'rgba(255,255,255,0.06)',flexShrink:'0'}}));
    pickerRow.appendChild(createPicker(REPS,state.setReps,v=>{state.setReps=v;updatePrInd()},'REPS',null,day.color));
    root.appendChild(pickerRow);

    // ── Assisted movement ──
    if(ASSISTED_EXERCISES.has(ex.id)){
      const ASSIST_VALS=[0,5,10,15,20,25,30,35,40,45,50,60,70,80,90,100];
      const assistRow=h('div',{style:{padding:'2px 24px',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}});
      assistRow.appendChild(h('div',{style:{fontSize:'8px',fontWeight:'700',color:'var(--text3)',letterSpacing:'1px'}},'\u2212 ASSIST'));
      assistRow.appendChild(h('button',{style:{width:'26px',height:'26px',borderRadius:'6px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)',color:'var(--text3)',fontSize:'16px',fontWeight:'700',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:'1'},
        onClick:()=>{const i=ASSIST_VALS.indexOf(state.setAssistWeight);if(i>0){state.setAssistWeight=ASSIST_VALS[i-1];render()}}},'−'));
      assistRow.appendChild(h('div',{style:{minWidth:'50px',textAlign:'center',fontSize:'15px',fontWeight:'800',color:state.setAssistWeight>0?day.color:'var(--text3)'}},
        state.setAssistWeight>0?`${state.setAssistWeight}`:'\u2014'));
      assistRow.appendChild(h('button',{style:{width:'26px',height:'26px',borderRadius:'6px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)',color:'var(--text3)',fontSize:'16px',fontWeight:'700',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:'1'},
        onClick:()=>{const i=ASSIST_VALS.indexOf(state.setAssistWeight);if(i<ASSIST_VALS.length-1){state.setAssistWeight=ASSIST_VALS[i+1];render()}}},'+'));
      root.appendChild(assistRow);
    }

    // ── PR indicator ──
    if(isNewPr){
      root.appendChild(h('div',{id:'pr-indicator',style:{textAlign:'center',padding:'2px 0'}},
        h('span',{style:{fontSize:'11px',fontWeight:'900',color:'#ff3d3d',letterSpacing:'2px',animation:'prBurst 0.5s ease'}},'\u{1F525} NEW PR \u{1F525}')));
    }else{root.appendChild(h('div',{id:'pr-indicator',style:{minHeight:'2px'}}))}

    // ── Logged sets (compact) ──
    if(logged.length>0){
      const chips=h('div',{style:{padding:'0 20px 2px',display:'flex',justifyContent:'center',gap:'4px',flexWrap:'wrap'}});
      logged.forEach(s=>{const tc=TAG_COLORS[s.tag]||'';
        chips.appendChild(h('div',{style:{fontSize:'8px',color:tc||'var(--text3)',background:'rgba(255,255,255,0.03)',borderRadius:'4px',padding:'2px 5px'}},
          `${s.tag&&s.tag!=='normal'?TAG_LABELS[s.tag]+' ':''}${s.weight===0?'BW':s.weight}\u00D7${s.reps}`))});
      root.appendChild(chips);
    }

    // ── Bottom controls: tag + RPE + rest + log button ──
    const bottom=h('div',{style:{padding:'0 20px'}});

    // Tag selector (compact)
    const tagRow=h('div',{style:{display:'flex',justifyContent:'center',gap:'5px',marginBottom:'4px'}});
    SET_TAGS.forEach(tag=>{
      const active=state.setTag===tag;const col=TAG_COLORS[tag]||day.color;
      tagRow.appendChild(h('button',{style:{padding:'3px 9px',borderRadius:'5px',fontSize:'9px',fontWeight:active?'800':'600',letterSpacing:'0.5px',
        background:active?(tag==='normal'?'rgba(255,255,255,0.08)':`${col}15`):'transparent',
        border:`1px solid ${active?(tag==='normal'?'rgba(255,255,255,0.1)':`${col}30`):'rgba(255,255,255,0.04)'}`,
        color:active?(tag==='normal'?'var(--text)':col):'var(--text3)'},
        onClick:()=>{state.setTag=tag;render()}},tag.toUpperCase()));
    });
    bottom.appendChild(tagRow);

    // RPE gradient slider
    const rpeSection=h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'4px',padding:'0 4px'}});
    const rpeCol=getRpeColor(state.setRpe);
    const rpeLabel=h('div',{id:'rpe-val',style:{fontSize:'20px',fontWeight:'900',color:rpeCol,minWidth:'32px',textAlign:'center',lineHeight:'1'}},String(state.setRpe));
    rpeSection.appendChild(rpeLabel);
    const slider=h('input',{type:'range',min:'1',max:'10',value:String(state.setRpe),className:'rpe-slider'});
    slider.addEventListener('input',e=>{
      const v=parseInt(e.target.value);state.setRpe=v;
      const el=document.getElementById('rpe-val');
      if(el){el.textContent=String(v);el.style.color=getRpeColor(v)}
    });
    rpeSection.appendChild(slider);
    rpeSection.appendChild(h('div',{style:{fontSize:'7px',fontWeight:'700',letterSpacing:'1px',color:'var(--text3)',minWidth:'20px'}},'RPE'));
    bottom.appendChild(rpeSection);

    // Rest presets (when not active)
    if(!state.restActive){
      const restRow=h('div',{style:{display:'flex',justifyContent:'center',alignItems:'center',gap:'3px',marginBottom:'4px'}});
      restRow.appendChild(h('span',{style:{fontSize:'8px',color:'var(--text3)',marginRight:'2px'}},'\u23F1'));
      REST_PRESETS.forEach(sec=>{const active=state.restSeconds===sec;
        restRow.appendChild(h('button',{style:{padding:'2px 6px',borderRadius:'4px',fontSize:'8px',fontWeight:active?'800':'500',background:active?'rgba(255,255,255,0.06)':'transparent',color:active?'var(--text)':'var(--text3)',border:'none'},
          onClick:()=>{state.restSeconds=sec;save();render()}},fmtTime(sec)))});
      bottom.appendChild(restRow);
    }

    // Undo
    if(logged.length>0){
      bottom.appendChild(h('div',{style:{textAlign:'center',marginBottom:'2px'}},
        h('button',{style:{background:'none',border:'none',fontSize:'8px',fontWeight:'600',color:'var(--text3)',padding:'2px 8px'},
          onClick:()=>undoLastSet()},'\u21A9 undo last set')));
    }

    root.appendChild(bottom);

    // LOG button
    const btnText=isLastSet?(isLastEx?'LOG SET & FINISH':'LOG & NEXT \u203A'):`LOG SET ${state.currentSet}`;
    root.appendChild(h('div',{style:{padding:`6px 20px calc(20px + var(--safe-b))`}},
      h('button',{style:{width:'100%',padding:'14px',borderRadius:'14px',background:day.color,color:'#fff',fontSize:'15px',fontWeight:'900',letterSpacing:'2px',boxShadow:`0 4px 20px ${day.colorGlow}`},onClick:()=>logSet()},btnText)));
    return;
  }

  // ═══════════════ SUMMARY ═══════════════
  if(state.view==='summary'&&state.summaryData){
    const{session,prCount,prList,totalSets,totalVol}=state.summaryData;
    const center=h('div',{style:{textAlign:'center',paddingTop:'32px'}});
    center.appendChild(h('div',{style:{fontSize:'48px',marginBottom:'12px',animation:'prBurst 0.6s ease'}},prCount>0?'\u{1F525}':'\u{1F4AA}'));
    center.appendChild(h('div',{style:{fontSize:'22px',fontWeight:'900',color:'var(--text)',marginBottom:'6px'}},'WORKOUT COMPLETE'));
    center.appendChild(h('div',{style:{fontSize:'13px',color:'var(--text2)',marginBottom:'28px'}},`${session.dayName} \u2022 ${fmtDate(session.date)}`));

    const statsRow=h('div',{style:{display:'flex',justifyContent:'center',gap:'16px',marginBottom:'28px',flexWrap:'wrap'}});
    [{val:session.exercises.length,label:'EXERCISES',color:'var(--text)'},{val:totalSets,label:'SETS',color:'var(--text)'},{val:totalVol?totalVol.toLocaleString():'0',label:'VOLUME',color:'var(--text)'}].concat(prCount>0?[{val:prCount,label:'NEW PRs',color:'var(--gold)'}]:[]).forEach(s=>{
      statsRow.appendChild(h('div',{style:{textAlign:'center',minWidth:'60px'}},h('div',{style:{fontSize:'24px',fontWeight:'900',color:s.color}},String(s.val)),h('div',{style:{fontSize:'8px',fontWeight:'700',letterSpacing:'2px',color:'var(--text3)'}},s.label)))});
    center.appendChild(statsRow);

    if(prList.length>0){
      const prSec=h('div',{style:{marginBottom:'24px',textAlign:'left'}});
      prSec.appendChild(h('div',{style:{fontSize:'10px',fontWeight:'800',letterSpacing:'3px',color:'var(--text3)',marginBottom:'10px'}},'NEW PERSONAL RECORDS'));
      prList.forEach(p=>prSec.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'10px',padding:'10px 14px',marginBottom:'6px'}},
        h('span',{style:{fontSize:'13px',fontWeight:'600',color:'var(--text)'}},p.name),h('span',{style:{fontSize:'14px',fontWeight:'800',color:'var(--gold)'}},`${p.weight} x ${p.reps}`))));
      center.appendChild(prSec);
    }

    // Session detail
    const detail=h('div',{style:{textAlign:'left'}});
    detail.appendChild(h('div',{style:{fontSize:'10px',fontWeight:'800',letterSpacing:'3px',color:'var(--text3)',marginBottom:'10px'}},'SESSION DETAIL'));
    session.exercises.forEach(ex=>{
      const exSetsRpe=(ex.sets||[]).filter(s=>s.rpe);
      const exAvgRpe=exSetsRpe.length>0?exSetsRpe.reduce((s,set)=>s+set.rpe,0)/exSetsRpe.length:0;
      const card=h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'10px',padding:'12px 14px',marginBottom:'6px'}});
      card.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}},
        h('div',{style:{fontSize:'13px',fontWeight:'700',color:'var(--text)'}},ex.name),
        exAvgRpe>0?h('span',{style:{fontSize:'10px',fontWeight:'800',color:getRpeColor(Math.round(exAvgRpe))}},`RPE ${exAvgRpe.toFixed(1)}`):null));
      const chips=h('div',{style:{display:'flex',gap:'5px',flexWrap:'wrap'}});
      (ex.sets||[]).forEach(s=>{const tc=TAG_COLORS[s.tag]||'';const rc=s.rpe?getRpeColor(s.rpe):'';
        const assistTxt=s.assistWeight?` \u2212${s.assistWeight}`:'';
        chips.appendChild(h('span',{style:{fontSize:'9px',color:tc||'var(--text2)',background:'var(--bg2)',borderRadius:'6px',padding:'3px 6px',border:tc?`1px solid ${tc}30`:'none',display:'flex',alignItems:'center',gap:'3px'}},
          `${s.tag&&s.tag!=='normal'?TAG_LABELS[s.tag]+' ':''}${s.weight===0?'BW':s.weight}\u00D7${s.reps}${assistTxt}`,
          s.rpe?h('span',{style:{fontSize:'7px',fontWeight:'800',color:rc}},`R${s.rpe}`):null))});
      card.appendChild(chips);detail.appendChild(card)});
    center.appendChild(detail);

    // Auto-calculated RPE analysis
    const allSetsWithRpe=session.exercises.flatMap(ex=>(ex.sets||[]).filter(s=>s.rpe));
    const avgRpe=allSetsWithRpe.length>0?allSetsWithRpe.reduce((s,set)=>s+set.rpe,0)/allSetsWithRpe.length:0;
    const sessionRpe=Math.round(avgRpe*10)/10;

    if(allSetsWithRpe.length>0){
      const rpeSec=h('div',{style:{marginTop:'24px',textAlign:'center'}});
      const rpeCol=getRpeColor(Math.round(avgRpe));
      rpeSec.appendChild(h('div',{style:{fontSize:'10px',fontWeight:'800',letterSpacing:'3px',color:'var(--text3)',marginBottom:'10px'}},'SESSION INTENSITY'));
      rpeSec.appendChild(h('div',{style:{marginBottom:'16px'}},
        h('div',{style:{fontSize:'40px',fontWeight:'900',color:rpeCol,lineHeight:'1'}},sessionRpe.toFixed(1)),
        h('div',{style:{fontSize:'11px',fontWeight:'700',color:rpeCol,marginTop:'4px'}},'AVG RPE')));

      // Per-exercise RPE bars
      rpeSec.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'2px',color:'var(--text3)',marginBottom:'10px',textAlign:'left'}},'PER EXERCISE'));
      const exRpes=session.exercises.map(ex=>{
        const sets=(ex.sets||[]).filter(s=>s.rpe);
        const avg=sets.length>0?sets.reduce((s,set)=>s+set.rpe,0)/sets.length:0;
        const maxRpe=sets.length>0?Math.max(...sets.map(s=>s.rpe)):0;
        return{name:ex.name,id:ex.id,avg:Math.round(avg*10)/10,max:maxRpe,sets};
      }).filter(e=>e.avg>0);

      exRpes.sort((a,b)=>b.avg-a.avg);
      exRpes.forEach(ex=>{
        const col=getRpeColor(Math.round(ex.avg));const pct=ex.avg/10*100;
        rpeSec.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px',textAlign:'left'}},
          h('div',{style:{width:'80px',fontSize:'10px',fontWeight:'600',color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flexShrink:'0'}},ex.name),
          h('div',{style:{flex:'1',height:'16px',background:'var(--bg2)',borderRadius:'4px',position:'relative',overflow:'hidden'}},
            h('div',{style:{height:'100%',width:`${pct}%`,background:`${col}40`,borderRadius:'4px',transition:'width 0.5s'}})),
          h('div',{style:{fontSize:'11px',fontWeight:'800',color:col,minWidth:'28px',textAlign:'right'}},ex.avg.toFixed(1))));
      });

      // Weak areas analysis
      const weakAreas=[];
      exRpes.forEach(ex=>{
        // High RPE (hard) relative to session
        if(ex.avg>=avgRpe+1.5&&ex.avg>=7)weakAreas.push({name:ex.name,reason:'Felt significantly harder than average',rpe:ex.avg,type:'hard'});
        // High RPE with low relative weight (struggling)
        const pr=state.prRecords[ex.id];
        if(pr){
          const exData=session.exercises.find(e=>e.id===ex.id);
          if(exData){

      h('div',{style:{fontSize:'10px',fontWeight:'700',color:'var(--text2)',marginBottom:'6px'}},'SKILL LEVEL'),

      currentSkill?h('div',{style:{fontSize:'10px',color:'var(--text3)',lineHeight:'1.5',marginBottom:'6px'}},currentSkill.desc):null,

    dangerSec.appendChild(h('button',{style:{background:'rgba(255,61,61,0.08)',border:'1px solid rgba(255,61,61,0.25)',borderRadius:'10px',padding:'12px 20px',color:'#ff3d3d',fontSize:'12px',fontWeight:'700',width:'100%',letterSpacing:'1px'},onClick:()=>{
      if(confirm('Clear ALL data? This cannot be undone.')){
        state.prRecords={};state.history=[];state.sessionSets={};state.days=[...DEFAULT_DAYS];state.customExercises=[];state.exerciseNotes={};state.progressPics=[];state.deloadDismiss=null;state.lastWeights={};state.deloadActive=null;
        store.del('prs');store.del('history');store.del('days');store.del('customEx');store.del('exNotes');store.del('pics');store.del('deloadDismiss');store.del('lastWeights');store.del('deloadActive');store.del('launched');

  // ═══════════════ TEMPLATE PICKER (first launch) ═══════════════

        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px'}},

    root.appendChild(h('button',{style:{width:'100%',padding:'14px',borderRadius:'14px',border:'1px solid var(--border)',background:'transparent',color:'var(--text3)',fontSize:'12px',fontWeight:'700',letterSpacing:'1px',marginTop:'8px'},

  // ═══════════════ ACTIVITY LOGGING ═══════════════
  if(state.view==='activity'){

    // Category filter
    const allCats=['All',...RECREATIONAL_ACTIVITIES.map(c=>c.cat)];

    root.appendChild(catRow);

    // Activity list

      if(!showCat){root.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'2px',color:'var(--text3)',marginBottom:'8px',marginTop:'4px'}},group.icon+' '+group.cat.toUpperCase()));}
      const row=h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'12px'}});

      const scroller=h('div',{style:{height:'100%',overflowY:'scroll',scrollSnapType:'y mandatory',WebkitOverflowScrolling:'touch',paddingTop:'40px',paddingBottom:'40px',msOverflowStyle:'none',scrollbarWidth:'none'}});

  // ═══════════════ DELOAD PLAN ═══════════════

    levels.forEach((lvl,i)=>{
      const sk=SKILL_CONFIG[lvl.id];const isCurrent=state.profile.skillLevel===lvl.id;
      const card=h('div',{style:{background:isCurrent?`${lvl.color}08`:'var(--card)',border:`1px solid ${isCurrent?lvl.color+'40':'var(--border)'}`,borderRadius:'14px',padding:'14px 16px',marginBottom:'10px',animation:`fadeIn 0.3s ease ${i*80}ms forwards`,opacity:'0'}});
      card.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},
        h('div',{style:{fontSize:'13px',fontWeight:'800',color:lvl.color}},sk.label),
        isCurrent?h('div',{style:{fontSize:'8px',fontWeight:'800',letterSpacing:'1px',color:lvl.color,padding:'2px 8px',borderRadius:'4px',background:`${lvl.color}20`}},'CURRENT'):null));
      lvl.items.forEach(item=>{
        card.appendChild(h('div',{style:{display:'flex',gap:'6px',padding:'3px 0',fontSize:'10px',color:'var(--text2)',lineHeight:'1.5'}},
          h('span',{style:{color:lvl.color,flexShrink:'0'}},'\u2022'),item));
      });
      root.appendChild(card);
    });

    root.appendChild(h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'12px',padding:'12px 14px',marginTop:'8px'}},
      h('div',{style:{fontSize:'9px',fontWeight:'700',letterSpacing:'1px',color:'var(--text3)',marginBottom:'4px'}},'BODY WEIGHT'),
      h('div',{style:{fontSize:'10px',color:'var(--text2)',lineHeight:'1.5'}},'When set, your PRs show relative strength (e.g. "1.5x BW"). Bodyweight exercises like pull-ups show total load moved (added weight + bodyweight).')));
    return;
  }

  // ═══════════════ DELOAD GUIDE ═══════════════
  if(state.view==='deloadGuide'){
    root.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}},
      h('button',{style:{background:'none',color:'var(--text2)',fontSize:'14px',fontWeight:'600',padding:'8px 0'},onClick:()=>{state.view='home';render()}},'\u2190 Back'),
      h('div',{style:{fontSize:'12px',fontWeight:'800',letterSpacing:'3px',color:'var(--text2)'}},'DELOAD GUIDE'),
      h('div',{style:{width:'50px'}})));

    const sections=[
      {title:'What Is a Deload?',body:'A planned week of reduced training intensity and/or volume. You still train \u2014 just lighter. It\u2019s not a week off. It\u2019s a week that makes the next block better.'},
      {title:'Why It\'s Necessary',body:'Muscles recover in 48\u201372 hours. But tendons, ligaments, joints, and your central nervous system recover much slower. Without a deload, these slower-adapting systems fall behind. A deload lets them catch up before you pile on more stress.'},
      {title:'The Science',body:'Research on periodization consistently shows that lifters who deload every 4\u20138 weeks achieve equal or better strength and hypertrophy results while training less total volume. Chronic high volume without breaks increases injury risk and blunts hormonal recovery signals.'},
      {title:'Signs You Need One',body:'\u2022 Rising RPE on the same weights\n\u2022 Strength declining across 2+ sessions\n\u2022 Persistent joint aches or tendon soreness\n\u2022 Loss of motivation to train\n\u2022 Poor sleep even on rest days\n\u2022 Feeling flat or depleted during warm-ups'},
      {title:'How to Deload',body:'Option A: Same exercises and rep ranges, reduce weight to 50\u201360% of normal loads.\n\nOption B: Same weights, cut number of sets by 40\u201350%.\n\nEither way: stay 2\u20133 reps from failure. No grinding, no PR attempts, no drop sets or intensity techniques. Use the week to focus on form and mind-muscle connection.'},
      {title:'When to Deload',body:'Every 4\u20138 weeks depending on your training intensity. The harder and more frequently you train, the sooner you need one. Iron Log monitors your RPE trends, PR stagnation, and session frequency to recommend one automatically.'},
    ];
    sections.forEach((sec,i)=>{
      root.appendChild(h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'14px',padding:'16px',marginBottom:'12px',animation:`fadeIn 0.4s ease ${i*60}ms forwards`,opacity:'0'}},
        h('div',{style:{fontSize:'13px',fontWeight:'800',color:'var(--text)',marginBottom:'8px'}},sec.title),
        h('div',{style:{fontSize:'11px',color:'var(--text2)',lineHeight:'1.7',whiteSpace:'pre-line'}},sec.body)));
    });
    root.appendChild(h('button',{style:{width:'100%',padding:'14px',borderRadius:'14px',background:'rgba(255,133,0,0.1)',border:'1px solid rgba(255,133,0,0.3)',color:'#ff8500',fontSize:'13px',fontWeight:'800',letterSpacing:'1px',marginTop:'8px'},
      onClick:()=>{state.deloadDismiss=new Date().toISOString();store.set('deloadDismiss',state.deloadDismiss);state.view='home';render()}},'GOT IT \u2014 DISMISS FOR 7 DAYS'));
    return;
  }
}

// ── Actions ──
function openDay(day){state.selectedDay=day;state.sessionSets={};state.sessionSwaps={};state.exIndex=0;state.warmupDismissed=false;stopRest();state.view='day';render()}
const WARMUP_STRETCHES={
  chest:['Doorway pec stretch (30s each side)','Arm circles \u2014 10 forward, 10 backward','Band pull-aparts \u00D7 15'],
  shoulders:['Shoulder dislocates with band \u00D7 10','Cross-body arm stretch (20s each)','Wall slides \u00D7 10'],
  triceps:['Overhead tricep stretch (20s each arm)','Arm circles \u2014 10 forward, 10 backward'],
  back:['Cat-cow stretch \u00D7 10','Lat hang from pull-up bar (20s)','Thoracic rotations \u00D7 8 each side'],
  lats:['Lat hang from pull-up bar (20s)','Side-bending lat stretch (20s each)','Child\u2019s pose with arms extended (30s)'],
  biceps:['Doorway bicep stretch (20s each arm)','Wrist circles \u00D7 10 each direction'],
  quads:['Standing quad stretch (20s each leg)','Walking lunges \u00D7 8 each leg','Leg swings \u2014 10 forward/back each leg'],
  glutes:['Pigeon stretch (30s each side)','Glute bridges \u00D7 15','90/90 hip stretch (20s each side)'],
  hamstrings:['Standing toe touch (20s)','Walking RDLs (bodyweight) \u00D7 8','Leg swings \u2014 10 forward/back each leg'],
  calves:['Wall calf stretch (20s each leg)','Ankle circles \u00D7 10 each direction'],
  core:['Cat-cow stretch \u00D7 10','Dead bugs (bodyweight) \u00D7 8 each side','Plank hold 20s'],
  hips:['Hip circles \u00D7 10 each direction','Deep bodyweight squat hold (30s)','90/90 hip stretch (20s each side)'],
};
const MUSCLE_KEYWORDS={
  chest:['chest','pec'],shoulders:['delt','shoulder'],triceps:['tricep'],
  back:['back','rhomb','trap','posterior'],lats:['lat'],biceps:['bicep'],
  quads:['quad'],glutes:['glute'],hamstrings:['hamstring','ham'],
  calves:['calf','calve','soleus','gastroc'],core:['core','ab','oblique'],
  hips:['hip','adduct'],
};
function getDayMuscleGroups(day){
  const groups=new Set();
  day.exercises.forEach(ex=>{
    const info=getExInfo(ex.id);if(!info||!info.muscles)return;
    const m=info.muscles.toLowerCase();
    Object.entries(MUSCLE_KEYWORDS).forEach(([group,keywords])=>{
      if(keywords.some(kw=>m.includes(kw)))groups.add(group);
    });
  });
  return[...groups];
}
function getWarmupStretches(day){
  const groups=getDayMuscleGroups(day);
  const seen=new Set();const stretches=[];
  // Prioritize primary muscle groups, pick 3-4 unique stretches
  groups.forEach(g=>{
    const s=WARMUP_STRETCHES[g];if(!s)return;
    s.forEach(str=>{if(!seen.has(str)){seen.add(str);stretches.push({group:g,stretch:str})}});
  });
  return stretches.slice(0,5);
}
function openExercise(idx){
  const ex=state.selectedDay.exercises[idx];const existing=state.sessionSets[ex.id]||[];
  // Warmup reminder — first exercise opened in session, no sets logged yet
  const totalLogged=Object.values(state.sessionSets).flat().length;
  if(totalLogged===0&&!state.warmupDismissed){
    state.warmupDismissed=true;
    state.warmupMsg=WARMUP_REMINDERS[Math.floor(Math.random()*WARMUP_REMINDERS.length)];
    state.showWarmupReminder=true;
    state.pendingExIdx=idx;
    render();return;
  }
  state.exIndex=idx;state.currentSet=existing.filter(s=>s.tag!=='warmup').length+1;state.setTag='normal';
  state.showDemo=false;state.showExInfo=false;state.showSwapMenu=false;
  const pr=state.prRecords[ex.id];const last=existing.length>0?existing[existing.length-1]:null;
  const lastW=state.lastWeights[ex.id];
  // Base weight: current session last set > last workout weight > PR > 0
  let baseWeight=last?last.weight:(lastW?lastW.weight:(pr?pr.weight:0));
  let baseReps=last?last.reps:(lastW?lastW.reps:(pr?pr.reps:8));
  // Apply deload modifier
  if(isDeloadActive()&&!last){
    const strat=getDeloadStrategy(state.deloadActive.strategy);
    if(baseWeight>0)baseWeight=strat.apply(baseWeight);
  }
  state.setWeight=baseWeight;state.setReps=baseReps;
  state.setAssistWeight=last?(last.assistWeight||0):0;
  state.view='exercise';render();
}
function logSet(){
  const day=state.selectedDay;const ex=day.exercises[state.exIndex];
  if(!state.sessionSets[ex.id])state.sessionSets[ex.id]=[];
  const isWarmup=state.setTag==='warmup';
  const setData={weight:state.setWeight,reps:state.setReps,set:isWarmup?'W':state.currentSet,tag:state.setTag,rpe:state.setRpe};
  if(ASSISTED_EXERCISES.has(ex.id)&&state.setAssistWeight>0)setData.assistWeight=state.setAssistWeight;
  const swap=state.sessionSwaps[ex.id];
  if(swap)setData.swappedTo=swap.subId;
  state.sessionSets[ex.id].push(setData);
  state.setTag='normal';


  // Start rest timer (skip for warmup — shorter rest assumed)
  if(state.restSeconds>0&&!isWarmup)startRest();

  // Warmup sets don't advance the set counter
  if(isWarmup){render();return}

  if(state.currentSet<skillSets(ex.sets)){state.currentSet++;render()}
  else if(state.exIndex<day.exercises.length-1){
    const next=day.exercises[state.exIndex+1];const nextPr=state.prRecords[next.id];
    const lastW=state.lastWeights[next.id];
    state.exIndex++;state.currentSet=1;state.showDemo=false;state.showExInfo=false;state.showSwapMenu=false;
    let w=lastW?lastW.weight:(nextPr?nextPr.weight:state.setWeight);
    let r=lastW?lastW.reps:(nextPr?nextPr.reps:8);
    if(isDeloadActive()&&w>0){const strat=getDeloadStrategy(state.deloadActive.strategy);w=strat.apply(w)}
    state.setWeight=w;state.setReps=r;state.setAssistWeight=0;render();
  }else{stopRest();finishWorkout()}
}
function skipExercise(){
  const day=state.selectedDay;
  if(state.exIndex<day.exercises.length-1){
    const next=day.exercises[state.exIndex+1];const nextPr=state.prRecords[next.id];
    const lastW=state.lastWeights[next.id];
    const existing=state.sessionSets[next.id]||[];
    state.exIndex++;state.currentSet=existing.length+1;state.showSwapMenu=false;
    let w=lastW?lastW.weight:(nextPr?nextPr.weight:0);
    let r=lastW?lastW.reps:(nextPr?nextPr.reps:8);
    if(isDeloadActive()&&w>0){const strat=getDeloadStrategy(state.deloadActive.strategy);w=strat.apply(w)}
    state.setWeight=w;state.setReps=r;state.setAssistWeight=0;render();
  }else{stopRest();finishWorkout()}
}
function finishWorkout(){
  const day=state.selectedDay;const entries=[];const newPrs={...state.prRecords};let prCount=0;let prList=[];let totalVol=0;
  day.exercises.forEach(ex=>{
    const sets=state.sessionSets[ex.id];
    if(sets&&sets.length>0){
      const workSets=sets.filter(s=>s.tag!=='warmup');
      let best=workSets[0]||sets[0];workSets.forEach(s=>{if(s.weight*s.reps>best.weight*best.reps)best=s});
      entries.push({id:ex.id,name:ex.name,sets,bestWeight:best.weight,bestReps:best.reps});
      totalVol+=calcVolume(workSets);
      if(workSets.length>0){const old=newPrs[ex.id];if(!old||best.weight*best.reps>old.weight*old.reps){
        newPrs[ex.id]={weight:best.weight,reps:best.reps,date:new Date().toISOString()};
        prCount++;prList.push({name:ex.name,weight:best.weight,reps:best.reps})}}
    }});
  if(entries.length===0){showToast('No sets logged');state.view='home';render();return}
  // Save last used weights per exercise
  day.exercises.forEach(ex=>{
    const sets=state.sessionSets[ex.id];if(!sets)return;
    const workSets=sets.filter(s=>s.tag!=='warmup');
    if(workSets.length>0){
      const heaviest=workSets.reduce((a,s)=>s.weight>a.weight?s:a,workSets[0]);
      state.lastWeights[ex.id]={weight:heaviest.weight,reps:heaviest.reps,date:new Date().toISOString()};
    }
  });
  const session={date:new Date().toISOString(),dayId:day.id,dayName:day.name,dayColor:day.color,dayIcon:day.icon,exercises:entries};
  state.history=[session,...state.history];state.prRecords=newPrs;
  state.summaryData={session,prCount,prList,totalSets:entries.reduce((s,e)=>s+e.sets.length,0),totalVol};
  save();state.view='summary';render();
}
function adjustTarget(exIdx,field,delta){
  const day=state.selectedDay;const ex=day.exercises[exIdx];
  const dayData=state.days.find(d=>d.id===day.id);if(!dayData)return;
  const exData=dayData.exercises.find(e=>e.id===ex.id);if(!exData)return;
  if(field==='sets'){const n=Math.max(1,Math.min(10,exData.sets+delta));exData.sets=n;ex.sets=n}
  else if(field==='reps'){
    const range=exData.repRange;const rm=range.match(/^(\d+)\s*-\s*(\d+)(.*)/);const sm=range.match(/^(\d+)(.*)/);
    if(rm){let lo=parseInt(rm[1])+delta;let hi=parseInt(rm[2])+delta;const suf=rm[3]||'';lo=Math.max(1,lo);hi=Math.max(lo,hi);const nr=`${lo}-${hi}${suf}`;exData.repRange=nr;ex.repRange=nr}
    else if(sm){let v=parseInt(sm[1])+delta;const suf=sm[2]||'';v=Math.max(1,v);const nr=`${v}${suf}`;exData.repRange=nr;ex.repRange=nr}
  }save();showToast(`${field==='sets'?'Sets':'Reps'} ${delta>0?'\u2191':'\u2193'} ${field==='sets'?exData.sets:exData.repRange}`);render();
}
function updatePrInd(){
  const el=document.getElementById('pr-indicator');if(!el||!state.selectedDay)return;
  const ex=state.selectedDay.exercises[state.exIndex];const pr=state.prRecords[ex.id];
  const isNewPr=state.setWeight*state.setReps>(pr?pr.weight*pr.reps:0)&&state.setWeight*state.setReps>0;
  el.innerHTML=isNewPr?'<span style="font-size:11px;font-weight:900;color:#ff3d3d;letter-spacing:2px;animation:prBurst 0.5s ease">\u{1F525} NEW PR \u{1F525}</span>':'';
}

// ── Init ──
state.prRecords=store.get('prs')||{};
state.history=store.get('history')||[];
state.days=store.get('days')||[...DEFAULT_DAYS];
state.restSeconds=store.get('rest')||90;
state.customExercises=store.get('customEx')||[];
state.exerciseNotes=store.get('exNotes')||{};
state.progressPics=store.get('pics')||[];
state.deloadDismiss=store.get('deloadDismiss')||null;
state.lastWeights=store.get('lastWeights')||{};
state.deloadActive=store.get('deloadActive')||null;
// Auto-expire deload if past end date
if(state.deloadActive&&new Date(state.deloadActive.endDate).getTime()<Date.now()){state.deloadActive=null;store.set('deloadActive',null)}
const savedProfile=store.get('profile')||{};
state.profile={weight:savedProfile.weight||'',weightUnit:savedProfile.weightUnit||'lbs',skillLevel:savedProfile.skillLevel||''};
state.wakeLockEnabled=false;
// Re-acquire native wake lock if it was on (iOS video fallback requires user gesture so skip on init)
if(store.get('wakeLock')&&'wakeLock' in navigator){navigator.wakeLock.request('screen').then(s=>{state.wakeLockSentinel=s;state.wakeLockEnabled=true;s.addEventListener('release',()=>{state.wakeLockEnabled=false;state.wakeLockSentinel=null})}).catch(()=>{})}
// First launch: show template picker
if(!store.get('launched'))state.view='templatePicker';
render();
</script>
