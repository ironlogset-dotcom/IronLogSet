<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080f">
<title>Iron Log — Phase 1-3 Standalone</title>
<style>
:root{--bg:#08080f;--bg2:#0e0e1a;--card:#111120;--border:#1a1a30;--text:#e0e0ee;--text2:#8888aa;--text3:#555570;--accent:#ff3d3d;--gold:#ffb800;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes slideDown{from{opacity:0;transform:translate(-50%,-16px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes prBurst{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes timerPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,61,61,.4)}70%{box-shadow:0 0 0 12px rgba(255,61,61,0)}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI','SF Pro Display',-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
button{font-family:inherit;-webkit-tap-highlight-color:transparent;border:none;cursor:pointer}
.picker-scroll{scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch}.picker-scroll>div{scroll-snap-align:center}
#app{height:100%;position:relative}
.bg-noise{position:fixed;inset:0;opacity:.025;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
.bg-grad{position:fixed;inset:0;background:radial-gradient(ellipse at 50% -10%,rgba(255,61,61,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
.page{position:relative;z-index:1;height:100vh;height:100dvh;overflow-y:auto;overflow-x:hidden;padding:calc(16px + var(--safe-t)) 16px calc(60px + var(--safe-b));-webkit-overflow-scrolling:touch}
.toast{position:fixed;top:calc(20px + var(--safe-t));left:50%;transform:translateX(-50%);background:rgba(12,12,22,.95);border:1px solid var(--border);border-radius:12px;padding:12px 24px;z-index:9999;backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideDown .3s ease}
.toast span{font-size:14px;font-weight:700;color:var(--text)}
.rpe-slider{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:4px;outline:none;background:linear-gradient(to right,#3dd68c 0%,#5ae0a0 15%,#7de8b0 25%,#ffb800 45%,#ffa200 55%,#ff8500 65%,#ff5533 78%,#ff3d3d 90%,#ff1a1a 100%);touch-action:none}
.rpe-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:28px;height:28px;border-radius:50%;background:#fff;border:none;box-shadow:0 1px 4px rgba(0,0,0,.3),0 0 0 2px rgba(255,255,255,.15);cursor:pointer;margin-top:-10px}
.rpe-slider::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:#fff;border:none;box-shadow:0 1px 4px rgba(0,0,0,.3),0 0 0 2px rgba(255,255,255,.15);cursor:pointer}
.rpe-slider::-webkit-slider-runnable-track{height:8px;border-radius:4px}
.ex-toolbar{display:flex;justify-content:center;gap:10px;padding:0 20px;opacity:0.5;transition:opacity .2s}
.ex-toolbar:hover,.ex-toolbar:active{opacity:0.8}
.ex-toolbar button{background:none;border:none;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.5px;padding:4px 8px}
</style>
</head>
<body>
<div id="app"><div class="bg-noise"></div><div class="bg-grad"></div><div id="root" class="page"></div></div>
<div id="toast-container"></div>
<script>
// =====================================================
// IRON LOG — PHASE 1-3 STANDALONE MOCKUP
// Phase 1: 1RM Estimator, Data Export, PR Page,
//          "Last Time" Display, Workout Duration Timer,
//          Enhanced Workout Summary
// Phase 2: Plate Calculator, Warm-up Set Calculator,
//          Calendar View, Volume by Muscle Group,
//          Rest Timer Notifications
// Phase 3: Workout Notes, Superset Grouping, Custom Exercises,
//          Streak Counter, Body Measurements, Weight Selector Rework
// =====================================================

const SK='ironlog';
const store={
  get(k){try{const v=localStorage.getItem(`${SK}-${k}`);return v?JSON.parse(v):null}catch{return null}},
  set(k,v){try{localStorage.setItem(`${SK}-${k}`,JSON.stringify(v))}catch(e){console.error(e)}},
  del(k){localStorage.removeItem(`${SK}-${k}`)}
};

// ── Constants ──
const WEEKDAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const SET_TAGS=['normal','warmup','drop','failure'];
const TAG_LABELS={normal:'',warmup:'W',drop:'D',failure:'F'};
const TAG_COLORS={normal:'',warmup:'#4d8df7',drop:'#c45fff',failure:'#ff3d3d'};
const WEIGHTS=[];for(let w=0;w<=1500;w+=2.5)WEIGHTS.push(w);
const REPS=[];for(let r=1;r<=50;r++)REPS.push(r);
const REST_PRESETS=[30,60,90,120,180,300];

const BW_EXERCISES=new Set(['pullups','weighted_pu','chinups','tri_dip','chest_dip','pushups','nordic_curl']);
const ASSISTED_EXERCISES=new Set(['pullups','weighted_pu','chinups','tri_dip','chest_dip','nordic_curl']);

const SKILL_CONFIG={
  novice:{label:'NOVICE',setsAdjust:-1,minSets:2,repBump:2,deloadWeeks:6},
  intermediate:{label:'INTERMEDIATE',setsAdjust:0,minSets:2,repBump:0,deloadWeeks:5},
  advanced:{label:'ADVANCED',setsAdjust:1,minSets:3,repBump:-1,deloadWeeks:4}
};

const DEFAULT_DAYS=[
  {id:'back_biceps',name:'BACK + BICEPS',icon:'\u{1F525}',color:'#4d8df7',colorGlow:'rgba(77,141,247,0.12)',weekday:'Monday',
    exercises:[
      {id:'pullups',name:'Pull-Ups',sub:'Weighted if 8+ BW',sets:4,repRange:'6-8'},
      {id:'lat_pulldown',name:'Lat Pulldown',sub:'Controlled tempo',sets:3,repRange:'10-12'},
      {id:'cs_row',name:'Chest-Supported Row',sub:'Mid-back builder',sets:4,repRange:'8-10'},
      {id:'bb_row',name:'Barbell Row',sub:'Progressive overload',sets:4,repRange:'6-8'},
      {id:'bb_curl',name:'Barbell Curl',sub:'Load progressively',sets:3,repRange:'8-10'},
      {id:'zottman_curl',name:'Zottman Curls',sub:'Eccentric overload',sets:3,repRange:'10-12'},
    ]},
  {id:'chest_triceps',name:'CHEST + TRICEPS',icon:'\u{1F4A5}',color:'#ff3d3d',colorGlow:'rgba(255,61,61,0.12)',weekday:'Tuesday',
    exercises:[
      {id:'db_bench',name:'DB Bench Press',sub:'Primary press',sets:4,repRange:'5-8'},
      {id:'incline_db',name:'Incline DB Press',sub:'Upper chest',sets:3,repRange:'8-10'},
      {id:'cable_fly',name:'Cable Fly',sub:'Chest finisher',sets:2,repRange:'15-20'},
      {id:'skull_crush',name:'Skull Crushers',sub:'Tricep strength',sets:3,repRange:'8-12'},
      {id:'tri_pushdown',name:'Tricep Pushdowns',sub:'Volume work',sets:3,repRange:'12-15'},
      {id:'db_ohp',name:'DB Shoulder Press',sub:'After chest work',sets:3,repRange:'8-10'},
      {id:'lat_raise',name:'Lateral Raises',sub:'Shoulder width',sets:3,repRange:'12-15'},
    ]},
  {id:'legs',name:'LEGS',icon:'\u26A1',color:'#3dd68c',colorGlow:'rgba(61,214,140,0.12)',weekday:'Thursday',
    exercises:[
      {id:'squat',name:'Barbell Squat',sub:'RPE-based loading',sets:4,repRange:'5-8'},
      {id:'leg_press',name:'Leg Press',sets:3,repRange:'10-12'},
      {id:'rdl',name:'Romanian Deadlift',sub:'Mandatory hinge',sets:3,repRange:'8-10'},
      {id:'bss',name:'Bulgarian Split Squat',sub:'Per side',sets:2,repRange:'8-10'},
      {id:'ham_curl',name:'Hamstring Curl',sets:3,repRange:'10-12'},
      {id:'leg_ext',name:'Leg Extension',sets:3,repRange:'12-15'},
      {id:'calf_raise',name:'Calf Raises',sub:'Full ROM, 2s stretch',sets:3,repRange:'15-20'},
    ]},
];

const EXERCISE_LIBRARY=[
  {id:'db_bench',name:'DB Bench Press',cat:'Chest'},{id:'bb_bench',name:'Barbell Bench Press',cat:'Chest'},
  {id:'incline_db',name:'Incline DB Press',cat:'Chest'},{id:'cable_fly',name:'Cable Fly',cat:'Chest'},
  {id:'pullups',name:'Pull-Ups',cat:'Back'},{id:'weighted_pu',name:'Weighted Pull-Ups',cat:'Back'},
  {id:'lat_pulldown',name:'Lat Pulldown',cat:'Back'},{id:'cs_row',name:'Chest-Supported Row',cat:'Back'},
  {id:'bb_row',name:'Barbell Row',cat:'Back'},{id:'db_row',name:'Dumbbell Row',cat:'Back'},
  {id:'db_ohp',name:'DB Shoulder Press',cat:'Shoulders'},{id:'lat_raise',name:'Lateral Raises',cat:'Shoulders'},
  {id:'bb_curl',name:'Barbell Curl',cat:'Biceps'},{id:'zottman_curl',name:'Zottman Curls',cat:'Biceps'},
  {id:'skull_crush',name:'Skull Crushers',cat:'Triceps'},{id:'tri_pushdown',name:'Tricep Pushdowns',cat:'Triceps'},
  {id:'squat',name:'Barbell Squat',cat:'Legs'},{id:'leg_press',name:'Leg Press',cat:'Legs'},
  {id:'rdl',name:'Romanian Deadlift',cat:'Legs'},{id:'bss',name:'Bulgarian Split Squat',cat:'Legs'},
  {id:'ham_curl',name:'Hamstring Curl',cat:'Legs'},{id:'leg_ext',name:'Leg Extension',cat:'Legs'},
  {id:'calf_raise',name:'Calf Raises',cat:'Legs'},{id:'chinups',name:'Chin-Ups',cat:'Back'},
];

// ── State ──
let state={
  view:'home',days:null,selectedDay:null,exIndex:0,currentSet:1,
  setWeight:0,setReps:8,setTag:'normal',setRpe:7,
  sessionSets:{},prRecords:{},history:[],
  toastMsg:null,toastTimer:null,
  restSeconds:90,restRemaining:0,restActive:false,restInterval:null,restEndTime:null,
  setAssistWeight:0,
  profile:{weight:'185',weightUnit:'lbs',skillLevel:'intermediate'},
  lastWeights:{},
  // Phase 1 state
  workoutStartTime:null, // timestamp when first set was logged
  workoutElapsedTimer:null, // interval ID for elapsed display
  // Phase 2 state
  calendarMonth:null, // {year, month} for calendar view
  showPlateCalc:false, // plate calculator overlay on exercise screen
  showWarmupCalc:false, // warmup set calculator overlay
  plateCalcWeight:0, // weight for plate calc
  barWeight:45, // bar weight setting (lbs) or 20 (kg)
  volumePeriod:0, // 0=1wk, 1=2wk, 2=4wk
  expandedSession:null, // expanded session in history/calendar
  // Phase 3 state
  workoutNote:'', // note for current workout session
  measurements:[], // body measurement history [{date,weight,bodyFat,chest,waist,arms,hips}]
  customExercises:[], // user-created exercises [{id,name,cat}]
  supersets:{}, // superset pairings {exId: partnerExId}
  showAddExercise:false, // show custom exercise form
};

// ── Helpers ──
const h=(tag,attrs,...ch)=>{const el=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='className')el.className=v;else if(k==='innerHTML')el.innerHTML=v;else el.setAttribute(k,v)});ch.flat(Infinity).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c)});return el};

function findExName(id){for(const d of state.days)for(const e of d.exercises)if(e.id===id)return e.name;const lib=EXERCISE_LIBRARY.find(e=>e.id===id);return lib?lib.name:id}
function findExDay(id){for(const d of state.days)for(const e of d.exercises)if(e.id===id)return d;return null}
function findExCat(id){const lib=EXERCISE_LIBRARY.find(e=>e.id===id);return lib?lib.cat:''}
function timeSince(ds){const d=Math.floor((Date.now()-new Date(ds).getTime())/864e5);return d===0?'Today':d===1?'Yesterday':`${d}d ago`}
function fmtDate(ds){return new Date(ds).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function getSkill(){return SKILL_CONFIG[state.profile.skillLevel]||SKILL_CONFIG.intermediate}
function skillSets(base){const sk=getSkill();return Math.max(sk.minSets,base+sk.setsAdjust)}
function skillRepRange(range){const sk=getSkill();if(!sk.repBump)return range;const rm=range.match(/^(\d+)\s*-\s*(\d+)(.*)/);if(rm){let lo=Math.max(1,parseInt(rm[1])-sk.repBump),hi=Math.max(lo,parseInt(rm[2])-sk.repBump);return`${lo}-${hi}${rm[3]||''}`}return range}
function relStrength(weight){const bw=parseFloat(state.profile.weight);if(!bw||!weight)return'';return(weight/bw).toFixed(1)+'x BW'}
function getTodayWD(){return WEEKDAYS[((new Date().getDay()+6)%7)]}
function getRpeColor(rpe){const c={1:'#3dd68c',2:'#3dd68c',3:'#5ae0a0',4:'#7de8b0',5:'#ffb800',6:'#ffa200',7:'#ff8500',8:'#ff5533',9:'#ff3d3d',10:'#ff1a1a'};return c[rpe]||'#888'}
function fmtTime(s){const m=Math.floor(s/60);const sec=s%60;return m>0?`${m}:${String(sec).padStart(2,'0')}`:`${sec}s`}
function calcVolume(sets){return sets.reduce((sum,s)=>sum+(s.tag==='warmup'?0:s.weight*s.reps),0)}

// ═══════════════════════════════════════
// PHASE 1 FEATURE: 1RM ESTIMATOR
// Epley formula: weight * (1 + reps/30)
// ═══════════════════════════════════════
function estimate1RM(weight, reps){
  if(!weight || weight <= 0 || !reps || reps <= 0) return 0;
  if(reps === 1) return weight;
  return Math.round(weight * (1 + reps / 30));
}
// Get percentages for common training zones
function get1RMPercentages(e1rm){
  if(!e1rm) return [];
  return [
    {pct:100, reps:'1', weight:e1rm},
    {pct:95, reps:'2', weight:Math.round(e1rm*0.95)},
    {pct:90, reps:'3-4', weight:Math.round(e1rm*0.90)},
    {pct:85, reps:'5-6', weight:Math.round(e1rm*0.85)},
    {pct:80, reps:'7-8', weight:Math.round(e1rm*0.80)},
    {pct:75, reps:'9-10', weight:Math.round(e1rm*0.75)},
    {pct:70, reps:'11-12', weight:Math.round(e1rm*0.70)},
    {pct:65, reps:'13-15', weight:Math.round(e1rm*0.65)},
  ];
}

// ═══════════════════════════════════════
// PHASE 2 FEATURE: PLATE CALCULATOR
// ═══════════════════════════════════════
const PLATES_LBS=[45,35,25,10,5,2.5];
const PLATES_KG=[25,20,15,10,5,2.5,1.25];
function calcPlates(targetWeight,barWeight){
  const unit=state.profile.weightUnit||'lbs';
  const plates=unit==='kg'?PLATES_KG:PLATES_LBS;
  let perSide=(targetWeight-barWeight)/2;
  if(perSide<=0)return{plates:[],perSide:0,valid:perSide===0};
  const result=[];
  plates.forEach(p=>{
    while(perSide>=p-0.01){result.push(p);perSide-=p}
  });
  return{plates:result,perSide:(targetWeight-barWeight)/2,valid:Math.abs(perSide)<0.01};
}
function renderPlateCalc(container,targetWeight,color){
  const unit=state.profile.weightUnit||'lbs';
  const barW=state.barWeight||(unit==='kg'?20:45);
  if(targetWeight<=barW){
    container.appendChild(h('div',{style:{textAlign:'center',padding:'12px',color:'var(--text3)',fontSize:'11px'}},targetWeight<=0?'Set a weight first':`Just the bar (${barW} ${unit})`));
    return;
  }
  const{plates,perSide,valid}=calcPlates(targetWeight,barW);
  if(!valid){
    container.appendChild(h('div',{style:{textAlign:'center',padding:'8px',color:'#ff8500',fontSize:'10px'}},`Can't make exactly ${targetWeight} with standard plates`));
  }
  // Visual barbell
  const barSvg=h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'0',padding:'12px 0',overflow:'hidden'}});
  // Left plates (reversed for visual)
  const leftPlates=[...plates].reverse();
  leftPlates.forEach(p=>{
    const ht=Math.max(16,Math.min(48,p*1.2));
    const wd=p>=25?12:p>=10?10:8;
    barSvg.appendChild(h('div',{style:{width:`${wd}px`,height:`${ht}px`,background:p>=45?'#4d8df7':p>=25?'#3dd68c':p>=10?'#ffb800':'#c45fff',borderRadius:'2px',border:'1px solid rgba(255,255,255,0.1)',display:'flex',alignItems:'center',justifyContent:'center'}},
      h('span',{style:{fontSize:'6px',fontWeight:'800',color:'#fff',writingMode:'vertical-lr',transform:'rotate(180deg)'}},String(p))));
  });
  // Bar
  barSvg.appendChild(h('div',{style:{width:'60px',height:'6px',background:'#888',borderRadius:'1px'}}));
  // Right plates
  plates.forEach(p=>{
    const ht=Math.max(16,Math.min(48,p*1.2));
    const wd=p>=25?12:p>=10?10:8;
    barSvg.appendChild(h('div',{style:{width:`${wd}px`,height:`${ht}px`,background:p>=45?'#4d8df7':p>=25?'#3dd68c':p>=10?'#ffb800':'#c45fff',borderRadius:'2px',border:'1px solid rgba(255,255,255,0.1)',display:'flex',alignItems:'center',justifyContent:'center'}},
      h('span',{style:{fontSize:'6px',fontWeight:'800',color:'#fff',writingMode:'vertical-lr',transform:'rotate(180deg)'}},String(p))));
  });
  container.appendChild(barSvg);
  // Text summary
  const summary=h('div',{style:{textAlign:'center',fontSize:'11px',color:'var(--text2)'}});
  summary.appendChild(h('div',{style:{fontWeight:'700',color:'var(--text)',marginBottom:'4px'}},`${targetWeight} ${unit} total`));
  summary.appendChild(h('div',{},'Bar: ',h('span',{style:{fontWeight:'700'}},`${barW}`),` + each side: `,h('span',{style:{fontWeight:'700',color}},plates.join(' + ')||'none')));
  container.appendChild(summary);
}

// ═══════════════════════════════════════
// PHASE 2 FEATURE: WARM-UP SET CALCULATOR
// ═══════════════════════════════════════
function calcWarmupSets(workingWeight){
  const unit=state.profile.weightUnit||'lbs';
  const barW=state.barWeight||(unit==='kg'?20:45);
  if(!workingWeight||workingWeight<=barW)return[];
  const sets=[];
  // Ramp: bar x5, 40% x5, 60% x3, 80% x2
  const pcts=[{pct:0,reps:5,label:'Bar only'},{pct:0.4,reps:5,label:'40%'},{pct:0.6,reps:3,label:'60%'},{pct:0.8,reps:2,label:'80%'}];
  pcts.forEach(({pct,reps,label})=>{
    const w=pct===0?barW:Math.round(workingWeight*pct/5)*5;
    if(w<barW)return;
    if(sets.length>0&&w<=sets[sets.length-1].weight)return; // skip if same or lower
    sets.push({weight:w,reps,label,pct:pct===0?null:Math.round(pct*100)});
  });
  return sets;
}

// ═══════════════════════════════════════
// PHASE 2 FEATURE: MUSCLE GROUP VOLUME
// ═══════════════════════════════════════
const EX_MUSCLES={
  // map exercise IDs to primary muscle groups
  pullups:'Back',weighted_pu:'Back',lat_pulldown:'Back',cs_row:'Back',bb_row:'Back',db_row:'Back',chinups:'Back',
  db_bench:'Chest',bb_bench:'Chest',incline_db:'Chest',incline_bb:'Chest',cable_fly:'Chest',chest_dip:'Chest',pushups:'Chest',
  db_ohp:'Shoulders',bb_ohp:'Shoulders',lat_raise:'Shoulders',
  bb_curl:'Biceps',zottman_curl:'Biceps',hammer_curl:'Biceps',db_curl:'Biceps',preacher_curl:'Biceps',
  skull_crush:'Triceps',tri_pushdown:'Triceps',tri_overhead:'Triceps',close_grip_bench:'Triceps',tri_dip:'Triceps',
  squat:'Quads',front_squat:'Quads',leg_press:'Quads',hack_squat:'Quads',goblet_squat:'Quads',leg_ext:'Quads',bss:'Quads',
  rdl:'Hamstrings',ham_curl:'Hamstrings',deadlift:'Hamstrings',nordic_curl:'Hamstrings',
  calf_raise:'Calves',
  hip_thrust:'Glutes',
};
function getWeeklyVolume(weeksBack){
  // Get sessions from the last N weeks
  const cutoff=Date.now()-weeksBack*7*864e5;
  const sessions=state.history.filter(s=>new Date(s.date).getTime()>cutoff&&s.exercises);
  const vol={};
  sessions.forEach(sess=>{
    (sess.exercises||[]).forEach(ex=>{
      const muscle=EX_MUSCLES[ex.id]||'Other';
      const sets=(ex.sets||[]).filter(s=>s.tag!=='warmup');
      if(!vol[muscle])vol[muscle]={sets:0,volume:0,exercises:new Set()};
      vol[muscle].sets+=sets.length;
      vol[muscle].volume+=calcVolume(sets);
      vol[muscle].exercises.add(ex.name);
    });
  });
  return vol;
}

// ═══════════════════════════════════════
// PHASE 2 FEATURE: REST TIMER NOTIFICATION
// ═══════════════════════════════════════
function requestNotifPermission(){
  if('Notification' in window&&Notification.permission==='default'){
    Notification.requestPermission();
  }
}
function notifyRestDone(){
  playDing();
  if('Notification' in window&&Notification.permission==='granted'){
    try{new Notification('Iron Log',{body:'Rest complete! Go time.',icon:'./icon-192.png',tag:'rest-done'})}catch(e){
      try{navigator.serviceWorker&&navigator.serviceWorker.ready.then(reg=>{reg.showNotification('Iron Log',{body:'Rest complete!',tag:'rest-done'})})}catch(e2){}
    }
  }
}

// ═══════════════════════════════════════
// PHASE 3 FEATURE: STREAK COUNTER
// ═══════════════════════════════════════
function getWorkoutStreak(){
  if(state.history.length===0)return{current:0,best:0};
  // Group workouts by ISO week
  const weekSet=new Set();
  state.history.forEach(s=>{
    const d=new Date(s.date);
    const jan1=new Date(d.getFullYear(),0,1);
    const weekNum=Math.ceil(((d-jan1)/864e5+jan1.getDay()+1)/7);
    weekSet.add(`${d.getFullYear()}-W${weekNum}`);
  });
  // Get sorted weeks
  const weeks=[...weekSet].sort().reverse();
  // Count current streak (consecutive weeks from now)
  const now=new Date();
  const jan1Now=new Date(now.getFullYear(),0,1);
  let currentWeek=Math.ceil(((now-jan1Now)/864e5+jan1Now.getDay()+1)/7);
  let currentYear=now.getFullYear();
  let streak=0;
  for(let i=0;i<52;i++){
    const key=`${currentYear}-W${currentWeek}`;
    if(weekSet.has(key)){streak++;currentWeek--;if(currentWeek<=0){currentYear--;currentWeek=52}}
    else if(i===0){currentWeek--;if(currentWeek<=0){currentYear--;currentWeek=52};if(weekSet.has(`${currentYear}-W${currentWeek}`)){streak++;currentWeek--;if(currentWeek<=0){currentYear--;currentWeek=52}}else break}
    else break;
  }
  // Best streak
  const sortedWeeks=[...weekSet].sort();
  let best=0,run=1;
  for(let i=1;i<sortedWeeks.length;i++){
    const [py,pw]=sortedWeeks[i-1].split('-W').map(Number);
    const [cy,cw]=sortedWeeks[i].split('-W').map(Number);
    if((cy===py&&cw===pw+1)||(cy===py+1&&cw===1&&pw>=51)){run++}
    else{best=Math.max(best,run);run=1}
  }
  best=Math.max(best,run);
  return{current:streak,best};
}

function fmtElapsed(ms){

  if(m>=60){const hr=Math.floor(m/60);const rm=m%60;return`${hr}h ${String(rm).padStart(2,'0')}m`}

}
function fmtDuration(seconds){

  if(m>=60){const hr=Math.floor(m/60);const rm=m%60;return`${hr}h ${rm}m`}

      onClick:()=>{onChange(opt);scroll.scrollTo({top:i*ITEM_H,behavior:'smooth'})}},String(fmt(opt))));
  });

// ── Progress Chart ──
function drawChart(container,exId,color){
  const sessions=state.history.filter(s=>s.exercises&&s.exercises.some(e=>e.id===exId)).reverse();
  if(sessions.length<2){container.appendChild(h('div',{style:{textAlign:'center',padding:'20px',color:'var(--text3)',fontSize:'12px'}},'Need 2+ sessions to show chart'));return}
  const points=sessions.map(s=>{
    const ex=s.exercises.find(e=>e.id===exId);
    const best=ex.sets?ex.sets.reduce((b,cur)=>cur.weight*cur.reps>b.weight*b.reps?cur:b,ex.sets[0]):{weight:ex.bestWeight||0,reps:ex.bestReps||0};
    return{date:new Date(s.date),weight:best.weight,reps:best.reps,e1rm:estimate1RM(best.weight,best.reps)};
  }).slice(-12);

  const maxW=Math.max(...points.map(p=>p.e1rm));
  const minW=Math.min(...points.map(p=>p.e1rm));
  const range=maxW-minW||1;
  const W=Math.min(container.offsetWidth||300,400);
  const H=140;

  const canvas=document.createElement('canvas');canvas.width=W*2;canvas.height=H*2;
  canvas.style.cssText=`width:${W}px;height:${H}px`;
  const ctx=canvas.getContext('2d');ctx.scale(2,2);

  const padL=36,padR=10,padT=10,padB=28;
  const cw=W-padL-padR,ch=H-padT-padB;

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
  for(let i=0;i<4;i++){const y=padT+ch*(i/3);ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke()}

  // Y labels (show e1RM values)
  ctx.fillStyle='#555570';ctx.font='9px system-ui';ctx.textAlign='right';
  for(let i=0;i<4;i++){const val=maxW-range*(i/3);ctx.fillText(Math.round(val),padL-6,padT+ch*(i/3)+3)}

  // Line + area
  const pts=points.map((p,i)=>({x:padL+cw*(i/(points.length-1)),y:padT+ch*(1-(p.e1rm-minW)/range)}));

  ctx.beginPath();ctx.moveTo(pts[0].x,H-padB);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H-padB);ctx.closePath();
  const grad=ctx.createLinearGradient(0,padT,0,H-padB);
  grad.addColorStop(0,color+'30');grad.addColorStop(1,color+'05');
  ctx.fillStyle=grad;ctx.fill();

  ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();

  pts.forEach((p,i)=>{
    ctx.beginPath();ctx.arc(p.x,p.y,i===pts.length-1?4:2.5,0,Math.PI*2);
    ctx.fillStyle=i===pts.length-1?color:'#fff';ctx.fill();
    if(i===pts.length-1){ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke()}
  });

  // X labels
  ctx.fillStyle='#555570';ctx.font='8px system-ui';ctx.textAlign='center';
  const step=Math.max(1,Math.floor(points.length/5));
  points.forEach((p,i)=>{if(i%step===0||i===points.length-1)ctx.fillText(`${p.date.getMonth()+1}/${p.date.getDate()}`,pts[i].x,H-padB+14)});

  container.appendChild(canvas);

  // Latest stats — now includes e1RM
  const latest=points[points.length-1];
  const prev=points.length>=2?points[points.length-2]:null;
  const diff=prev?latest.e1rm-prev.e1rm:0;
  container.appendChild(h('div',{style:{display:'flex',justifyContent:'center',gap:'16px',marginTop:'8px',fontSize:'11px'}},
    h('span',{style:{color:'var(--text2)'}},`Latest: `,h('span',{style:{fontWeight:'800',color}},`${latest.weight} x ${latest.reps}`)),
    h('span',{style:{color:'var(--text2)'}},`e1RM: `,h('span',{style:{fontWeight:'800',color:'var(--gold)'}},`${latest.e1rm}`)),
    diff!==0?h('span',{style:{color:diff>0?'#3dd68c':'#ff3d3d',fontWeight:'700'}},`${diff>0?'\u2191':'\u2193'}${Math.abs(diff)} e1RM`):null
  ));
}

function openDay(day){
  state.selectedDay=day;state.sessionSets={};state.exIndex=0;
  state.workoutStartTime=null;if(state.workoutElapsedTimer){clearInterval(state.workoutElapsedTimer);state.workoutElapsedTimer=null}
  stopRest();state.view='day';render();
}
function openExercise(idx){
  const ex=state.selectedDay.exercises[idx];const existing=state.sessionSets[ex.id]||[];
  state.exIndex=idx;state.currentSet=existing.filter(s=>s.tag!=='warmup').length+1;state.setTag='normal';
  const pr=state.prRecords[ex.id];const last=existing.length>0?existing[existing.length-1]:null;
  const lastW=state.lastWeights[ex.id];
  let baseWeight=last?last.weight:(lastW?lastW.weight:(pr?pr.weight:0));
  let baseReps=last?last.reps:(lastW?lastW.reps:(pr?pr.reps:8));
  state.setWeight=baseWeight;state.setReps=baseReps;
  state.setAssistWeight=last?(last.assistWeight||0):0;
  state.view='exercise';render();
}
function logSet(){
  const day=state.selectedDay;const ex=day.exercises[state.exIndex];
  if(!state.sessionSets[ex.id])state.sessionSets[ex.id]=[];
  const isWarmup=state.setTag==='warmup';
  const setData={weight:state.setWeight,reps:state.setReps,set:isWarmup?'W':state.currentSet,tag:state.setTag,rpe:state.setRpe};
  if(ASSISTED_EXERCISES.has(ex.id)&&state.setAssistWeight>0)setData.assistWeight=state.setAssistWeight;
  state.sessionSets[ex.id].push(setData);state.setTag='normal';

  // PHASE 1: Start workout timer on first set
  startWorkoutTimer();

  if(state.restSeconds>0&&!isWarmup)startRest();
  if(isWarmup){render();return}

  // PHASE 3: Superset auto-advance
  const partnerId=state.supersets[ex.id];
  if(partnerId){
    const partnerIdx=day.exercises.findIndex(e=>e.id===partnerId);
    if(partnerIdx>=0){
      const partnerSets=state.sessionSets[partnerId]||[];
      const partnerWorkSets=partnerSets.filter(s=>s.tag!=='warmup').length;
      const partnerAdj=skillSets(day.exercises[partnerIdx].sets);
      // If partner still has sets to do, jump to partner
      if(partnerWorkSets<partnerAdj){
        const pNext=day.exercises[partnerIdx];
        const pPr=state.prRecords[pNext.id];const pLast=state.lastWeights[pNext.id];
        state.exIndex=partnerIdx;state.currentSet=partnerWorkSets+1;
        state.setWeight=pLast?pLast.weight:(pPr?pPr.weight:0);
        state.setReps=pLast?pLast.reps:(pPr?pPr.reps:8);
        state.setAssistWeight=0;render();return;
      }
    }
  }

  const adjSets=skillSets(ex.sets);
  if(state.currentSet<adjSets){state.currentSet++;render()}
  else if(state.exIndex<day.exercises.length-1){
    const next=day.exercises[state.exIndex+1];const nextPr=state.prRecords[next.id];
    const lastW=state.lastWeights[next.id];
    state.exIndex++;state.currentSet=1;
    let w=lastW?lastW.weight:(nextPr?nextPr.weight:state.setWeight);
    let r=lastW?lastW.reps:(nextPr?nextPr.reps:8);
    state.setWeight=w;state.setReps=r;state.setAssistWeight=0;render();
  }else{stopRest();finishWorkout()}
}
function skipExercise(){
  const day=state.selectedDay;
  if(state.exIndex<day.exercises.length-1){
    const next=day.exercises[state.exIndex+1];const nextPr=state.prRecords[next.id];
    const lastW=state.lastWeights[next.id];
    const existing=state.sessionSets[next.id]||[];
    state.exIndex++;state.currentSet=existing.length+1;
    let w=lastW?lastW.weight:(nextPr?nextPr.weight:0);
    let r=lastW?lastW.reps:(nextPr?nextPr.reps:8);
    state.setWeight=w;state.setReps=r;state.setAssistWeight=0;render();
  }else{stopRest();finishWorkout()}
}
function finishWorkout(){
  const day=state.selectedDay;const entries=[];const newPrs={...state.prRecords};let prCount=0;let prList=[];let totalVol=0;
  day.exercises.forEach(ex=>{
    const sets=state.sessionSets[ex.id];
    if(sets&&sets.length>0){
      const workSets=sets.filter(s=>s.tag!=='warmup');
      let best=workSets[0]||sets[0];workSets.forEach(s=>{if(s.weight*s.reps>best.weight*best.reps)best=s});
      entries.push({id:ex.id,name:ex.name,sets,bestWeight:best.weight,bestReps:best.reps});
      totalVol+=calcVolume(workSets);
      if(workSets.length>0){const old=newPrs[ex.id];if(!old||best.weight*best.reps>old.weight*old.reps){
        newPrs[ex.id]={weight:best.weight,reps:best.reps,date:new Date().toISOString()};
        prCount++;prList.push({name:ex.name,weight:best.weight,reps:best.reps})}}
    }});
  if(entries.length===0){showToast('No sets logged');state.view='home';render();return}
  // Save last used weights
  day.exercises.forEach(ex=>{
    const sets=state.sessionSets[ex.id];if(!sets)return;
    const workSets=sets.filter(s=>s.tag!=='warmup');
    if(workSets.length>0){
      const heaviest=workSets.reduce((a,s)=>s.weight>a.weight?s:a,workSets[0]);
      state.lastWeights[ex.id]={weight:heaviest.weight,reps:heaviest.reps,date:new Date().toISOString()};
    }
  });
  // PHASE 1: Stop workout timer, capture duration
  const workoutDuration=stopWorkoutTimer();

  const session={date:new Date().toISOString(),dayId:day.id,dayName:day.name,dayColor:day.color,dayIcon:day.icon,exercises:entries,duration:workoutDuration,note:state.workoutNote||''};
  state.history=[session,...state.history];state.prRecords=newPrs;
  state.summaryData={session,prCount,prList,totalSets:entries.reduce((s,e)=>s+e.sets.length,0),totalVol,workoutDuration};
  save();state.view='summary';render();
}

function updatePrInd(){
  const el=document.getElementById('pr-indicator');if(!el||!state.selectedDay)return;
  const ex=state.selectedDay.exercises[state.exIndex];const pr=state.prRecords[ex.id];

}

      });
      addPanel.appendChild(nameIn);
      addPanel.appendChild(catBtns);
      addPanel.appendChild(h('div',{style:{display:'flex',gap:'8px'}},
        h('button',{style:{flex:'1',padding:'8px',borderRadius:'8px',background:'var(--accent)',color:'#fff',fontSize:'11px',fontWeight:'800'},
          onClick:()=>{
            const name=nameIn.value.trim();if(!name){showToast('Enter a name');return}
            if(addCustomExercise(name,selectedCat)){
              const id='custom_'+name.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_');
              day.exercises.push({id,name,sub:'Custom',sets:3,repRange:'8-12'});
              state.showAddExercise=false;save();render();
            }
          }},'CREATE & ADD'),
        h('button',{style:{padding:'8px 14px',borderRadius:'8px',background:'rgba(255,255,255,0.04)',border:'1px solid var(--border)',color:'var(--text3)',fontSize:'11px',fontWeight:'600'},
          onClick:()=>{state.showAddExercise=false;render()}},'CANCEL')));
      root.appendChild(addPanel);
    }
    return;
  }

  // ═══════════════ SUPERSET CONFIG (PHASE 3) ═══════════════
  if(state.view==='superset'&&state.selectedDay){
    const day=state.selectedDay;
    root.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}},
      h('button',{style:{background:'none',color:'var(--text2)',fontSize:'14px',fontWeight:'600'},onClick:()=>{state.view='day';render()}},'\u2190 Back'),
      h('div',{style:{fontSize:'12px',fontWeight:'800',letterSpacing:'3px',color:'var(--text2)'}},'SUPERSETS'),h('div',{style:{width:'50px'}})));

    root.appendChild(h('div',{style:{fontSize:'11px',color:'var(--text3)',lineHeight:'1.6',marginBottom:'16px',padding:'10px 14px',background:'rgba(196,95,255,0.05)',border:'1px solid rgba(196,95,255,0.12)',borderRadius:'10px'}},
      'Pair two exercises as a superset. After logging a set for one, you\'ll auto-advance to its partner. Smart pairing checks for muscle conflicts.'));

    // Smart superset analysis
    const PUSH_MUSCLES=new Set(['Chest','Shoulders','Triceps']);
    const PULL_MUSCLES=new Set(['Back','Biceps']);
    const COMPOUND_EX=new Set(['squat','deadlift','bb_bench','db_bench','bb_row','rdl','leg_press','bb_ohp','incline_db','incline_bb']);

    function analyzePairing(exA,exB){
      const muscleA=EX_MUSCLES[exA.id]||'Other';
      const muscleB=EX_MUSCLES[exB.id]||'Other';
      const catA=findExCat(exA.id);
      const catB=findExCat(exB.id);
      const warnings=[];
      const tips=[];

      // Same muscle group = bad (fatigue interference)
      if(muscleA===muscleB){
        warnings.push(`Both target ${muscleA} — they\'ll fatigue each other, reducing performance on both.`);
      }
      // Two heavy compounds = bad
      if(COMPOUND_EX.has(exA.id)&&COMPOUND_EX.has(exB.id)){
        warnings.push('Two heavy compounds paired — high CNS demand, consider pairing compound + isolation instead.');
      }
      // Antagonist pairing = great (push/pull)
      if((PUSH_MUSCLES.has(muscleA)&&PULL_MUSCLES.has(muscleB))||(PULL_MUSCLES.has(muscleA)&&PUSH_MUSCLES.has(muscleB))){
        tips.push('Antagonist pairing (push/pull) — excellent! Muscles recover while partner works.');
      }
      // Upper/lower pairing = great
      const UPPER=new Set(['Chest','Back','Shoulders','Biceps','Triceps']);
      const LOWER=new Set(['Quads','Hamstrings','Calves','Glutes']);
      if((UPPER.has(muscleA)&&LOWER.has(muscleB))||(LOWER.has(muscleA)&&UPPER.has(muscleB))){
        tips.push('Upper/lower pairing — great for saving time with zero interference.');
      }
      // Same movement pattern (both pressing or both pulling) = warning
      const PRESS_EX=new Set(['db_bench','bb_bench','incline_db','incline_bb','db_ohp','bb_ohp','leg_press']);
      const PULL_EX=new Set(['pullups','weighted_pu','chinups','lat_pulldown','bb_row','cs_row','db_row']);
      if(PRESS_EX.has(exA.id)&&PRESS_EX.has(exB.id)){
        warnings.push('Both are pressing movements — shared stabilizers will fatigue, reducing strength.');
      }
      if(PULL_EX.has(exA.id)&&PULL_EX.has(exB.id)){
        warnings.push('Both are pulling movements — grip and back fatigue will limit performance.');
      }
      // Compound + isolation of same muscle = warning
      if(muscleA===muscleB&&(COMPOUND_EX.has(exA.id)!==COMPOUND_EX.has(exB.id))){
        // Already covered by same-muscle warning above
      }
      // Core + heavy compound = warning
      if((muscleA==='Core'&&COMPOUND_EX.has(exB.id))||(muscleB==='Core'&&COMPOUND_EX.has(exA.id))){
        warnings.push('Core fatigue before a compound lift risks bracing stability. Do core work after heavy lifts.');
      }
      // If no tips and no warnings for non-same muscle
      if(tips.length===0&&warnings.length===0){
        tips.push(`${muscleA} + ${muscleB} — neutral pairing, should work fine.`);
      }
      return{warnings,tips};
    }

    day.exercises.forEach((ex,i)=>{
      const partner=state.supersets[ex.id];
      const partnerEx=partner?day.exercises.find(e=>e.id===partner):null;
      const card=h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderLeft:`3px solid ${partner?'#c45fff':day.color}`,borderRadius:'12px',padding:'12px 16px',marginBottom:'8px'}});

      // Show analysis for existing pairings
      if(partnerEx){
        const analysis=analyzePairing(ex,partnerEx);
        card.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:analysis.warnings.length>0||analysis.tips.length>0?'8px':'0'}},

            h('div',{style:{fontSize:'13px',fontWeight:'700',color:'var(--text)'}},ex.name),

              delete state.supersets[partner];

        // Show warnings and tips
        analysis.warnings.forEach(w=>{

        });
        analysis.tips.forEach(t=>{

        });

            onChange:(ev)=>{

              state.supersets[ex.id]=val;

              save();render();
            }},
            h('option',{value:''},'Pair...'),
            ...day.exercises.filter(e2=>e2.id!==ex.id&&!state.supersets[e2.id]).map(e2=>{
              const analysis=analyzePairing(ex,e2);
              const quality=analysis.warnings.length>0?'\u26A0 ':analysis.tips.some(t=>t.includes('excellent')||t.includes('great'))?'\u2713 ':'';
              return h('option',{value:e2.id},quality+e2.name);
            })
          )));
      }
      root.appendChild(card);
    });
    return;
  }

  // ═══════════════ FULLSCREEN EXERCISE ═══════════════
  if(state.view==='exercise'&&state.selectedDay){
    const day=state.selectedDay;const ex=day.exercises[state.exIndex];
    const pr=state.prRecords[ex.id];const logged=state.sessionSets[ex.id]||[];
    const adjSets=skillSets(ex.sets);const adjReps=skillRepRange(ex.repRange);
    const warmupCount=logged.filter(s=>s.tag==='warmup').length;
    const workCount=logged.filter(s=>s.tag!=='warmup').length;
    const isLastSet=state.currentSet>=adjSets;const isLastEx=state.exIndex>=day.exercises.length-1;
    const isNewPr=state.setWeight*state.setReps>(pr?pr.weight*pr.reps:0)&&state.setWeight*state.setReps>0;
    const lastW=state.lastWeights[ex.id];
    const currentE1rm=estimate1RM(state.setWeight,state.setReps);

    root.style.padding='0';root.style.display='flex';root.style.flexDirection='column';root.style.overflow='hidden';

    root.appendChild(h('div',{style:{padding:`calc(12px + var(--safe-t)) 16px 0`,display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('button',{style:{background:'none',color:'var(--text2)',fontSize:'14px',fontWeight:'600',padding:'4px 0'},onClick:()=>{state.view='day';render()}},'\u2190 Back'),
      h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},
        // PHASE 1: Workout timer in exercise view
        state.workoutStartTime?h('div',{id:'workout-timer',style:{fontSize:'11px',fontWeight:'600',color:'var(--text3)',fontVariantNumeric:'tabular-nums'}},fmtElapsed(Date.now()-state.workoutStartTime)):null,

    // Header
    const header=h('div',{style:{padding:'8px 20px 0',textAlign:'center'}});

    if(ex.sub)header.appendChild(h('div',{style:{fontSize:'10px',color:'var(--text3)',marginBottom:'4px'}},ex.sub));

    // PHASE 1: "Last time" inline

    // Progress dots + set counter

    // Target badge
    header.appendChild(h('div',{style:{display:'inline-flex',alignItems:'center',gap:'6px',padding:'4px 12px',borderRadius:'8px',background:`${day.color}10`,border:`1px solid ${day.color}20`,marginTop:'4px'}},

    // PHASE 1: Live e1RM display + PHASE 2: Plate/Warmup toolbar

    // Plate calc button
    if(state.setWeight>0 && !BW_EXERCISES.has(ex.id)){

        onClick:()=>{state.showWarmupCalc=!state.showWarmupCalc;state.showPlateCalc=false;render()}},'WARM-UP'));

    // PHASE 2: Plate calculator panel

      }else{
        const unit=state.profile.weightUnit||'lbs';
        warmSets.forEach((ws,i)=>{
          const isBar=!ws.pct;
          warmPanel.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'6px 0',borderBottom:i<warmSets.length-1?'1px solid rgba(255,255,255,0.03)':'none'}},
            h('div',{style:{width:'36px',fontSize:'9px',fontWeight:'700',color:isBar?'var(--text3)':day.color,textAlign:'center'}},isBar?'BAR':`${ws.pct}%`),
            h('div',{style:{flex:'1'}},
              h('span',{style:{fontSize:'13px',fontWeight:'800',color:'var(--text)'}},`${ws.weight} ${unit}`),
              h('span',{style:{fontSize:'10px',color:'var(--text3)',marginLeft:'8px'}},`x ${ws.reps} reps`)),
            h('div',{style:{fontSize:'8px',color:'var(--text3)'}},ws.label)));
        });
        // Then your working weight
        warmPanel.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'8px 0',borderTop:'1px solid rgba(255,255,255,0.06)'}},
          h('div',{style:{width:'36px',fontSize:'9px',fontWeight:'800',color:'#3dd68c',textAlign:'center'}},'WORK'),
          h('div',{style:{flex:'1'}},
            h('span',{style:{fontSize:'13px',fontWeight:'900',color:'#3dd68c'}},`${state.setWeight} ${unit}`),
            h('span',{style:{fontSize:'10px',color:'var(--text3)',marginLeft:'8px'}},`x ${state.setReps} reps`))));
      }

    }

    // Rest timer
    if(state.restActive){

      restBox.appendChild(h('div',{id:'rest-progress',style:{position:'absolute',top:'0',left:'0',height:'100%',background:`${day.color}12`,borderRadius:'10px',width:`${((state.restSeconds-state.restRemaining)/state.restSeconds)*100}%`,transition:'width 1s linear'}}));
      restBox.appendChild(h('div',{style:{position:'relative',display:'flex',alignItems:'center',justifyContent:'space-between'}},

        h('button',{style:{background:'rgba(255,255,255,0.06)',borderRadius:'6px',padding:'3px 10px',fontSize:'9px',fontWeight:'700',color:'var(--text3)'},onClick:()=>{stopRest();render()}},'SKIP')));

    pickerRow.appendChild(h('div',{style:{width:'1px',height:'80px',background:'rgba(255,255,255,0.06)',flexShrink:'0'}}));
    pickerRow.appendChild(createPicker(REPS,state.setReps,v=>{state.setReps=v;updatePrInd();updateE1rmDisplay()},'',null,day.color));
    pickerSection.appendChild(pickerRow);

    // Assisted movement
